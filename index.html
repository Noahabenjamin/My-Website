<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #ffffff; height: 100%; width: 100%;
    font-family: Georgia, serif;
  }
  canvas { display: block; }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    opacity: 0;
  }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 20; color: #555; font-size: 13px; letter-spacing: 0.05em;
    pointer-events: none; opacity: 0.7;
    transition: opacity 0.4s;
  }
  #flash {
    position: fixed; inset: 0; background: black; z-index: 30;
    opacity: 0; pointer-events: none;
    transition: opacity 90ms linear;
  }
  #fade {
    position: fixed; inset: 0; background: black; z-index: 28;
    opacity: 0; pointer-events: none;
  }
  #words {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 25;
  }
  .word {
    position: fixed;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 39px;          /* 3 × the 13px hint */
    color: rgba(245, 240, 220, 0.92);
    text-shadow:
      0 0 14px rgba(255, 220, 150, 0.5),
      0 0 28px rgba(255, 200, 130, 0.25);
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 2.5s ease-out;
  }
  /* close button shown only while the laptop is "open" (computer view) */
  #laptop-close {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 35;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.9);
    font-size: 22px;
    line-height: 38px;
    cursor: pointer;
    display: none;
    user-select: none;
  }
  #laptop-close:hover { background: rgba(0,0,0,0.75); }
  /* "click to open" pill — same look as the intro tap-to-begin button.
     Shown only while computerActive (toggled in JS). */
  #laptop-open-site {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 36;
    padding: 14px 30px;
    background: rgba(255,255,255,0.07);
    color: #f5efe2;
    border: 1px solid rgba(245,239,226,0.5);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 24px;
    letter-spacing: 0.08em;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    transition: background 0.2s;
  }
  #laptop-open-site:hover { background: rgba(255,255,255,0.14); }
  /* Tiny "sound" toggle in the top-right of the screen, always visible. */
  #sound-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 40;
    padding: 3px 9px;
    background: rgba(0,0,0,0.42);
    color: #f5efe2;
    border: 1px solid rgba(245,239,226,0.30);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s, background 0.2s;
  }
  #sound-toggle:hover { background: rgba(0,0,0,0.62); }
  #sound-toggle.muted { text-decoration: line-through; opacity: 0.55; }
  /* "click e" HTML overlay for the projects world (positioned in JS) */
  #projects-prompt {
    position: fixed;
    z-index: 22;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 26px;
    color: rgba(245, 245, 245, 0.92);
    letter-spacing: 0.06em;
    display: none;
    user-select: none;
    pointer-events: none;
    transform: translate(-50%, -100%);
    text-shadow: 0 0 10px rgba(0,0,0,0.6);
  }
  /* "back..." HTML overlay for the beach scene — perfectly straight against the screen */
  #beach-back {
    position: fixed;
    bottom: 6%;
    right: 6%;
    z-index: 22;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;            /* delicate */
    font-size: 70px;
    color: #000;
    letter-spacing: 0.05em;
    display: none;
    cursor: pointer;
    user-select: none;
  }
  #beach-back span {
    display: inline-block;
    opacity: 0;
  }
  .word.top    { top: 36px;    left: 50%; transform: translateX(-50%); }
  .word.bottom { bottom: 36px; left: 50%; transform: translateX(-50%); }
  .word.left   { left: 36px;   top: 50%;  transform: translateY(-50%); }
  .word.right  { right: 36px;  top: 50%;  transform: translateY(-50%); }
  #words.visible .word { opacity: 1; }
  /* instant-off: bypass the fade and hide immediately (used on contact-portal entry) */
  #words.instant-off .word { opacity: 0 !important; transition: none !important; }
  /* ===== Intro video / crumpled-paper overlay ===== */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #000;
    overflow: hidden;
  }
  #intro-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;       /* show whole frame, letterboxed on black */
    background: #000;
    display: none;
  }
  #newspaper-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: none;
    transform-origin: 50% 50%;
    will-change: transform, opacity, filter;
    pointer-events: none;
  }
  #intro-start {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding: 16px 36px;
    background: rgba(255,255,255,0.07);
    color: #f5efe2;
    border: 1px solid rgba(245,239,226,0.5);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    letter-spacing: 0.08em;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: opacity 0.4s ease-out, transform 0.4s ease-out;
  }
  #intro-start:hover { background: rgba(255,255,255,0.14); }
  #intro-skip {
    position: absolute; bottom: 18px; right: 18px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.07);
    color: #f5efe2;
    border: 1px solid rgba(245,239,226,0.3);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
    z-index: 102;
    display: none;
    transition: opacity 0.3s ease-out;
  }
  #intro-skip:hover { background: rgba(255,255,255,0.16); }
  #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.6s ease-out; }
  #intro-overlay.gone   { display: none; }
  /* Skip-to-cobble pill shown only during the underwater scene */
  #psych-skip {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 36;
    padding: 8px 18px;
    background: rgba(255,255,255,0.10);
    color: #f5efe2;
    border: 1px solid rgba(245,239,226,0.5);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 16px;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
    display: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: opacity 0.3s ease-out, background 0.2s;
  }
  #psych-skip:hover { background: rgba(255,255,255,0.20); }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

const fontReady = document.fonts
  .load('italic 500 100px "Cormorant Garamond"')
  .catch(() => {});

// ===== Intro video → newspaper-crumple → thrown-into-the-hole sequence =====
// start() is called immediately so the white-world renderer + scene exist for
// the 3D paper ball.  The intro sequence pauses the Baymax walk-in via the
// _introPaperApi hooks until the ball has dropped into the hole.
let _bootResolved = false;
function bootAfterIntro() {
  if (_bootResolved) return;
  _bootResolved = true;
  // The white world is already running.  Release the paper-ball pause so
  // the intro flow (Baymax walks toward the hole) can begin.
  if (window._introPaperApi && window._introPaperApi.release) {
    window._introPaperApi.release();
  } else {
    // Defensive: if start() hasn't run yet (shouldn't happen) boot it now.
    start();
  }
}

function initIntroSequence() {
  const overlay = document.getElementById('intro-overlay');
  const video   = document.getElementById('intro-video');
  const canvas  = document.getElementById('newspaper-canvas');
  const startBtn= document.getElementById('intro-start');
  const skipBtn = document.getElementById('intro-skip');

  if (!overlay || !video || !canvas || !startBtn) {
    // missing elements — fall back to immediate boot
    bootAfterIntro();
    return;
  }

  // "Skip" only appears for repeat visitors (anyone who's seen the intro
  // before on this device).
  let isReturning = false;
  try { isReturning = !!localStorage.getItem('noah_website_visited'); } catch (_) {}
  try { localStorage.setItem('noah_website_visited', '1'); } catch (_) {}
  if (skipBtn && isReturning) {
    skipBtn.style.display = 'block';
    skipBtn.addEventListener('click', () => {
      // Bypass video + crumple entirely
      _endedFired = true;
      overlay.classList.add('hidden');
      bootAfterIntro();
      setTimeout(() => overlay.classList.add('gone'), 600);
    });
  }

  // Skip the intro if the video file can't load for any reason
  video.addEventListener('error', () => {
    overlay.classList.add('hidden');
    setTimeout(() => overlay.classList.add('gone'), 600);
    bootAfterIntro();
  });

  function playVideo() {
    startBtn.style.pointerEvents = 'none';
    startBtn.style.opacity = '0';
    startBtn.style.transform = 'translate(-50%, -50%) scale(0.96)';
    video.style.display = 'block';
    video.muted = false;
    video.volume = 1.0;
    const p = video.play();
    if (p && typeof p.then === 'function') {
      p.catch(() => {
        // Autoplay-with-sound rejected — retry muted so something at least plays.
        video.muted = true;
        video.play().catch(() => {
          // Total failure → just move on to the rest of the site.
          onVideoEnded();
        });
      });
    }
    // ---- Safety nets: force the intro to advance even if the browser never
    // fires 'ended' (Chrome + .mov frequently misses it) ----
    const playStart = performance.now();

    // Safety net 1: timeupdate near end of duration.
    video.addEventListener('timeupdate', maybeEndedFromTime);

    // Safety net 2: when duration is known, schedule a forced-end at
    // duration + 0.6 s.  Try multiple times in case metadata loads late.
    const tryScheduleDurationCap = (delay) => {
      setTimeout(() => {
        if (_endedFired) return;
        const dur = video.duration;
        if (isFinite(dur) && dur > 0) {
          const sinceStart = (performance.now() - playStart) / 1000;
          const wait = Math.max(0.1, dur + 0.6 - sinceStart);
          setTimeout(() => onVideoEnded(), wait * 1000);
        } else if (delay < 5000) {
          tryScheduleDurationCap(delay * 2);
        }
      }, delay);
    };
    tryScheduleDurationCap(150);

    // Safety net 3: stall detection.  If currentTime hasn't advanced
    // meaningfully for ~700 ms AND the video has been playing for at least
    // half a second, treat as ended.
    let _lastCT = -1;
    let _stallStart = 0;
    let _stallActive = true;
    const stallTick = () => {
      if (_endedFired || !_stallActive) return;
      const ct = video.currentTime;
      const now = performance.now();
      const sincePlay = now - playStart;
      if (Math.abs(ct - _lastCT) < 0.001) {
        if (!_stallStart) _stallStart = now;
        // After 500 ms of play, any stall lasting 700 ms ends the video.
        if (sincePlay > 500 && (now - _stallStart) > 700 && ct > 0.05) {
          onVideoEnded();
          return;
        }
      } else {
        _lastCT = ct;
        _stallStart = 0;
      }
      requestAnimationFrame(stallTick);
    };
    requestAnimationFrame(stallTick);
    video.addEventListener('ended', () => { _stallActive = false; }, { once: true });

    // Safety net 4: final hard cap — even if everything above fails, advance
    // after 30 s so the page is never permanently blocked.
    setTimeout(() => onVideoEnded(), 30 * 1000);
  }

  function maybeEndedFromTime() {
    const dur = video.duration;
    if (!isFinite(dur) || dur <= 0) return;
    if (video.currentTime >= dur - 0.18) onVideoEnded();
  }

  startBtn.addEventListener('click', playVideo, { once: true });

  // Once the video ends, capture its last frame and crumple/throw it.
  video.addEventListener('ended', onVideoEnded);
  // Some browsers / formats fire 'pause' near the end without 'ended'.
  video.addEventListener('pause', () => {
    const dur = video.duration;
    if (isFinite(dur) && dur > 0 && video.currentTime >= dur - 0.25) onVideoEnded();
  });

  let _endedFired = false;
  function onVideoEnded() {
    if (_endedFired) return;
    _endedFired = true;
    video.removeEventListener('timeupdate', maybeEndedFromTime);
    try {
      _onVideoEndedImpl();
    } catch (err) {
      // If anything in the crumple pipeline blows up, don't strand the user
      // on the intro overlay — fade it out and boot the site.
      console.error('intro post-video failed:', err);
      overlay.classList.add('hidden');
      bootAfterIntro();
      setTimeout(() => overlay.classList.add('gone'), 600);
    }
    // Absolute guarantee: 3.5 s after onVideoEnded fires, the site must
    // be running, no matter what the crumple sequence did.
    setTimeout(() => {
      overlay.classList.add('hidden');
      bootAfterIntro();
      setTimeout(() => overlay.classList.add('gone'), 600);
    }, 3500);
  }

  function _onVideoEndedImpl() {
    // Draw the final video frame onto a square canvas — square avoids
    // texture-stretch when the plane crumples.
    const SIZE = 1024;
    canvas.width  = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1a140a';
    ctx.fillRect(0, 0, SIZE, SIZE);
    const vw = video.videoWidth || 16, vh = video.videoHeight || 9;
    const scale = Math.min(SIZE / vw, SIZE / vh);
    const dw = vw * scale, dh = vh * scale;
    const dx = (SIZE - dw) / 2, dy = (SIZE - dh) / 2;
    try { ctx.drawImage(video, dx, dy, dw, dh); } catch (_) {}

    // Newspaper effect across the whole square (so the crumple shows
    // creases edge-to-edge, not just inside the letterboxed area).
    try { applyNewspaperEffect(ctx, SIZE, SIZE, 0, 0, SIZE, SIZE); } catch (_) {}
    // Crease marks
    try { drawCreaseLines(ctx, SIZE, SIZE); } catch (_) {}

    // Swap the 2D canvas onto the overlay while we set up the 3D ball,
    // then start the 3D crumple+throw immediately.
    canvas.style.display = 'block';
    canvas.style.objectFit = 'cover';
    video.style.display = 'none';

    startPaperBall3D(canvas);
  }

  function drawCreaseLines(ctx, W, H) {
    ctx.save();
    // 1) Long diagonal fold lines — the main creases.  Each line is paired
    //    with a brighter "ridge" highlight just beside it to suggest 3D folds.
    for (let i = 0; i < 26; i++) {
      const horiz = Math.random() < 0.5;
      let x1, y1, x2, y2;
      if (horiz) {
        x1 = -W * 0.05;             y1 = Math.random() * H;
        x2 =  W * 1.05;             y2 = Math.random() * H;
      } else {
        x1 = Math.random() * W;     y1 = -H * 0.05;
        x2 = Math.random() * W;     y2 =  H * 1.05;
      }
      ctx.strokeStyle = `rgba(12, 8, 4, ${0.20 + Math.random() * 0.32})`;
      ctx.lineWidth = 0.6 + Math.random() * 1.9;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      // ridge highlight a couple px above the crease
      const len = Math.hypot(x2 - x1, y2 - y1) || 1;
      const nx = -(y2 - y1) / len * 2.2;
      const ny =  (x2 - x1) / len * 2.2;
      ctx.strokeStyle = `rgba(255, 248, 230, ${0.14 + Math.random() * 0.20})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(x1 + nx, y1 + ny);
      ctx.lineTo(x2 + nx, y2 + ny);
      ctx.stroke();
    }
    // 2) Radial fold lines emanating from a handful of pivot points
    const pivots = [];
    for (let i = 0; i < 6; i++) pivots.push({ x: Math.random() * W, y: Math.random() * H });
    for (const p of pivots) {
      for (let j = 0; j < 7; j++) {
        const ang = Math.random() * Math.PI * 2;
        const len = 90 + Math.random() * 320;
        const x2 = p.x + Math.cos(ang) * len;
        const y2 = p.y + Math.sin(ang) * len;
        ctx.strokeStyle = `rgba(18, 12, 6, ${0.18 + Math.random() * 0.30})`;
        ctx.lineWidth = 0.5 + Math.random() * 1.4;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
    // 3) Soft dark "valley" patches where creases pool together
    for (let i = 0; i < 18; i++) {
      const cx = Math.random() * W;
      const cy = Math.random() * H;
      const r = 22 + Math.random() * 60;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, `rgba(8, 5, 2, ${0.16 + Math.random() * 0.20})`);
      g.addColorStop(1, 'rgba(8, 5, 2, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Synthesize a quick paper-crumple sound via Web Audio: high-pass-filtered
  // random noise with crinkle-spike envelopes.  Played when the 3D scrunch
  // starts so the visual + audio land together.
  function playCrumpleSound() {
    if (!_soundOn) return;
    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;
      const actx = new Ctor();
      const duration = 1.15;
      const sampleRate = actx.sampleRate;
      const length = Math.floor(duration * sampleRate);
      const buffer = actx.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) {
        const t = i / sampleRate;
        const phase = t / duration;
        // overall envelope: fast attack, slower decay
        const attack = Math.min(1, phase / 0.08);
        const decay  = Math.pow(1 - phase, 1.4);
        const overall = attack * decay;
        // crinkle "spikes": Math.random()**N is sharply biased toward 0 with
        // rare large values — feels like sporadic paper cracks.
        const spike = Math.pow(Math.random(), 6);
        const noise = (Math.random() * 2 - 1);
        data[i] = noise * spike * overall;
      }
      const src = actx.createBufferSource();
      src.buffer = buffer;
      // high-pass for "paper" character (cuts low rumble)
      const hp = actx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 1800;
      hp.Q.value = 0.4;
      // soft compressor-ish gain peak
      const gain = actx.createGain();
      gain.gain.value = 0.65;
      src.connect(hp); hp.connect(gain); gain.connect(actx.destination);
      src.start();
      // clean up the context once the buffer has finished
      src.onended = () => { try { actx.close(); } catch (_) {} };
    } catch (_) { /* audio blocked — silent fallback */ }
  }

  function startPaperBall3D(srcCanvas) {
    const api = window._introPaperApi;
    if (!api || !api.addMesh) {
      // No 3D scene? Just dismiss the overlay.
      overlay.classList.add('hidden');
      bootAfterIntro();
      setTimeout(() => overlay.classList.add('gone'), 600);
      return;
    }

    playCrumpleSound();
    const camera = api.camera;
    const scene  = api.scene;

    // Build a high-resolution plane that initially fills the camera view.
    const planeDist = 6.0;                                  // metres in front of camera
    const vh = 2 * planeDist * Math.tan((camera.fov * Math.PI / 180) / 2);
    const vw = vh * camera.aspect;
    const SUBDIV = 44;
    const geom = new THREE.PlaneGeometry(vw, vh, SUBDIV, SUBDIV);

    // Snapshot original vertex positions + give each vertex a stable random
    // unit-sphere offset (used as its "ball target" once crumpled).
    const positions = geom.attributes.position;
    const origPos = new Float32Array(positions.array);
    const seeds   = new Float32Array(positions.count * 3);
    for (let i = 0; i < positions.count; i++) {
      const phi   = Math.random() * Math.PI * 2;
      const theta = Math.acos(Math.random() * 2 - 1);
      const r     = 0.45 + Math.random() * 0.55;
      seeds[i * 3 + 0] = Math.sin(theta) * Math.cos(phi) * r;
      seeds[i * 3 + 1] = Math.cos(theta) * r;
      seeds[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * r;
    }

    const tex = new THREE.CanvasTexture(srcCanvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.needsUpdate = true;
    const mat = new THREE.MeshBasicMaterial({
      map: tex, side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geom, mat);

    // Position the plane right in front of the camera, oriented to face it.
    const camFwd = new THREE.Vector3();
    camera.getWorldDirection(camFwd);
    const startPos = camera.position.clone().add(camFwd.clone().multiplyScalar(planeDist));
    mesh.position.copy(startPos);
    mesh.quaternion.copy(camera.quaternion);

    api.addMesh(mesh);

    // The 3D plane now visually replaces the 2D overlay frame.  Snap the
    // overlay off so there's no flicker between the two surfaces.
    overlay.classList.add('hidden');
    setTimeout(() => overlay.classList.add('gone'), 700);

    // ---- Animation ----
    const CRUMPLE_DUR = 1.0;     // aggressive, fast crumple
    const THROW_DUR   = 1.25;    // first-person toss into the hole
    const BALL_R      = 0.34;    // final compact ball radius
    const HOLE        = new THREE.Vector3(0, 0, 0);   // world hole centre

    // Tumbling spin rates (random axis combo)
    const spinX = (Math.random() * 2 - 1) * 11 + Math.sign(Math.random() - 0.5) * 6;
    const spinY = (Math.random() * 2 - 1) * 13 + Math.sign(Math.random() - 0.5) * 5;
    const spinZ = (Math.random() * 2 - 1) *  9 + Math.sign(Math.random() - 0.5) * 4;

    // Pre-compute arc control point (apex) for the throw — well above the
    // straight line between start and hole so the throw reads as a real toss.
    const arcMid = startPos.clone().lerp(HOLE, 0.55);
    arcMid.y = Math.max(startPos.y, HOLE.y) + 2.6;

    let elapsed = 0;
    let lastT   = performance.now();
    let phase   = 'crumple';

    function smoothstep(x) { return x * x * (3 - 2 * x); }

    function frame() {
      const now = performance.now();
      const dt  = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;
      elapsed += dt;

      if (phase === 'crumple') {
        const t = Math.min(1, elapsed / CRUMPLE_DUR);
        const e = smoothstep(t);
        for (let i = 0; i < positions.count; i++) {
          const ox = origPos[i * 3 + 0];
          const oy = origPos[i * 3 + 1];
          const oz = origPos[i * 3 + 2];
          const tx = seeds[i * 3 + 0] * BALL_R;
          const ty = seeds[i * 3 + 1] * BALL_R;
          const tz = seeds[i * 3 + 2] * BALL_R;
          positions.setXYZ(i,
            ox + (tx - ox) * e,
            oy + (ty - oy) * e,
            oz + (tz - oz) * e
          );
        }
        positions.needsUpdate = true;
        geom.computeVertexNormals();

        // tiny pre-toss tumble while crumpling
        mesh.rotation.x += dt * 1.2;
        mesh.rotation.y += dt * 1.5;

        if (t >= 1) { phase = 'throw'; elapsed = 0; }
      } else if (phase === 'throw') {
        const t = Math.min(1, elapsed / THROW_DUR);
        // Quadratic bezier from startPos → arcMid → HOLE
        const a = startPos.clone().lerp(arcMid, t);
        const b = arcMid.clone().lerp(HOLE,    t);
        mesh.position.copy(a.lerp(b, t));
        // tumbling spin
        mesh.rotation.x += dt * spinX;
        mesh.rotation.y += dt * spinY;
        mesh.rotation.z += dt * spinZ;
        // shrink slightly as it disappears into the hole
        const s = 1.0 - 0.6 * smoothstep(Math.max(0, (t - 0.65) / 0.35));
        mesh.scale.setScalar(s);

        if (t >= 1) {
          api.removeMesh();
          bootAfterIntro();
          return;
        }
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  function applyNewspaperEffect(ctx, W, H, dx, dy, dw, dh) {
    // Keep the captured frame's original colours — only overlay crumple
    // texture (sparse darker grain + soft shadow vignette) so the surface
    // reads as creased paper while preserving hue.
    const grain = ctx.createImageData(W, H);
    const gd = grain.data;
    for (let i = 0; i < gd.length; i += 4) {
      const v = Math.random();
      if (v < 0.05) {
        // sparse darker speckles (paper fibre shadows)
        gd[i] = gd[i + 1] = gd[i + 2] = 0;
        gd[i + 3] = 30 + Math.random() * 60;
      } else if (v > 0.99) {
        // occasional bright pulp specks (catching light along ridges)
        gd[i] = gd[i + 1] = gd[i + 2] = 250;
        gd[i + 3] = 60;
      } else {
        gd[i + 3] = 0;
      }
    }
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    tmp.getContext('2d').putImageData(grain, 0, 0);
    ctx.globalAlpha = 0.35;
    ctx.drawImage(tmp, 0, 0);
    ctx.globalAlpha = 1.0;

    // Soft shadow vignette so the corners feel like they've been bent inward
    const grad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

}

// ==========================================================================
// wood textures (used by the sign)
// ==========================================================================
function buildWoodCanvas(width, height) {
  const c = document.createElement('canvas');
  c.width = width; c.height = height;
  const ctx = c.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, width, 0);
  grad.addColorStop(0.0, '#5e3818');
  grad.addColorStop(0.3, '#754423');
  grad.addColorStop(0.6, '#5d3617');
  grad.addColorStop(1.0, '#6a3e1d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < 110; i++) {
    const y = Math.random() * height;
    const amp = 1 + Math.random() * 5;
    const freq = 0.005 + Math.random() * 0.025;
    const phase = Math.random() * Math.PI * 2;
    const dark = Math.random() < 0.55;
    ctx.strokeStyle = dark
      ? `rgba(${30 + Math.random() * 30}, ${18 + Math.random() * 14}, ${6 + Math.random() * 10}, ${0.22 + Math.random() * 0.4})`
      : `rgba(${160 + Math.random() * 30}, ${110 + Math.random() * 25}, ${65 + Math.random() * 25}, ${0.10 + Math.random() * 0.18})`;
    ctx.lineWidth = 0.6 + Math.random() * 1.8;
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x <= width; x += 6) {
      ctx.lineTo(x, y + Math.sin(x * freq + phase) * amp);
    }
    ctx.stroke();
  }

  for (let i = 0; i < 6; i++) {
    const kx = Math.random() * width;
    const ky = Math.random() * height;
    const kr = 6 + Math.random() * 12;
    const kg = ctx.createRadialGradient(kx, ky, 1, kx, ky, kr);
    kg.addColorStop(0, 'rgba(20,10,2,0.95)');
    kg.addColorStop(0.6, 'rgba(45,22,8,0.55)');
    kg.addColorStop(1, 'rgba(70,38,15,0)');
    ctx.fillStyle = kg;
    ctx.beginPath();
    ctx.arc(kx, ky, kr, 0, Math.PI * 2);
    ctx.fill();
  }

  return c;
}

function addWeathering(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = 'rgba(20, 14, 6, 0.32)';
  ctx.fillRect(0, 0, w, h);

  for (let i = 0; i < 16; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = 25 + Math.random() * 110;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(8, 4, 1, 0.85)');
    g.addColorStop(0.4, 'rgba(20, 12, 5, 0.45)');
    g.addColorStop(1, 'rgba(50, 30, 15, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
  for (let i = 0; i < 22; i++) {
    ctx.lineWidth = 0.8 + Math.random() * 1.6;
    let x = Math.random() * w;
    let y = Math.random() * h;
    ctx.beginPath();
    ctx.moveTo(x, y);
    const segs = 6 + Math.floor(Math.random() * 10);
    for (let j = 0; j < segs; j++) {
      x += (Math.random() - 0.5) * 60;
      y += (Math.random() - 0.5) * 30;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  for (let i = 0; i < 28; i++) {
    const top = Math.random() < 0.5;
    const x = Math.random() * w;
    const y = top ? Math.random() * 18 : h - Math.random() * 18;
    const sw = 8 + Math.random() * 22;
    const sh = 4 + Math.random() * 12;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + sw, y);
    ctx.lineTo(x + sw / 2 + (Math.random() - 0.5) * 8, top ? y + sh : y - sh);
    ctx.closePath();
    ctx.fill();
  }

  for (let i = 0; i < 10; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = 30 + Math.random() * 60;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(40, 60, 30, 0.35)');
    g.addColorStop(1, 'rgba(40, 60, 30, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const img = ctx.getImageData(0, 0, w, h);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 28;
    img.data[i]   = Math.max(0, Math.min(255, img.data[i]   + n));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n * 0.85));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n * 0.7));
  }
  ctx.putImageData(img, 0, 0);
}

function buildSignFaceTexture() {
  // canvas aspect matches the smaller panel (3.4 / 1.4 ≈ 2.43)
  const W = 1024, H = 420;
  const wood = buildWoodCanvas(W, H);
  addWeathering(wood);

  const ctx = wood.getContext('2d');
  const text = 'Noah Benjamin';

  // Same font family as the on-screen "use WASD" hint (Georgia).
  let size = 280;
  ctx.font = `${size}px Georgia, serif`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.05em';
  const targetW = W * 0.92;
  const measured = ctx.measureText(text).width;
  if (measured > 0) size = size * (targetW / measured);
  const heightCap = (H * 0.74) / 0.82;
  size = Math.min(size, heightCap);
  ctx.font = `${size}px Georgia, serif`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.05em';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // soft dark shadow so the white text stays legible on weathered wood
  ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetY = 3;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.fillText(text, W / 2, H / 2 + 3);

  // crisp white pass
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, W / 2, H / 2);

  const tex = new THREE.CanvasTexture(wood);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

function buildSign() {
  const group = new THREE.Group();

  const faceTex = buildSignFaceTexture();
  const sideCanvas = buildWoodCanvas(512, 256);
  addWeathering(sideCanvas);
  const sideTex = new THREE.CanvasTexture(sideCanvas);
  sideTex.colorSpace = THREE.SRGBColorSpace;

  const faceMat = new THREE.MeshStandardMaterial({ map: faceTex, roughness: 0.8 });
  const sideMat = new THREE.MeshStandardMaterial({ map: sideTex, roughness: 0.95 });

  // smaller again (panel: 4.32 -> 3.4, 1.76 -> 1.4)
  const panelW = 3.4, panelH = 1.4, panelD = 0.13;
  const panel = new THREE.Mesh(
    new THREE.BoxGeometry(panelW, panelH, panelD),
    [sideMat, sideMat, sideMat, sideMat, faceMat, sideMat]
  );
  panel.position.set(0, 2.55, 0);
  panel.rotation.z = -0.05;
  panel.castShadow = true;
  panel.receiveShadow = true;
  group.add(panel);

  // single wooden foot — SAME wood as the sign, sitting BEHIND the panel
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2.55, 0.3), sideMat);
  post.position.set(0, 1.275, -0.28);
  post.rotation.z = 0.02;
  post.castShadow = true;
  post.receiveShadow = true;
  group.add(post);

  // flat base block at the foot
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.16, 0.65), sideMat);
  base.position.set(0, 0.08, -0.28);
  base.castShadow = true;
  base.receiveShadow = true;
  group.add(base);

  // small dangling broken plank to keep the broken-down feel
  const broken = new THREE.Mesh(
    new THREE.BoxGeometry(0.85, 0.30, 0.12),
    sideMat
  );
  broken.position.set(panelW * 0.45, 1.85, 0.05);
  broken.rotation.z = -0.6;
  broken.castShadow = true;
  group.add(broken);

  return group;
}

function resetHead(baymax) {
  if (baymax.userData.head) baymax.userData.head.rotation.set(0, 0, 0);

function animateWalk(baymax, phase, intensity = 1.0) {
  const l = baymax.userData.limbs;
  if (!l) return;
  const s = Math.sin(phase);
  const legSwing = 0.16 * intensity;
  const armSwing = 0.10 * intensity;
  l.leftLeg .position.set(l.bases.leftLeg .x, l.bases.leftLeg .y + Math.max(0, s) * 0.04, l.bases.leftLeg .z + s * legSwing);
  l.rightLeg.position.set(l.bases.rightLeg.x, l.bases.rightLeg.y + Math.max(0, -s) * 0.04, l.bases.rightLeg.z - s * legSwing);
  l.leftArm .position.set(l.bases.leftArm .x, l.bases.leftArm .y, l.bases.leftArm .z - s * armSwing);
  l.rightArm.position.set(l.bases.rightArm.x, l.bases.rightArm.y, l.bases.rightArm.z + s * armSwing);
}

function resetWalk(baymax) {
  const l = baymax.userData.limbs;
  if (!l) return;
  l.leftLeg .position.copy(l.bases.leftLeg );
  l.rightLeg.position.copy(l.bases.rightLeg);
  l.leftArm .position.copy(l.bases.leftArm );
  l.rightArm.position.copy(l.bases.rightArm);
}

// ==========================================================================
// movement helper — shared by white world and cobblestone world
// ==========================================================================

function applyMovement(baymax, dt, keys, opts) {
  let dx = 0, dz = 0;
  if (keys['w'] || keys['arrowup'])    dz -= 1;
  if (keys['s'] || keys['arrowdown'])  dz += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  const len = Math.hypot(dx, dz);
  if (len > 0) {
    dx /= len; dz /= len;
    let nx = baymax.position.x + dx * opts.speed * dt;
    let nz = baymax.position.z + dz * opts.speed * dt;

    if (opts.hole) {
      const dCenter = Math.hypot(nx, nz);
      if (dCenter <= opts.hole.radius + opts.hole.buffer) {
        if (opts.hole.fall) {
          // Place him exactly at the rim along his approach vector and face
          // him in the direction of motion — the cinematic uses these to
          // animate him sliding from the approach side INTO the hole.
          const ang = Math.atan2(nz, nx);
          baymax.position.x = Math.cos(ang) * opts.hole.radius;
          baymax.position.z = Math.sin(ang) * opts.hole.radius;
          baymax.rotation.y = Math.atan2(dx, dz);
          return 'fell';
        } else {
          const ang = Math.atan2(nz, nx);
          const r = opts.hole.radius + opts.hole.buffer;
          nx = Math.cos(ang) * r;
          nz = Math.sin(ang) * r;
        }
      }
    }
    if (opts.bounds) {
      nx = Math.max(opts.bounds.minX, Math.min(opts.bounds.maxX, nx));
      nz = Math.max(opts.bounds.minZ, Math.min(opts.bounds.maxZ, nz));
    }
    // Optional custom validator for blocking off-screen / non-exit areas.
    // Returns true if (x,z) is allowed.  We try sliding along one axis.
    if (opts.validate) {
      const cx = baymax.position.x, cz = baymax.position.z;
      if (!opts.validate(nx, nz)) {
        if (opts.validate(nx, cz))      nz = cz;
        else if (opts.validate(cx, nz)) nx = cx;
        else { nx = cx; nz = cz; }
      }
    }

    baymax.position.x = nx;
    baymax.position.z = nz;

    const targetYaw = Math.atan2(dx, dz);
    let cur = baymax.rotation.y;
    let diff = targetYaw - cur;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    baymax.rotation.y = cur + diff * Math.min(1, dt * 12);

    opts.walkPhaseRef.value += dt * 14;
    baymax.position.y = (opts.baseY || 0) + Math.abs(Math.sin(opts.walkPhaseRef.value)) * 0.06;
    animateWalk(baymax, opts.walkPhaseRef.value, 1.0);
    return 'walking';
  } else {
    baymax.position.y = THREE.MathUtils.lerp(baymax.position.y, (opts.baseY || 0), Math.min(1, dt * 8));
    resetWalk(baymax);
    return 'idle';
  }
}

// ==========================================================================
// Cute footstep audio
// ==========================================================================
let _sharedAudioCtx = null;
let _soundOn = true;
try { _soundOn = localStorage.getItem('noah_sound_off') !== '1'; } catch (_) {}
function _getAudioCtx() {
  if (_sharedAudioCtx) return _sharedAudioCtx;
  const Ctor = window.AudioContext || window.webkitAudioContext;
  if (!Ctor) return null;
  try { _sharedAudioCtx = new Ctor(); } catch (_) { _sharedAudioCtx = null; }
  return _sharedAudioCtx;
}
function setSoundOn(on) {
  _soundOn = !!on;
  try { localStorage.setItem('noah_sound_off', _soundOn ? '0' : '1'); } catch (_) {}
  // mute the intro video too when sound is off
  const v = document.getElementById('intro-video');
  if (v) v.muted = !_soundOn;
}
function playFootstep() {
  if (!_soundOn) return;
  const actx = _getAudioCtx();
  if (!actx) return;
  // Soft mix of a kick body + water-drop plink, layered for a cute step
  // sound.  Both voices use sine waves with quick pitch drops; volumes
  // dialled low so the overall feel stays gentle.
  const now = actx.currentTime;

  // ----- Kick body (the thump) -----
  const kickF0 = 130 + Math.random() * 22;          // ~130–152 Hz
  const kickOsc = actx.createOscillator();
  kickOsc.type = 'sine';
  kickOsc.frequency.setValueAtTime(kickF0, now);
  kickOsc.frequency.exponentialRampToValueAtTime(46, now + 0.10);
  const kickGain = actx.createGain();
  kickGain.gain.setValueAtTime(0.0001, now);
  kickGain.gain.exponentialRampToValueAtTime(0.030, now + 0.018);
  kickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
  kickOsc.connect(kickGain); kickGain.connect(actx.destination);
  kickOsc.start(now);
  kickOsc.stop(now + 0.24);

  // ----- Water-drop "plink" (the bright top) -----
  const dropF0 = 1100 + Math.random() * 350;        // ~1100–1450 Hz
  const dropOsc = actx.createOscillator();
  dropOsc.type = 'sine';
  dropOsc.frequency.setValueAtTime(dropF0, now);
  dropOsc.frequency.exponentialRampToValueAtTime(260, now + 0.07);
  // Soft low-pass to keep the plink from being shrill
  const dropLP = actx.createBiquadFilter();
  dropLP.type = 'lowpass';
  dropLP.frequency.value = 3200;
  dropLP.Q.value = 0.6;
  const dropGain = actx.createGain();
  dropGain.gain.setValueAtTime(0.0001, now);
  dropGain.gain.exponentialRampToValueAtTime(0.018, now + 0.010);
  dropGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
  dropOsc.connect(dropLP); dropLP.connect(dropGain); dropGain.connect(actx.destination);
  dropOsc.start(now);
  dropOsc.stop(now + 0.18);
}
let _footstepTimer = 0;
function maybeFootstep(isWalking, dt) {
  if (!isWalking) { _footstepTimer = 0; return; }
  _footstepTimer -= dt;
  if (_footstepTimer <= 0) {
    playFootstep();
    _footstepTimer = 0.34;            // one step every ~0.34 s while walking
  }
}

function buildWhiteWorld() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  scene.add(new THREE.HemisphereLight(0xffffff, 0xeeeeee, 0.4));
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  sun.position.set(6, 12, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -18;
  sun.shadow.camera.right = 18;
  sun.shadow.camera.top = 18;
  sun.shadow.camera.bottom = -18;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 50;
  sun.shadow.bias = -0.0005;
  scene.add(sun);

  const FLOOR_HALF = 60;
  const shape = new THREE.Shape();
  shape.moveTo(-FLOOR_HALF, -FLOOR_HALF);
  shape.lineTo( FLOOR_HALF, -FLOOR_HALF);
  shape.lineTo( FLOOR_HALF,  FLOOR_HALF);
  shape.lineTo(-FLOOR_HALF,  FLOOR_HALF);
  shape.lineTo(-FLOOR_HALF, -FLOOR_HALF);
  const holePath = new THREE.Path();
  holePath.absarc(0, 0, HOLE_RADIUS, 0, Math.PI * 2, true);
  shape.holes.push(holePath);
  const floorGeom = new THREE.ShapeGeometry(shape, 64);
  floorGeom.rotateX(-Math.PI / 2);
  const floor = new THREE.Mesh(
    floorGeom,
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.95 })
  );
  floor.receiveShadow = true;
  scene.add(floor);

  const SHAFT_DEPTH = 10;
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(HOLE_RADIUS, HOLE_RADIUS * 0.85, SHAFT_DEPTH, 64, 1, true),
    new THREE.MeshStandardMaterial({ color: 0x050505, side: THREE.BackSide, roughness: 1.0 })
  );
  shaft.position.y = -SHAFT_DEPTH / 2 - 0.005;
  scene.add(shaft);

  // soft fill light inside the shaft so Baymax stays visible while falling
  const shaftLight = new THREE.PointLight(0xffffff, 2.6, 8, 1.4);
  shaftLight.position.set(0, -0.8, 0);
  scene.add(shaftLight);

  const bottom = new THREE.Mesh(
    new THREE.CircleGeometry(HOLE_RADIUS * 1.05, 64),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  bottom.rotation.x = -Math.PI / 2;
  bottom.position.y = -SHAFT_DEPTH - 0.01;
  scene.add(bottom);

  const rimGeom = new THREE.RingGeometry(HOLE_RADIUS, HOLE_RADIUS + 0.06, 64);
  rimGeom.rotateX(-Math.PI / 2);
  const rim = new THREE.Mesh(
    rimGeom,
    new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide })
  );
  rim.position.y = 0.001;
  scene.add(rim);

  const sign = buildSign();
  const signClockAngle = THREE.MathUtils.degToRad(30);
  const signDist = 2.85;            // a touch closer to the hole
  sign.scale.setScalar(0.85);       // panel + post + text all 15% smaller
  sign.position.set(
    Math.sin(signClockAngle) * signDist,
    0,
    -Math.cos(signClockAngle) * signDist
  );

  const baymax = buildBaymax();
  baymax.scale.setScalar(BAYMAX_SCALE);
  // YXZ order: yaw (Y) is applied before pitch (X) so tipping forward
  // happens in the body's current facing direction
  baymax.rotation.order = 'YXZ';
  // spawn on the LEFT (negative X)
  const SPAWN = new THREE.Vector3(-3.4, -2.5, 4.1);
  baymax.position.copy(SPAWN);
  scene.add(baymax);

  const emergePatch = new THREE.Mesh(
    new THREE.CircleGeometry(0.65, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.0 })
  );
  emergePatch.rotation.x = -Math.PI / 2;
  emergePatch.position.set(SPAWN.x, 0.002, SPAWN.z);
  scene.add(emergePatch);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, ORIG_CAM_DIST * Math.sin(ORIG_CAM_ANGLE), ORIG_CAM_DIST * Math.cos(ORIG_CAM_ANGLE));
  camera.lookAt(0, 0.7, 0);

  // sign faces camera horizontally
  {
    const dx = camera.position.x - sign.position.x;
    const dz = camera.position.z - sign.position.z;
    sign.rotation.y = Math.atan2(dx, dz);
  }
  scene.add(sign);

  return {
    scene, camera, baymax, emergePatch,
    spawn: SPAWN,
    crawlT: 0,
    walkPhaseRef: { value: 0 },
    touchedHole: false,
  };
}

// ==========================================================================
// Scene 3 — PSYCHEDELIC TRIP
// ==========================================================================

function buildPsychScene() {
  // Underwater scene.  Still water with a top-to-bottom blue gradient,
  // bubbles rising in the background, baymax sinking and trying to swim up.
  const scene = new THREE.Scene();

  // gradient background — light/dark blue at top, very dark blue at bottom,
  // with subtle caustic shimmer near the top
  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:   { value: 0 },
      uAspect: { value: window.innerWidth / window.innerHeight },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.999, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform float uTime;
      uniform float uAspect;
      varying vec2 vUv;

      void main() {
        // Bright at the top with NO darkening — the upper half is held at the
        // bright turquoise top color, only the lower portion darkens.
        vec3 topColor = vec3(0.55, 0.92, 0.92);   // bright turquoise
        vec3 midColor = vec3(0.28, 0.72, 0.78);   // mid sea blue
        vec3 botColor = vec3(0.10, 0.30, 0.42);   // mild dark blue
        float h = pow(vUv.y, 0.45);
        vec3 col = mix(botColor, midColor, smoothstep(0.0, 0.32, h));
        // hold topColor across the entire upper half
        col = mix(col, topColor, smoothstep(0.32, 0.55, h));

        // sparkle / caustics across the upper half
        float caust =
          sin(vUv.x * 22.0 + sin(vUv.y * 4.0 + uTime * 0.4) * 1.4) *
          sin(vUv.y * 16.0 - uTime * 0.3);
        caust = max(0.0, caust);
        col += vec3(0.18, 0.26, 0.28) * caust * smoothstep(0.40, 1.0, vUv.y) * 0.35;

        // no vignette darkening at the top — only on the lower corners
        float vig = 1.0 - smoothstep(0.65, 1.15, length((vUv - 0.5) * vec2(uAspect, 1.0)));
        float bottomMask = 1.0 - smoothstep(0.0, 0.55, vUv.y);
        col *= mix(1.0, mix(0.97, 1.0, vig), bottomMask);

        gl_FragColor = vec4(col, 1.0);
      }
    `,
    depthTest: false,
    depthWrite: false,
  });
  const bg = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat);
  bg.frustumCulled = false;
  bg.renderOrder = -1;
  scene.add(bg);

  // soft underwater lighting (bluish top-down)
  scene.add(new THREE.AmbientLight(0xb8d4ee, 0.55));
  const surface = new THREE.DirectionalLight(0xcfe6ff, 0.85);
  surface.position.set(0, 6, 2);
  scene.add(surface);

  // baymax — smaller so the ocean reads as vast around him
  const baymax = buildBaymax();
  baymax.scale.setScalar(0.95);
  baymax.position.set(0, 2.2, 0);
  scene.add(baymax);

  // small bubble pool — bubbles spawn from baymax's mouth and drift upward.
  // Each bubble has its own material so it can fade independently as it rises.
  const bubbles = [];
  const sharedGeom = new THREE.SphereGeometry(1, 10, 8);
  for (let i = 0; i < 60; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.0,                // hidden until emitted
      depthWrite: false,
    });
    const b = new THREE.Mesh(sharedGeom, mat);
    b.scale.setScalar(0.04);       // small
    b.visible = false;
    b.userData = {
      alive: false,
      age: 0,
      life: 0,
      speed: 0,
      wobblePhase: 0,
      wobbleFreq: 0,
      wobbleAmp: 0,
    };
    scene.add(b);
    bubbles.push(b);
  }

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 8);
  camera.lookAt(0, 0, 0);

  return {
    scene, camera, baymax, bgMat, bubbles,
    bubbleEmitT: 0,
  };
}

function buildCobblestoneCanvas() {
  const W = 1536, H = 1536;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // dark mortar base
  ctx.fillStyle = '#15161a';
  ctx.fillRect(0, 0, W, H);

  // mortar grit
  for (let i = 0; i < 6000; i++) {
    const v = 14 + Math.floor(Math.random() * 28);
    ctx.fillStyle = `rgb(${v},${v},${v + 2})`;
    ctx.fillRect(Math.random() * W, Math.random() * H, 1.4, 1.4);
  }

  // stones laid out on a jittered grid
  const cols = 17, rows = 17;
  const cellW = W / cols, cellH = H / rows;
  const stones = [];
  for (let i = -1; i <= rows; i++) {
    for (let j = -1; j <= cols; j++) {
      const cx = (j + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.55;
      const cy = (i + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.55;
      const ra = cellW * (0.42 + Math.random() * 0.18);
      const rb = cellH * (0.4  + Math.random() * 0.20);
      const rot = Math.random() * Math.PI;
      stones.push({ cx, cy, ra, rb, rot });
    }
  }

  // make polygonal stone outline by perturbing an ellipse
  function stonePath(cx, cy, ra, rb, rot, irreg = 0.18) {
    const pts = 18 + Math.floor(Math.random() * 6);
    ctx.beginPath();
    for (let k = 0; k < pts; k++) {
      const a = (k / pts) * Math.PI * 2;
      const r = 1 + (Math.random() - 0.5) * irreg;
      const px = Math.cos(a) * ra * r;
      const py = Math.sin(a) * rb * r;
      const cosR = Math.cos(rot), sinR = Math.sin(rot);
      const x = cx + px * cosR - py * sinR;
      const y = cy + px * sinR + py * cosR;
      if (k === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  for (const s of stones) {
    const tintRoll = Math.random();
    let tone;
    if (tintRoll < 0.18) tone = 'brown';
    else if (tintRoll < 0.42) tone = 'cool';
    else if (tintRoll < 0.58) tone = 'warm';
    else tone = 'gray';

    const baseV = 36 + Math.random() * 36;
    let r, g, b;
    if (tone === 'brown')      { r = baseV + 14; g = baseV + 4;  b = baseV - 6;  }
    else if (tone === 'cool')  { r = baseV - 4;  g = baseV;       b = baseV + 12; }
    else if (tone === 'warm')  { r = baseV + 8;  g = baseV + 6;   b = baseV;      }
    else                       { r = baseV;      g = baseV;       b = baseV + 2;  }
    const v = Math.random() * 10;
    r += v; g += v; b += v;

    // shadow under stone
    ctx.fillStyle = `rgba(0, 0, 0, 0.55)`;
    stonePath(s.cx + 1.5, s.cy + 2.5, s.ra * 0.96, s.rb * 0.92, s.rot, 0.1);
    ctx.fill();

    // body fill
    ctx.fillStyle = `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
    stonePath(s.cx, s.cy, s.ra * 0.95, s.rb * 0.9, s.rot, 0.15);
    ctx.fill();

    // soft top highlight via radial gradient (light from upper-left)
    const grad = ctx.createRadialGradient(
      s.cx - s.ra * 0.4, s.cy - s.rb * 0.4, 0,
      s.cx, s.cy, Math.max(s.ra, s.rb)
    );
    grad.addColorStop(0,   `rgba(255, 255, 255, 0.16)`);
    grad.addColorStop(0.45, `rgba(255, 255, 255, 0.04)`);
    grad.addColorStop(1,   `rgba(0, 0, 0, 0.18)`);
    ctx.fillStyle = grad;
    stonePath(s.cx, s.cy, s.ra * 0.95, s.rb * 0.9, s.rot, 0.15);
    ctx.fill();

    // surface speckles
    for (let k = 0; k < 14; k++) {
      const sx = s.cx + (Math.random() - 0.5) * s.ra * 1.5;
      const sy = s.cy + (Math.random() - 0.5) * s.rb * 1.3;
      const sR = 0.6 + Math.random() * 1.6;
      const dark = Math.random() < 0.65;
      ctx.fillStyle = dark
        ? `rgba(0, 0, 0, ${0.12 + Math.random() * 0.22})`
        : `rgba(255, 255, 255, ${0.04 + Math.random() * 0.07})`;
      ctx.beginPath();
      ctx.arc(sx, sy, sR, 0, Math.PI * 2);
      ctx.fill();
    }

    // crack on a few stones
    if (Math.random() < 0.18) {
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 0.7 + Math.random() * 0.6;
      ctx.beginPath();
      let px = s.cx + (Math.random() - 0.5) * s.ra * 0.6;
      let py = s.cy + (Math.random() - 0.5) * s.rb * 0.6;
      ctx.moveTo(px, py);
      const segs = 3 + Math.floor(Math.random() * 5);
      for (let k = 0; k < segs; k++) {
        px += (Math.random() - 0.5) * 16;
        py += (Math.random() - 0.5) * 16;
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // chipped corner darker spot
    if (Math.random() < 0.22) {
      const a = Math.random() * Math.PI * 2;
      const cx = s.cx + Math.cos(a) * s.ra * 0.7;
      const cy = s.cy + Math.sin(a) * s.rb * 0.7;
      const cr = 3 + Math.random() * 5;
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
      cg.addColorStop(0, 'rgba(0,0,0,0.55)');
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, Math.PI * 2);
      ctx.fill();
    }

    // faint crescent highlight on the upper rim
    ctx.strokeStyle = `rgba(255, 255, 255, 0.13)`;
    ctx.lineWidth = 1.2;
    ctx.save();
    ctx.translate(s.cx, s.cy);
    ctx.rotate(s.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, s.ra * 0.83, s.rb * 0.78, 0, Math.PI * 0.85, Math.PI * 1.55);
    ctx.stroke();
    ctx.restore();
  }

  // moss tufts in the seams
  for (let i = 0; i < 38; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const size = 5 + Math.random() * 14;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
    grad.addColorStop(0,   'rgba(60, 80, 35, 0.55)');
    grad.addColorStop(0.6, 'rgba(35, 55, 25, 0.32)');
    grad.addColorStop(1,   'rgba(30, 45, 20, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
    // little fibers
    for (let k = 0; k < 8; k++) {
      ctx.strokeStyle = `rgba(${50 + Math.random() * 25}, ${75 + Math.random() * 25}, ${30 + Math.random() * 15}, ${0.4 + Math.random() * 0.3})`;
      ctx.lineWidth = 0.5 + Math.random() * 0.6;
      ctx.beginPath();
      const fx = x + (Math.random() - 0.5) * size;
      const fy = y + (Math.random() - 0.5) * size;
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + (Math.random() - 0.5) * 4, fy - 2 - Math.random() * 4);
      ctx.stroke();
    }
  }

  // pebbles scattered in seams
  for (let i = 0; i < 320; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 0.7 + Math.random() * 1.6;
    const v = 50 + Math.random() * 35;
    ctx.fillStyle = `rgb(${v}, ${v}, ${v + 4})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // damp / wet patches
  for (let i = 0; i < 8; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 80 + Math.random() * 130;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, 'rgba(0,0,0,0.32)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    // a tiny shine highlight in the middle of the wet patch
    if (Math.random() < 0.7) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      ctx.ellipse(x + (Math.random() - 0.5) * 20, y + (Math.random() - 0.5) * 20, 18 + Math.random() * 16, 6 + Math.random() * 5, Math.random() * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // global fine grain
  const img = ctx.getImageData(0, 0, W, H);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 14;
    img.data[i]   = Math.max(0, Math.min(255, img.data[i]   + n));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n));
  }
  ctx.putImageData(img, 0, 0);

  // overall vignette
  const v = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.78);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.32)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);

  return c;
}

function buildLampPost() {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.65, metalness: 0.4 });

  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.4, 0.5, 20), mat);
  base.position.y = 0.25;
  base.castShadow = true;
  g.add(base);

  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, 5.5, 16), mat);
  pole.position.y = 3.25;
  pole.castShadow = true;
  g.add(pole);

function buildSandCanvas() {
  // Higher-resolution sand texture with multiple layers:
  // base gradient → tonal patches → fine grain → coarser grain → ripples →
  // pebbles & shells → footprint dimples → final speckle pass.
  const W = 1024, H = 1024;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // 1) base — slight diagonal gradient so it doesn't look perfectly flat
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0.0, '#f1e2bd');
  grad.addColorStop(0.5, '#ead7ab');
  grad.addColorStop(1.0, '#efdcb4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 2) low-frequency tonal patches (lighter & darker zones)
  for (let i = 0; i < 22; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 80 + Math.random() * 200;
    const dark = Math.random() < 0.55;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    if (dark) {
      g.addColorStop(0,   'rgba(165, 135, 85, 0.20)');
      g.addColorStop(0.6, 'rgba(165, 135, 85, 0.07)');
      g.addColorStop(1,   'rgba(165, 135, 85, 0)');
    } else {
      g.addColorStop(0,   'rgba(255, 245, 215, 0.18)');
      g.addColorStop(0.6, 'rgba(255, 245, 215, 0.06)');
      g.addColorStop(1,   'rgba(255, 245, 215, 0)');
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 3) fine sand grain — many tiny single-pixel speckles
  for (let i = 0; i < 60000; i++) {
    const v = 195 + Math.random() * 55;
    const r = v;
    const g = v - 18 - Math.random() * 8;
    const b = v - 50 - Math.random() * 12;
    ctx.fillStyle = `rgba(${r},${g},${b},${0.25 + Math.random() * 0.45})`;
    ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
  }

  // 4) coarser darker grain — slightly larger speckles for tactile feel
  for (let i = 0; i < 6000; i++) {
    ctx.fillStyle = `rgba(${110 + Math.random() * 50},${85 + Math.random() * 35},${50 + Math.random() * 25},${0.10 + Math.random() * 0.25})`;
    const sz = 1 + Math.random() * 1.4;
    ctx.fillRect(Math.random() * W, Math.random() * H, sz, sz);
  }

  // 5) sand ripples — soft long parallel waves (rake-line look)
  for (let i = 0; i < 14; i++) {
    const cy = Math.random() * H;
    const amp = 4 + Math.random() * 14;
    const freq = 0.004 + Math.random() * 0.012;
    const phase = Math.random() * Math.PI * 2;
    ctx.strokeStyle = `rgba(180, 152, 105, ${0.05 + Math.random() * 0.10})`;
    ctx.lineWidth = 4 + Math.random() * 9;
    ctx.beginPath();
    ctx.moveTo(0, cy);
    for (let x = 0; x <= W; x += 6) {
      ctx.lineTo(x, cy + Math.sin(x * freq + phase) * amp);
    }
    ctx.stroke();
  }

  // 6) damp / shadowed depressions
  for (let i = 0; i < 9; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 30 + Math.random() * 70;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(110, 80, 45, 0.22)');
    g.addColorStop(1, 'rgba(110, 80, 45, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 7) pebbles, shells, and tiny stones
  for (let i = 0; i < 220; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 1.5 + Math.random() * 5;
    const tone = Math.random();
    let fill;
    if (tone < 0.30) {
      // dark pebble
      fill = `rgba(${90 + Math.random() * 35},${65 + Math.random() * 30},${45 + Math.random() * 20},${0.55 + Math.random() * 0.30})`;
    } else if (tone < 0.65) {
      // pale shell
      fill = `rgba(${235 + Math.random() * 20},${215 + Math.random() * 20},${190 + Math.random() * 25},${0.80 + Math.random() * 0.15})`;
    } else if (tone < 0.85) {
      // light pebble
      fill = `rgba(${215 + Math.random() * 20},${195 + Math.random() * 20},${165 + Math.random() * 25},${0.60 + Math.random() * 0.30})`;
    } else {
      // pinkish shell
      fill = `rgba(${235 + Math.random() * 18},${190 + Math.random() * 20},${175 + Math.random() * 25},${0.70 + Math.random() * 0.20})`;
    }
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * (0.55 + Math.random() * 0.35), Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
    // tiny rim highlight on bigger pebbles
    if (r > 3.0 && Math.random() < 0.6) {
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.ellipse(x - r * 0.2, y - r * 0.2, r * 0.85, r * (0.4 + Math.random() * 0.2), Math.random() * Math.PI, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // 8) faint footprint dimples — small darker oval indents
  for (let group = 0; group < 3; group++) {
    const cx = Math.random() * W;
    const cy = Math.random() * H;
    const dirX = (Math.random() - 0.5) * 2;
    const dirY = (Math.random() - 0.5) * 2;
    const len = Math.hypot(dirX, dirY) || 1;
    for (let i = 0; i < 5; i++) {
      const fx = cx + (i * 18) * dirX / len + ((i % 2) * 8 - 4);
      const fy = cy + (i * 18) * dirY / len + ((i % 2) * 6 - 3);
      const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, 7);
      g.addColorStop(0, 'rgba(95, 70, 35, 0.20)');
      g.addColorStop(1, 'rgba(95, 70, 35, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(fx, fy, 6, 4, Math.atan2(dirY, dirX), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 9) final very fine speckle pass for grit
  for (let i = 0; i < 25000; i++) {
    ctx.fillStyle = `rgba(${130 + Math.random() * 80},${95 + Math.random() * 50},${55 + Math.random() * 30},${Math.random() * 0.18})`;
    ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
  }

  return c;
}

function buildBeachWater() {
  // smaller plane, only the actual sea area (no overlap with sand)
  const geom = new THREE.PlaneGeometry(140, 30, 96, 60);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      uniform float uTime;
      varying vec2 vUv;
      varying float vWave;
      void main() {
        vUv = uv;
        vec3 p = position;
        // Wave crests run along world X (= local X). Wave moves along local -Y,
        // which after rotation.x = -PI/2 corresponds to world +Z — i.e. toward
        // baymax sitting on the deck.
        float w1 = sin(p.y * 0.65 + uTime * 1.4) * 0.22;
        float w2 = sin(p.y * 1.30 + uTime * 1.9 + p.x * 0.05) * 0.10;
        float w3 = sin(p.y * 2.40 + uTime * 2.3) * 0.05;
        p.z += w1 + w2 + w3;
        vWave = w1 + w2 + w3;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
      }
    `,
    fragmentShader: `
      varying vec2 vUv;
      varying float vWave;
      void main() {
        vec3 deep  = vec3(0.06, 0.42, 0.55);
        vec3 mid   = vec3(0.18, 0.65, 0.74);
        vec3 light = vec3(0.55, 0.87, 0.85);
        // vUv.y = 1 is the side closer to baymax (shore), so lighter there
        vec3 col = mix(deep, mid, smoothstep(0.0, 0.55, vUv.y));
        col = mix(col, light, smoothstep(0.75, 1.0, vUv.y));

        float crest = smoothstep(0.16, 0.36, vWave);
        col = mix(col, vec3(1.0), crest);

        float spark = smoothstep(0.06, 0.16, vWave);
        col = mix(col, vec3(0.95, 1.0, 1.0), spark * 0.25);

        gl_FragColor = vec4(col, 1.0);
      }
    `,
    side: THREE.DoubleSide,
  });
  const water = new THREE.Mesh(geom, mat);
  water.rotation.x = -Math.PI / 2;
  return { mesh: water, mat };
}

function buildDeck() {
  const g = new THREE.Group();
  const deckTex = new THREE.CanvasTexture(buildWoodCanvas(512, 256));
  deckTex.wrapS = THREE.RepeatWrapping;
  deckTex.wrapT = THREE.RepeatWrapping;
  deckTex.colorSpace = THREE.SRGBColorSpace;
  deckTex.repeat.set(1.4, 1);
  const mat = new THREE.MeshStandardMaterial({ map: deckTex, roughness: 0.85 });

  const planks = 7;
  const plankW = 6.5, plankD = 0.62, gap = 0.04;
  for (let i = 0; i < planks; i++) {
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankW, 0.10, plankD), mat);
    plank.position.set(0, 0.05, -((planks - 1) / 2) * (plankD + gap) + i * (plankD + gap));
    plank.receiveShadow = true;
    plank.castShadow = true;
    g.add(plank);
  }

  // small front lip / step
  const lip = new THREE.Mesh(new THREE.BoxGeometry(plankW, 0.08, 0.3), mat);
  lip.position.set(0, 0.02, ((planks) / 2) * (plankD + gap));
  lip.receiveShadow = true;
  g.add(lip);

  return g;
}

function buildBeachChair() {
  const g = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.85 });
  const linenMat = new THREE.MeshStandardMaterial({
    color: 0xf3e8c8,
    roughness: 0.95,
    side: THREE.DoubleSide,
  });

  // 4 wooden legs (front a touch taller than back so the chair reclines)
  const frontLegH = 0.55, backLegH = 0.45;
  const legW = 0.06;
  const legPositions = [
    [-0.34, frontLegH / 2,  0.55, frontLegH],
    [ 0.34, frontLegH / 2,  0.55, frontLegH],
    [-0.34, backLegH / 2,  -0.45, backLegH],
    [ 0.34, backLegH / 2,  -0.45, backLegH],
  ];
  for (const [x, y, z, h] of legPositions) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(legW, h, legW), woodMat);
    leg.position.set(x, y, z);
    leg.castShadow = true;
    leg.receiveShadow = true;
    g.add(leg);
  }

  // wooden seat rails (left, right, front, back)
  const railSide = new THREE.BoxGeometry(legW, legW, 1.05);
  for (const x of [-0.34, 0.34]) {
    const rail = new THREE.Mesh(railSide, woodMat);
    rail.position.set(x, frontLegH - 0.04, 0.05);
    rail.rotation.x = 0.10;          // slight backward tilt
    rail.castShadow = true;
    g.add(rail);
  }
  for (const z of [0.55, -0.45]) {
    const cross = new THREE.Mesh(new THREE.BoxGeometry(0.74, legW, legW), woodMat);
    cross.position.set(0, (z > 0 ? frontLegH : backLegH) - 0.04, z);
    cross.castShadow = true;
    g.add(cross);
  }

  // linen seat (a sagging plane stretched between the side rails)
  const seatGeom = new THREE.PlaneGeometry(0.70, 1.04, 10, 10);
  {
    const pos = seatGeom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i);
      const sag = -0.05 *
        Math.cos((x / 0.35) * (Math.PI / 2)) *
        Math.cos((y / 0.52) * (Math.PI / 2));
      pos.setZ(i, sag);
    }
    pos.needsUpdate = true;
    seatGeom.computeVertexNormals();
  }
  const seat = new THREE.Mesh(seatGeom, linenMat);
  seat.rotation.x = -Math.PI / 2 + 0.10;
  seat.position.set(0, frontLegH - 0.03, 0.05);
  seat.castShadow = true;
  seat.receiveShadow = true;
  g.add(seat);

  // backrest wooden uprights
  const backH = 1.0;
  for (const x of [-0.34, 0.34]) {
    const up = new THREE.Mesh(new THREE.BoxGeometry(legW, backH, legW), woodMat);
    up.position.set(x, backLegH + backH / 2 - 0.05, -0.5);
    up.rotation.x = -0.22;            // recline
    up.castShadow = true;
    g.add(up);
  }
  // top crossbar
  const topBar = new THREE.Mesh(new THREE.BoxGeometry(0.74, legW, legW), woodMat);
  topBar.position.set(0, backLegH + backH - 0.05, -0.7);
  topBar.castShadow = true;
  g.add(topBar);

  // linen backrest (sagging slightly)
  const backGeom = new THREE.PlaneGeometry(0.68, backH, 10, 10);
  {
    const pos = backGeom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const sag = -0.04 * Math.cos((x / 0.34) * (Math.PI / 2));
      pos.setZ(i, sag);
    }
    pos.needsUpdate = true;
    backGeom.computeVertexNormals();
  }
  const backLinen = new THREE.Mesh(backGeom, linenMat);
  backLinen.position.set(0, backLegH + backH / 2 - 0.05, -0.55);
  backLinen.rotation.x = -0.22;
  backLinen.castShadow = true;
  backLinen.receiveShadow = true;
  g.add(backLinen);

  // armrests
  const armGeom = new THREE.BoxGeometry(legW, legW, 0.85);
  for (const x of [-0.40, 0.40]) {
    const arm = new THREE.Mesh(armGeom, woodMat);
    arm.position.set(x, frontLegH + 0.30, 0.10);
    arm.castShadow = true;
    g.add(arm);
    // armrest support strut down to seat rail
    const strut = new THREE.Mesh(new THREE.BoxGeometry(legW, 0.30, legW), woodMat);
    strut.position.set(x, frontLegH + 0.15, 0.40);
    strut.castShadow = true;
    g.add(strut);
  }

  // expose seat position for the sit animation
  g.userData.seatWorld = new THREE.Vector3(0, frontLegH + 0.05, 0.05);
  return g;
}

function buildBeachCanopy() {
  const g = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x6b3e1d, roughness: 0.85 });
  const linenMat = new THREE.MeshStandardMaterial({
    color: 0xf3e8c8,
    roughness: 0.95,
    side: THREE.DoubleSide,
  });

  const POST_H = 2.6;
  const W = 3.4, D = 2.6;

  // 4 vertical posts
  for (const sx of [-1, 1]) {
    for (const sz of [-1, 1]) {
      const post = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.06, POST_H, 12),
        woodMat
      );
      post.position.set(sx * W / 2, POST_H / 2, sz * D / 2);
      post.castShadow = true;
      g.add(post);
    }
  }

  // top wooden frame (4 horizontal beams)
  const frameMat = woodMat;
  for (const sz of [-1, 1]) {
    const beam = new THREE.Mesh(new THREE.BoxGeometry(W + 0.12, 0.06, 0.06), frameMat);
    beam.position.set(0, POST_H, sz * D / 2);
    beam.castShadow = true;
    g.add(beam);
  }
  for (const sx of [-1, 1]) {
    const beam = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, D), frameMat);
    beam.position.set(sx * W / 2, POST_H, 0);
    beam.castShadow = true;
    g.add(beam);
  }

  // flowy linen canopy — a sagging plane stretched across the frame
  const cloth = new THREE.PlaneGeometry(W * 1.12, D * 1.12, 24, 16);
  {
    const pos = cloth.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i);
      const xn = x / (W * 0.55);
      const yn = y / (D * 0.55);
      const sag = -0.28 *
        Math.cos(xn * Math.PI / 2) *
        Math.cos(yn * Math.PI / 2);
      // gentle ripple along one direction so it reads as flowy fabric
      const ripple = 0.04 * Math.sin(xn * 4.0) * Math.cos(yn * 2.5);
      pos.setZ(i, sag + ripple);
    }
    pos.needsUpdate = true;
    cloth.computeVertexNormals();
  }
  const canopy = new THREE.Mesh(cloth, linenMat);
  canopy.rotation.x = -Math.PI / 2;
  canopy.position.set(0, POST_H + 0.04, 0);
  canopy.castShadow = true;
  canopy.receiveShadow = true;
  g.add(canopy);

  // small cloth overhang flapping off one side, for character
  const flapGeom = new THREE.PlaneGeometry(W * 0.55, 0.7, 12, 6);
  {
    const pos = flapGeom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      const sag = -0.06 * Math.cos((y / 0.35) * (Math.PI / 2));
      pos.setZ(i, sag);
    }
    pos.needsUpdate = true;
    flapGeom.computeVertexNormals();
  }
  const flap = new THREE.Mesh(flapGeom, linenMat);
  flap.position.set(0, POST_H - 0.30, D / 2 + 0.02);
  flap.rotation.x = -0.18;
  flap.castShadow = true;
  g.add(flap);

  return g;
}

function buildBeachClouds() {
  const g = new THREE.Group();
  const cloudMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.78,
    depthWrite: false,
  });
  const clouds = [];
  // more, varied thin clouds drifting left → right (+X)
  for (let i = 0; i < 14; i++) {
    const cloud = new THREE.Group();
    const num = 3 + Math.floor(Math.random() * 4);
    for (let j = 0; j < num; j++) {
      const r = 0.9 + Math.random() * 1.5;
      const blob = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 8), cloudMat);
      blob.position.set(j * 0.9 - num * 0.45, Math.random() * 0.25, 0);
      blob.scale.set(1.0, 0.16 + Math.random() * 0.05, 0.40);
      cloud.add(blob);
    }
    cloud.position.set(
      (Math.random() - 0.5) * 50,
      8.5 + Math.random() * 5.5,
      -34 - Math.random() * 12
    );
    cloud.userData.driftSpeed = 0.20 + Math.random() * 0.45;
    g.add(cloud);
    clouds.push(cloud);

  g.userData.clouds = clouds;
  return g;
}

function buildBeachScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xa6dbe9);
  scene.fog = new THREE.FogExp2(0xb6e0e6, 0.010);

  // lighting — bright sunny
  scene.add(new THREE.HemisphereLight(0xfff8e8, 0xc8a070, 0.65));
  scene.add(new THREE.AmbientLight(0xffffff, 0.25));
  const sun = new THREE.DirectionalLight(0xfff0c8, 1.6);
  sun.position.set(7, 18, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -15;
  sun.shadow.camera.right = 15;
  sun.shadow.camera.top = 15;
  sun.shadow.camera.bottom = -15;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 60;
  sun.shadow.bias = -0.0004;
  scene.add(sun);

  // === LAYOUT ===
  // foreground: wooden deck (where he sits)
  // beyond deck: a stretch of bumpy sand
  // ~20 m back from the deck: water (sea), confined to its own plane
  const DECK_FRONT_Z      =  1.4;
  const DECK_BACK_Z       = -1.6;
  const SEA_FRONT_EDGE_Z  = DECK_BACK_Z - 20;        // = -21.6
  const WATER_PLANE_DEPTH = 30;                       // water plane geometry depth
  const WATER_CENTER_Z    = SEA_FRONT_EDGE_Z - WATER_PLANE_DEPTH / 2;  // = -36.6
  const WATER_Z           = WATER_CENTER_Z;          // back-compat alias

  // sand — fills the visible ground area; bumpy displaced vertices
  const sandTex = new THREE.CanvasTexture(buildSandCanvas());
  sandTex.wrapS = THREE.RepeatWrapping;
  sandTex.wrapT = THREE.RepeatWrapping;
  sandTex.colorSpace = THREE.SRGBColorSpace;
  sandTex.repeat.set(10, 10);

  // sand plane covers everything from the sea front edge forward to in front of the camera
  const SAND_DEPTH = SEA_FRONT_EDGE_Z * -1 + 10;     // from z = SEA_FRONT_EDGE_Z to z = +10
  const SAND_CENTER_Z = SEA_FRONT_EDGE_Z + SAND_DEPTH / 2;
  const sandGeom = new THREE.PlaneGeometry(140, SAND_DEPTH, 140, Math.floor(SAND_DEPTH * 1.5));
  const sandPos = sandGeom.attributes.position;
  for (let i = 0; i < sandPos.count; i++) {
    const x = sandPos.getX(i);
    const y = sandPos.getY(i);
    const h =
      Math.sin(x * 0.55 + y * 0.31) * 0.06 +
      Math.sin(x * 1.20 - y * 0.78) * 0.025 +
      Math.sin((x + y) * 0.18) * 0.04 +
      (Math.random() - 0.5) * 0.022;
    sandPos.setZ(i, h);
  }
  sandPos.needsUpdate = true;
  sandGeom.computeVertexNormals();

  const sand = new THREE.Mesh(
    sandGeom,
    new THREE.MeshStandardMaterial({ map: sandTex, roughness: 0.96 })
  );
  sand.rotation.x = -Math.PI / 2;
  sand.position.set(0, -0.005, SAND_CENTER_Z);
  sand.receiveShadow = true;
  scene.add(sand);

  // water — only in the sea area, no overlap with sand
  const water = buildBeachWater();
  water.mesh.position.set(0, 0.05, WATER_CENTER_Z);
  scene.add(water.mesh);

  // foam line right at the shoreline
  const foam = new THREE.Mesh(
    new THREE.PlaneGeometry(160, 1.0),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.65 })
  );
  foam.rotation.x = -Math.PI / 2;
  foam.position.set(0, 0.08, SEA_FRONT_EDGE_Z + 0.3);
  scene.add(foam);

  // shading canopy with linen roof above the chair area
  const canopy = buildBeachCanopy();
  canopy.position.set(0.0, 0, -0.2);
  scene.add(canopy);

  // a few thin clouds drifting in the distance
  const clouds = buildBeachClouds();
  scene.add(clouds);

  // deck — closer / smaller, sitting in front of the sand
  const deck = buildDeck();
  deck.position.set(0, 0, (DECK_FRONT_Z + DECK_BACK_Z) / 2);
  scene.add(deck);

  // wooden + linen beach chair (replaces the hammock)
  const chair = buildBeachChair();
  chair.position.set(-0.5, 0, 0);
  chair.rotation.y = Math.PI;          // face the water (-Z)
  scene.add(chair);
  const seatWorld = chair.userData.seatWorld.clone()
    .applyEuler(chair.rotation)
    .add(chair.position);

  // side table
  const table = buildSideTable();
  table.position.set(0.85, 0, 0.05);
  scene.add(table);

  // cocktail (starts on the table top)
  const cocktail = buildCocktail();
  cocktail.position.set(table.position.x, table.userData.topY, table.position.z);
  scene.add(cocktail);

  // baymax — enters from the right-foreground onto the deck
  const baymax = buildBaymax();
  baymax.scale.setScalar(BAYMAX_SCALE);
  baymax.position.set(4.0, 0, 3.5);
  baymax.rotation.y = -Math.PI * 0.7;
  scene.add(baymax);

  // 3rd-person camera — over the right shoulder, water in front
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(4.0, 3.0, 4.5);
  camera.lookAt(-0.6, 1.1, -6);

  // "back..." is now a perfectly-straight HTML overlay (#beach-back, see CSS).
  // No 3D mesh required.

  return {
    scene, camera, baymax, cocktail, chair, table, water, canopy, clouds,
    seatWorld,
    cocktailStart: cocktail.position.clone(),
    walkPhaseRef: { value: 0 },
    phase: 'enter',
    satMarked: false,
    satTime: -1,
    backOpacities: [0, 0, 0, 0, 0, 0, 0],
    phaseT: 0,
  };
}
