      limbs.rightArm.rotation.z = -0.25 - armRotBonus;
      const legSwing = 0.06 * Math.sin(t * 4.0);
      limbs.leftLeg.position.set(
        limbs.bases.leftLeg.x,
        limbs.bases.leftLeg.y - 0.03 + legSwing,
        limbs.bases.leftLeg.z - 0.06
      );
      limbs.rightLeg.position.set(
        limbs.bases.rightLeg.x,
        limbs.bases.rightLeg.y - 0.03 - legSwing,
        limbs.bases.rightLeg.z - 0.06
      );
    }

    if (head) head.rotation.set(headX, headY, headZ);

    b.position.set(Math.sin(t * 1.2) * 0.08, by, 0);
    b.rotation.set(bodyTilt, 0, Math.sin(t * 1.6) * 0.04);

    // ---- mouth bubbles ---- spawn periodically from baymax's mouth and rise
    psych.bubbleEmitT += dt;
    const EMIT_INTERVAL = 0.18;     // s between emissions
    while (psych.bubbleEmitT > EMIT_INTERVAL) {
      psych.bubbleEmitT -= EMIT_INTERVAL;
      const dead = psych.bubbles.find(bb => !bb.userData.alive);
      if (dead) {
        // mouth position in world space (baymax-local mouth ≈ y=0.92, z=0.22)
        b.updateMatrixWorld();
        const mouth = new THREE.Vector3(
          (Math.random() - 0.5) * 0.04,    // tiny lateral jitter
          0.90,
          0.22
        );
        b.localToWorld(mouth);
        dead.position.copy(mouth);
        const r = 0.02 + Math.random() * 0.045;
        dead.scale.setScalar(r);
        dead.userData.alive = true;
        dead.userData.age = 0;
        dead.userData.life = 2.4 + Math.random() * 1.0;
        dead.userData.speed = 0.55 + Math.random() * 0.5;
        dead.userData.wobblePhase = Math.random() * Math.PI * 2;
        dead.userData.wobbleFreq  = 1.0 + Math.random() * 1.4;
        dead.userData.wobbleAmp   = 0.06 + Math.random() * 0.08;
        dead.material.opacity = 0.0;
        dead.visible = true;
      }
    }

    for (const bb of psych.bubbles) {
      if (!bb.userData.alive) continue;
      bb.userData.age += dt;
      if (bb.userData.age > bb.userData.life || bb.position.y > 5.5) {
        bb.userData.alive = false;
        bb.visible = false;
        continue;
      }
      bb.position.y += bb.userData.speed * dt;
      bb.position.x +=
        Math.cos(bb.userData.wobblePhase + bb.userData.age * bb.userData.wobbleFreq) *
        bb.userData.wobbleAmp * dt;
      // fade in quickly, fade out near the end of life
      const a = bb.userData.age, L = bb.userData.life;
      const fadeIn  = Math.min(1, a / 0.25);
      const fadeOut = Math.min(1, (L - a) / 0.6);
      bb.material.opacity = 0.7 * Math.min(fadeIn, fadeOut);
    }

    if (stageT >= PSYCH_DUR) setStage('cobble');
  }

  // ---- cobblestone update ----
  // Lands → lies face-down (~1 s) → close-up "getting up" → look-at-hand confused
  // → look-around → hard-cut back to standard top-down camera → controllable.
  const COBBLE_BOUNDS    = { minX: -25, maxX: 25, minZ: -25, maxZ: 25 };
  const COBBLE_FALL_OVER = 0.45;
  const COBBLE_LIE       = 0.0;       // a second shorter than before (was 1.0)
  const RISE_PUSH        = 0.40;        // a bit faster stand-up
  const RISE_HAND        = 1.6;         // confused hand inspection
  const RISE_LOOK        = 0.9;
  const COBBLE_RISE      = RISE_PUSH + RISE_HAND + RISE_LOOK;
  const LIE_Y = BAYMAX_SCALE * 0.34 * 0.95;   // ≈ 0.42 — body rests on cobbles

  // standard cobblestone camera — keep the existing look exactly
  const STD_CAM_POS  = new THREE.Vector3(0.6, 16, 3.5);
  const STD_CAM_LOOK = new THREE.Vector3(0, 0, 0);
  // close-up side camera at 40° from ground for the rise sequence
  const CLOSEUP_CAM_POS  = (() => {
    const a = THREE.MathUtils.degToRad(40);
    const d = 2.6;
    return new THREE.Vector3(Math.cos(a) * d, Math.sin(a) * d, 0.55);
  })();
  const CLOSEUP_CAM_LOOK = new THREE.Vector3(0, 0.42, 0);

  function applyStdCobbleCam() {
    cobblestone.camera.position.copy(STD_CAM_POS);
    cobblestone.camera.lookAt(STD_CAM_LOOK);
  }
  function applyCloseupCam() {
    cobblestone.camera.position.copy(CLOSEUP_CAM_POS);
    cobblestone.camera.lookAt(CLOSEUP_CAM_LOOK);
  }

  function updateCobble(dt) {
    const b = cobblestone.baymax;

    // Re-entry from a portal world.  Walk in from off-screen on whichever
    // side he came from, then hand control to the player.
    if (cobblestone.entering) {
      cobblestone.entryT = (cobblestone.entryT || 0) + dt;
      const dur = 1.6;
      const u = Math.min(1, cobblestone.entryT / dur);
      const from = cobblestone.entryFrom || 'top';
      let yaw = 0;
      let sx = 0, sz = -12, ex = 0, ez = -5;
      // Endpoints are pulled well inside the screen so the immediate
      // post-entry frame doesn't already register as an exit zone.
      if (from === 'top')        { sx = 0;   sz = -12; ex = 0;   ez = -5;  yaw = 0; }
      else if (from === 'bottom'){ sx = 0;   sz = 12;  ex = 0;   ez = 5;   yaw = Math.PI; }
      else if (from === 'right') { sx = 12;  sz = 0;   ex = 5;   ez = 0;   yaw = -Math.PI / 2; }
      else if (from === 'left')  { sx = -12; sz = 0;   ex = -5;  ez = 0;   yaw =  Math.PI / 2; }
      else if (from === 'corner'){ sx = 9;   sz = -9;  ex = 4;   ez = -4;  yaw = -Math.PI / 4; }
      b.scale.setScalar(BAYMAX_SCALE);
      b.rotation.set(0, yaw, 0);
      b.position.x = THREE.MathUtils.lerp(sx, ex, u);
      b.position.z = THREE.MathUtils.lerp(sz, ez, u);
      cobblestone.walkPhaseRef.value += dt * 14;
      b.position.y = Math.abs(Math.sin(cobblestone.walkPhaseRef.value)) * 0.06;
      animateWalk(b, cobblestone.walkPhaseRef.value, 1.0);
      applyStdCobbleCam();
      if (u >= 1) {
        cobblestone.entering = false;
        cobblestone.entryT = 0;
        resetWalk(b);
      }
      return;
    }

    if (!cobblestone.landed) {
      // Already face-down on the way down — no late tip-over on the legs.
      b.rotation.x = Math.PI / 2;
      b.rotation.y = 0;
      b.rotation.z = 0;
      b.scale.setScalar(BAYMAX_SCALE);

      const speed = 6 + stageT * 10;
      const ny = b.position.y - speed * dt;
      if (ny <= LIE_Y) {
        b.position.y = LIE_Y;
        cobblestone.landed = true;
        cobblestone.landT = 0;
      } else {
        b.position.y = ny;
      }
      applyStdCobbleCam();
      return;
    }

    cobblestone.landT += dt;
    const lt = cobblestone.landT;

    // No fall-over phase any more — he already landed flat on his face.
    if (lt < COBBLE_FALL_OVER) {
      b.rotation.x = Math.PI / 2;
      b.position.y = LIE_Y;
      resetWalk(b);
      resetHead(b);
      applyStdCobbleCam();
    } else if (lt < COBBLE_FALL_OVER + COBBLE_LIE) {
      // lie still face-down — Mr. Bean style
      b.rotation.x = Math.PI / 2;
      b.position.y = LIE_Y;
      resetWalk(b);
      resetHead(b);
      applyStdCobbleCam();
    } else if (lt < COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE) {
      // CLOSE-UP: get up using limbs, then look around
      const rt = lt - COBBLE_FALL_OVER - COBBLE_LIE;
      const limbs = b.userData.limbs;

      if (rt < RISE_PUSH) {
        // pushing up — body rotates back upright, arms exert
        const u = rt / RISE_PUSH;
        const eased = u * u * (3 - 2 * u);
        b.rotation.x = THREE.MathUtils.lerp(Math.PI / 2, 0, eased);
        b.position.y = THREE.MathUtils.lerp(LIE_Y, 0, eased);

        if (limbs) {
          const t1 = 1 - eased;   // strongest at start, returns to base by end
          limbs.leftArm.position.set(
            limbs.bases.leftArm.x  - 0.05 * t1,
            limbs.bases.leftArm.y  - 0.10 * t1,
            limbs.bases.leftArm.z  + 0.18 * t1
          );
          limbs.rightArm.position.set(
            limbs.bases.rightArm.x + 0.05 * t1,
            limbs.bases.rightArm.y - 0.10 * t1,
            limbs.bases.rightArm.z + 0.18 * t1
          );
          limbs.leftArm.rotation.z  =  0.25 + 0.5 * t1;
          limbs.rightArm.rotation.z = -0.25 - 0.5 * t1;
          // legs draw under
          limbs.leftLeg.position.set(
            limbs.bases.leftLeg.x  + 0.04 * t1,
            limbs.bases.leftLeg.y  + 0.02 * t1,
            limbs.bases.leftLeg.z  - 0.06 * t1
          );
          limbs.rightLeg.position.set(
            limbs.bases.rightLeg.x - 0.04 * t1,
            limbs.bases.rightLeg.y + 0.02 * t1,
            limbs.bases.rightLeg.z - 0.06 * t1
          );
        }
        resetHead(b);
      } else if (rt < RISE_PUSH + RISE_HAND) {
        // confused: examines his hands.  Hand only rises a little, but head
        // turns clearly TOWARD whichever hand he's looking at.
        const u = (rt - RISE_PUSH) / RISE_HAND;
        b.rotation.x = 0;
        b.position.y = 0;
        resetWalk(b);

        const smooth = x => x * x * (3 - 2 * x);
        // look = +1 → right hand (right hand sits at +X), -1 → left hand
        let rightUp = 0, leftUp = 0, look = 0;
        if (u < 0.45) {
          const u2 = u / 0.45;
          const a = u2 < 0.18 ? smooth(u2 / 0.18) : 1;
          rightUp = a;
          look    = +a;
        } else if (u < 0.55) {
          const u2 = (u - 0.45) / 0.10;
          rightUp = 1 - u2;
          leftUp  = u2;
          look    = THREE.MathUtils.lerp(+1, -1, u2);
        } else {
          const u2 = (u - 0.55) / 0.45;
          const a = u2 < 0.18 ? smooth(u2 / 0.18) : (u2 > 0.85 ? 1 - smooth((u2 - 0.85) / 0.15) : 1);
          leftUp  = a;
          look    = -a;
        }

        if (limbs) {
          // hand only lifted a small amount
          limbs.rightArm.position.set(
            limbs.bases.rightArm.x - 0.06 * rightUp,
            limbs.bases.rightArm.y + 0.14 * rightUp,
            limbs.bases.rightArm.z + 0.08 * rightUp
          );
          limbs.rightArm.rotation.z = -0.25 - 0.55 * rightUp;
          limbs.leftArm.position.set(
            limbs.bases.leftArm.x  + 0.06 * leftUp,
            limbs.bases.leftArm.y  + 0.14 * leftUp,
            limbs.bases.leftArm.z  + 0.08 * leftUp
          );
          limbs.leftArm.rotation.z =  0.25 + 0.55 * leftUp;
        }
        if (b.userData.head) {
          // head TURNS toward the hand: positive look → look right (+X = right hand)
          b.userData.head.rotation.set(
            -0.32 * Math.max(rightUp, leftUp),
             0.85 * look,                     // strong yaw toward the raised hand
             0.10 * look
          );
        }
      } else {
        // looking around — body upright, head turns L → R → forward
        const u = (rt - RISE_PUSH - RISE_HAND) / RISE_LOOK;
        b.rotation.x = 0;
        b.position.y = 0;
        resetWalk(b);

        let headY;
        if (u < 0.30)      headY = THREE.MathUtils.lerp( 0,    0.7, u / 0.30);
        else if (u < 0.65) headY = THREE.MathUtils.lerp( 0.7, -0.7, (u - 0.30) / 0.35);
        else               headY = THREE.MathUtils.lerp(-0.7,  0,   (u - 0.65) / 0.35);
        const nodX = Math.sin(u * Math.PI * 2) * 0.08;
        if (b.userData.head) b.userData.head.rotation.set(nodX, headY, 0);
      }

      applyCloseupCam();
    } else {
      // controllable — back to the standard top-down view
      b.rotation.x = 0;
      if (b.position.y < 0) b.position.y = 0;
      resetHead(b);
      applyStdCobbleCam();

      const result = applyMovement(b, dt, keys, {
        speed: WALK_SPEED,
        walkPhaseRef: cobblestone.walkPhaseRef,
        baseY: 0,
        validate: (x, z) => checkCobbleExit(x, z).allowed,
      });
      maybeFootstep(result === 'walking', dt);
      if (result === 'walking') maybeStartHintFade();

      // 1 s after the rise completes, fade the four navigation words in.
      // Drop `instant-off` first so the CSS !important hide doesn't override.
      const tAfter = lt - (COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE);
      if (tAfter >= 1.0 && !cobblestone.wordsShown) {
        const w = document.getElementById('words');
        if (w) {
          w.classList.remove('instant-off');
          w.classList.add('visible');
        }
        cobblestone.wordsShown = true;
      }

      // after movement, see if he just stepped through an exit zone
      if (cobblestone.wordsShown && !cobblestone.exited) {
        const r = checkCobbleExit(b.position.x, b.position.z);
        if (r.exit === 'corner') {
          cobblestone.exited = true;
          // reset cave on entry so a fresh visit replays the walk-in
          cave.entered = false;
          cave.entryT = 0;
          cave.returning = false;
          cave.baymax.position.set(-9, 0, 6);
          cave.baymax.rotation.set(0, Math.PI / 4, 0);
          setStage('cave');
        } else if (r.exit === 'relax') {
          cobblestone.exited = true;
          setStage('beach');
        } else if (r.exit === 'contact') {
          cobblestone.exited = true;
          cobblestone.lastExitPos = { x: b.position.x, z: b.position.z };
          setStage('linkedin');
        } else if (r.exit === 'art') {
          cobblestone.exited = true;
          // reset art for fresh entry walk-in
          artWorld.entered = false;
          artWorld.entryT = 0;
          artWorld.returning = false;
          artWorld.baymax.position.set(-12, 0, 0);
          artWorld.baymax.rotation.set(0, Math.PI / 2, 0);
          setStage('art');
        } else if (r.exit === 'projects') {
          cobblestone.exited = true;
          projectsWorld.entered = false;
          projectsWorld.entryT = 0;
          projectsWorld.returning = false;
          projectsWorld.computerActive = false;
          projectsWorld.bookActive = false;
          projectsWorld.activeBook = null;
          projectsWorld.bookPage = 0;
          projectsWorld.bookFlipCooldown = 0;
          if (projectsWorld.openBook) projectsWorld.openBook.visible = false;
          for (const bk of projectsWorld.books) {
            if (bk.meshes) for (const m of bk.meshes) m.visible = true;
          }
          projectsWorld.eHeld = false;
          projectsWorld.camPos.copy(PROJ_DEFAULT_CAM);
          projectsWorld.camLook.copy(PROJ_DEFAULT_LOOK);
          projectsWorld.baymax.position.set(12, 0, 0);
          projectsWorld.baymax.rotation.set(0, -Math.PI / 2, 0);
          setStage('projects');
        }
      }
    }
  }

  // ---- linkedin update ----
  // Brief entry walk-in from the TOP of the screen, then controllable.
  // While he stands on the logo a clockwise ring builds (2.5 s); stepping off
  // makes the ring retreat counter-clockwise back to 0.  Full circle redirects.
  const LINKEDIN_BOUNDS = { minX: -12, maxX: 12, minZ: -12, maxZ: 12 };
  const LINKEDIN_URL = 'https://www.linkedin.com/in/noah-benjamin-13462b282';
  function updateLinkedIn(dt) {
    const b = linkedin.baymax;

    // Entrance: walk from off-screen-top (z=-10) to inside (z=-5).
    if (!linkedin.entered) {
      linkedin.entryT = (linkedin.entryT || 0) + dt;
      const dur = 1.8;
      const u = Math.min(1, linkedin.entryT / dur);
      b.position.x = 0;
      b.position.z = THREE.MathUtils.lerp(-10, -5, u);
      b.rotation.y = 0;            // facing +Z (walking down into screen)
      linkedin.walkPhaseRef.value += dt * 14;
      b.position.y = Math.abs(Math.sin(linkedin.walkPhaseRef.value)) * 0.06;
      animateWalk(b, linkedin.walkPhaseRef.value, 1.0);
      if (u >= 1) {
        linkedin.entered = true;
        resetWalk(b);
      }
      return;
    }

    const result = applyMovement(b, dt, keys, {
      speed: WALK_SPEED,
      walkPhaseRef: linkedin.walkPhaseRef,
      baseY: 0,
      bounds: LINKEDIN_BOUNDS,
    });
    maybeFootstep(result === 'walking', dt);
    if (result === 'walking') maybeStartHintFade();

    // Walk back UP past the top of the screen → return to cobble world,
    // emerging at the bottom (where he exited cobble through the contact gap).
    if (b.position.z < -10 && !linkedin.returning) {
      linkedin.returning = true;
      cobblestone.exited = false;
      cobblestone.landed = true;
      cobblestone.landT = COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE + 1.0;
      // walk in from the BOTTOM of the cobble screen — that's the side he
      // originally exited through (the "contact" gap)
      cobblestone.entering  = true;
      cobblestone.entryT    = 0;
      cobblestone.entryFrom = 'bottom';
      // reset linkedin so a future entry replays the entrance
      linkedin.entered = false;
      linkedin.entryT = 0;
      linkedin.progress = 0;
      linkedin.ringMat.uniforms.uProgress.value = 0;
      linkedin.redirected = false;
      setStage('cobble');
      setTimeout(() => { linkedin.returning = false; }, 200);
      return;
    }

    const half = linkedin.logoSize / 2;
    const onLogo = Math.abs(b.position.x) < half && Math.abs(b.position.z) < half;
    if (onLogo) {
      linkedin.progress = Math.min(1, linkedin.progress + dt / 2.5);
    } else {
      // counter-clockwise unwind back to 0 when he steps off
      linkedin.progress = Math.max(0, linkedin.progress - dt / 2.0);
    }
    linkedin.ringMat.uniforms.uProgress.value = linkedin.progress;

    // full circle → open the LinkedIn profile in a new tab (once)
    if (linkedin.progress >= 1 && !linkedin.redirected) {
      linkedin.redirected = true;
      window.open(LINKEDIN_URL, '_blank', 'noopener');
    }
  }

  // ---- art world update ----
  // Walk-in from the LEFT, controllable inside screen bounds, walking back
  // across the LEFT edge returns him to cobble (entered from the right).
  const ART_BOUNDS = { minX: -8.5, maxX: 8.5, minZ: -5.0, maxZ: 5.0 };
  function updateArt(dt) {
    const b = artWorld.baymax;

    if (!artWorld.entered) {
      artWorld.entryT += dt;
      const dur = 1.6;
      const u = Math.min(1, artWorld.entryT / dur);
      b.position.x = THREE.MathUtils.lerp(-12, -7, u);
      b.position.z = 0;
      b.rotation.y = Math.PI / 2;       // facing +X (walking right)
      artWorld.walkPhaseRef.value += dt * 14;
      b.position.y = Math.abs(Math.sin(artWorld.walkPhaseRef.value)) * 0.06;
      animateWalk(b, artWorld.walkPhaseRef.value, 1.0);
      if (u >= 1) { artWorld.entered = true; resetWalk(b); }
      return;
    }

    const result = applyMovement(b, dt, keys, {
      speed: WALK_SPEED,
      walkPhaseRef: artWorld.walkPhaseRef,
      baseY: 0,
      bounds: ART_BOUNDS,
    });
    maybeFootstep(result === 'walking', dt);
    if (result === 'walking') maybeStartHintFade();

    // walk back through the left edge → return to cobble from its right side
    if (b.position.x <= ART_BOUNDS.minX + 0.05 && !artWorld.returning) {
      artWorld.returning = true;
      cobblestone.exited     = false;
      cobblestone.landed     = true;
      cobblestone.landT      = COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE + 1.0;
      cobblestone.entering   = true;
      cobblestone.entryT     = 0;
      cobblestone.entryFrom  = 'right';
      setStage('cobble');
      setTimeout(() => { artWorld.returning = false; }, 200);
    }
  }

  // ---- projects world update ----
  // Walk-in from the RIGHT, controllable inside screen bounds, walking back
  // across the RIGHT edge returns him to cobble.  Plus collision with the
  // workbench / crates and a "click e" proximity action on the laptop.
  const PROJECTS_BOUNDS = { minX: -8.5, maxX: 8.5, minZ: -5.0, maxZ: 5.0 };
  // Inflated rectangles so baymax's body doesn't clip through the props
  const PROJECTS_OBSTACLES = [
    // workbench (5.0 wide × 1.4 deep, centred at (0, _, -3.5)) + body buffer
    { minX: -2.95, maxX: 2.95, minZ: -4.65, maxZ: -2.35 },
    // crates (original positions/sizes, padded by ~0.4 for the body)
    { minX: -5.40, maxX: -3.60, minZ: 0.65, maxZ: 2.35 },
    { minX: -4.45, maxX: -3.15, minZ: -0.30, maxZ: 0.95 },
    { minX:  3.55, maxX:  4.85, minZ: 0.65, maxZ: 2.35 },
    { minX:  4.05, maxX:  5.15, minZ: -0.30, maxZ: 0.90 },
  ];
  function projectsValidate(x, z) {
    if (x < PROJECTS_BOUNDS.minX || x > PROJECTS_BOUNDS.maxX) return false;
    if (z < PROJECTS_BOUNDS.minZ || z > PROJECTS_BOUNDS.maxZ) return false;
    for (const o of PROJECTS_OBSTACLES) {
      if (x > o.minX && x < o.maxX && z > o.minZ && z < o.maxZ) return false;
    }
    return true;
  }

  // computer view camera — over Baymax's right shoulder, looking at the screen
  const projectsPromptEl = document.getElementById('projects-prompt');
  const PROJ_DEFAULT_CAM = new THREE.Vector3(0.6, 16, 3.5);
  const PROJ_DEFAULT_LOOK = new THREE.Vector3(0, 0, 0);
  const PROJ_COMP_CAM    = new THREE.Vector3(-1.2, 1.85, -2.0);
  const PROJ_COMP_LOOK   = new THREE.Vector3(-1.2, 1.30, -3.55);
  const NEAR_LAPTOP      = 1.7;
  // initialise smooth-tracker
  projectsWorld.camLook.copy(PROJ_DEFAULT_LOOK);
  projectsWorld.camPos = PROJ_DEFAULT_CAM.clone();

  function drawBookPage(canvas, content, isLeft) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    // cream paper
    ctx.fillStyle = '#f3e6c8';
    ctx.fillRect(0, 0, W, H);
    // grain
    for (let i = 0; i < 320; i++) {
      ctx.fillStyle = `rgba(180,150,90,${Math.random() * 0.06})`;
      ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
    }
    // soft shadow near spine
    const grad = isLeft
      ? ctx.createLinearGradient(W, 0, W * 0.82, 0)
      : ctx.createLinearGradient(0, 0, W * 0.18, 0);
    grad.addColorStop(0, 'rgba(80, 50, 20, 0.32)');
    grad.addColorStop(1, 'rgba(80, 50, 20, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // text
    ctx.fillStyle = '#3a2410';
    ctx.font = '34px serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const lines = (content || '').split('\n');
    let y = 60;
    for (const line of lines) {
      ctx.fillText(line, 50, y);
      y += 46;
    }
  }
  function updateBookPages() {
    const book = projectsWorld.activeBook;
    if (!book || !book.data || !book.data.pages) return;
    const idx = THREE.MathUtils.clamp(projectsWorld.bookPage, 0, book.data.pages.length - 1);
    const pageData = book.data.pages[idx];
    drawBookPage(projectsWorld.leftCanvas,  pageData.l, true);
    drawBookPage(projectsWorld.rightCanvas, pageData.r, false);
    projectsWorld.leftTex.needsUpdate  = true;
    projectsWorld.rightTex.needsUpdate = true;
  }

  // ---- 1.5-second page-flip animation ----
  // Captures the page being turned onto a separate flip canvas, swings the
  // flipPivot around the spine, and swaps in the destination page mid-flip.
  function startBookFlip(direction) {
    const book = projectsWorld.activeBook;
    if (!book || !book.data || !book.data.pages) return;
    const pages = book.data.pages;
    const oldIdx = projectsWorld.bookPage;
    const newIdx = THREE.MathUtils.clamp(
      oldIdx + (direction > 0 ? 1 : -1), 0, pages.length - 1
    );
    if (newIdx === oldIdx) return;
    const oldData = pages[oldIdx];
    const newData = pages[newIdx];

    // Draw the OLD page content (the side that's flipping over) onto the
    // flipCanvas — this is what the player sees on the flipping page during
    // the first half of the animation.
    drawBookPage(
      projectsWorld.flipCanvas,
      direction > 0 ? oldData.r : oldData.l,
      direction > 0 ? false : true
    );
    projectsWorld.flipTex.needsUpdate = true;

    // Update the underlying pages to the NEW content — they're covered by
    // the flipping page until mid-rotation, then progressively revealed.
    drawBookPage(projectsWorld.leftCanvas,  newData.l, true);
    drawBookPage(projectsWorld.rightCanvas, newData.r, false);
    projectsWorld.leftTex.needsUpdate  = true;
    projectsWorld.rightTex.needsUpdate = true;

    projectsWorld.bookPage = newIdx;

    // Set up the flip pivot for the chosen direction.  For forward (right →
    // left) the page swings counter-clockwise; for backward the pivot starts
    // pre-rotated to π so it begins on the left and swings to 0.
    projectsWorld.flipPivot.rotation.z = direction > 0 ? 0 : Math.PI;
    projectsWorld.flipPivot.visible = true;
    projectsWorld.flipState = {
      direction,
      elapsed: 0,
      duration: 1.5,
      midSwapped: false,
      newData,
    };
  }

  function updateBookFlip(dt) {
    const s = projectsWorld.flipState;
    if (!s) return;
    s.elapsed += dt;
    const u = Math.min(1, s.elapsed / s.duration);
    const eased = u * u * (3 - 2 * u);
    // direction +1: rotate 0 → π.  direction -1: rotate π → 0.
    projectsWorld.flipPivot.rotation.z = s.direction > 0
      ? eased * Math.PI
      : (1 - eased) * Math.PI;

    // Mid-flip: swap the flipMesh texture to the DESTINATION side so the
    // second half of the rotation appears to lay the new page down.
    if (!s.midSwapped && u >= 0.5) {
      s.midSwapped = true;
      drawBookPage(
        projectsWorld.flipCanvas,
        s.direction > 0 ? s.newData.l : s.newData.r,
        s.direction > 0 ? true : false
      );
      projectsWorld.flipTex.needsUpdate = true;
    }

    if (u >= 1) {
      projectsWorld.flipPivot.visible = false;
      projectsWorld.flipPivot.rotation.z = 0;
      projectsWorld.flipState = null;
    }
  }

  function updateProjects(dt) {
    const b = projectsWorld.baymax;

    // ---- BOOK VIEW STATE ----
    if (projectsWorld.bookActive) {
      const book = projectsWorld.activeBook;
      b.position.set(book.data.x, 0, book.data.z + 0.95);
      b.rotation.set(0, Math.PI, 0);
      resetWalk(b);
      resetHead(b);

      const targetCamPos  = new THREE.Vector3(book.data.x, 2.0, book.data.z + 0.55);
      const targetLookAt  = new THREE.Vector3(book.data.x, (book.data.y ?? 1.05), book.data.z);
      const k = 1 - Math.pow(0.001, dt);
      projectsWorld.camPos.lerp(targetCamPos, k);
      projectsWorld.camLook.lerp(targetLookAt, k);
      projectsWorld.camera.position.copy(projectsWorld.camPos);
      projectsWorld.camera.lookAt(projectsWorld.camLook);

      // controls hint while reading
      projectsPromptEl.textContent = '← → flip pages   |   e to close';
      const above = new THREE.Vector3(book.data.x, 1.7, book.data.z - 0.55);
      const ndc = above.project(projectsWorld.camera);
      projectsPromptEl.style.left = `${(ndc.x * 0.5 + 0.5) * window.innerWidth}px`;
      projectsPromptEl.style.top  = `${(-ndc.y * 0.5 + 0.5) * window.innerHeight}px`;
      projectsPromptEl.style.display = 'block';

      // page flipping (rate-limited so a held key doesn't tear through pages)
      projectsWorld.bookFlipCooldown = Math.max(0, (projectsWorld.bookFlipCooldown || 0) - dt);
      const pages = book.data.pages;
      // run the flip animation (no-op when none in progress)
      updateBookFlip(dt);
      // accept new flip input only when no flip is currently animating
      if (projectsWorld.bookFlipCooldown <= 0 && !projectsWorld.flipState) {
        const goRight = keys['d'] || keys['arrowright'];
        const goLeft  = keys['a'] || keys['arrowleft'];
        if (goRight && projectsWorld.bookPage < pages.length - 1) {
          projectsWorld.bookFlipCooldown = 1.6;       // match the 1.5 s flip
          startBookFlip(+1);
        } else if (goLeft && projectsWorld.bookPage > 0) {
          projectsWorld.bookFlipCooldown = 1.6;
          startBookFlip(-1);
        }
      }

      // E or ESC to close
      if (keys['e'] || keys['escape']) {
        if (!projectsWorld.eHeld) {
          projectsWorld.bookActive = false;
          projectsWorld.openBook.visible = false;
          if (book.meshes) for (const m of book.meshes) m.visible = true;
          projectsPromptEl.textContent = 'click e';
          unstickProjectsBaymax(b);
          restoreParentFocus();
        }
        projectsWorld.eHeld = true;
      } else {
        projectsWorld.eHeld = false;
      }
      return;
    }

    // ---- BOX (CRATE) VIEW STATE ----
    if (projectsWorld.boxActive) {
      const crate = projectsWorld.activeCrate;
      // park the outer baymax outside the crate AND hide him so his body
      // doesn't fill the box-view camera (the bigger crates have the camera
      // close enough that Baymax otherwise blocks the whole interior).
      b.position.set(crate.data.x, 0, crate.data.z + 0.95);
      b.rotation.set(0, Math.PI, 0);
      b.visible = false;
      resetWalk(b);
      resetHead(b);

      // Side view: camera sits south of the crate at mid-crate height and
      // looks STRAIGHT north (parallel to the floor) through the open
      // front face.  Same Y for cam and look-at = no vertical tilt,
      // giving a clean "platformer cross-section" angle.
      const targetCamPos = new THREE.Vector3(
        crate.data.x,
        crate.data.s * 0.50,
        crate.data.z + crate.data.s / 2 + crate.data.s * 1.40
      );
      const targetLookAt = new THREE.Vector3(
        crate.data.x,
        crate.data.s * 0.50,
        crate.data.z
      );
      const k = 1 - Math.pow(0.001, dt);
      projectsWorld.camPos.lerp(targetCamPos, k);
      projectsWorld.camLook.lerp(targetLookAt, k);
      projectsWorld.camera.position.copy(projectsWorld.camPos);
      projectsWorld.camera.lookAt(projectsWorld.camLook);

      // proximity to the tire (crate 1 only) — controls the E-mount hint
      const tireX = crate.data.s * 0.22;
      const nearTire = !!crate.tireMesh && Math.abs(crate.miniX - tireX) < crate.data.s * 0.20;

      // controls hint while inside the crate
      if (crate.ridingTire) {
        projectsPromptEl.textContent = 'e to hop off';
      } else if (nearTire) {
        projectsPromptEl.textContent = '← → to move   |   e to ride the swing';
      } else {
        projectsPromptEl.textContent = '← → to move   |   e to close';
      }
      const above = new THREE.Vector3(crate.data.x, crate.data.s + 0.45, crate.data.z + 0.1);
      const ndcP = above.project(projectsWorld.camera);
      projectsPromptEl.style.left = `${(ndcP.x * 0.5 + 0.5) * window.innerWidth}px`;
      projectsPromptEl.style.top  = `${(-ndcP.y * 0.5 + 0.5) * window.innerHeight}px`;
      projectsPromptEl.style.display = 'block';

      // 2D-platformer movement: only left/right (locked while riding the tire)
      const halfRange = crate.data.s / 2 - 0.10;
      let mdx = 0;
      if (!crate.ridingTire) {
        if (keys['a'] || keys['arrowleft'])  mdx -= 1;
        if (keys['d'] || keys['arrowright']) mdx += 1;
      }
      if (mdx !== 0) {
        const miniSpeed = crate.data.s * 0.55;
        crate.miniX = THREE.MathUtils.clamp(
          crate.miniX + mdx * miniSpeed * dt, -halfRange, halfRange
        );
        crate.miniFacing = mdx > 0 ? 1 : -1;
        crate.miniWalkPhase += dt * 14;
        animateWalk(crate.mini, crate.miniWalkPhase, 1.0);
        crate.mini.position.y = crate.miniBaseY + Math.abs(Math.sin(crate.miniWalkPhase)) * 0.03;
      } else if (!crate.ridingTire) {
        resetWalk(crate.mini);
        crate.mini.position.y = crate.miniBaseY;
      }
      if (!crate.ridingTire) {
        crate.mini.position.x = crate.miniX;
        crate.mini.rotation.y = crate.miniFacing > 0 ? Math.PI / 2 : -Math.PI / 2;
      }

      // swing the tire (only crates that have one)
      if (crate.tirePivot) {
        crate.tireT = (crate.tireT || 0) + dt;
        crate.tirePivot.rotation.x = Math.sin(crate.tireT * 1.6) * 0.45;
      }

      // If Baymax is riding the swing, snap his position to the tire each
      // frame so he swings with it.
      if (crate.ridingTire && crate.tireMesh) {
        crate.tireMesh.updateMatrixWorld(true);
        const tireWorld = new THREE.Vector3().setFromMatrixPosition(crate.tireMesh.matrixWorld);
        crate.interior.worldToLocal(tireWorld);
        crate.mini.position.copy(tireWorld);
        crate.mini.position.y -= 0.02;
        resetWalk(crate.mini);
        crate.mini.rotation.y = 0;       // face the camera while swinging
      }
      // animate the mini-cinema canvas (only the cinema crate)
      if (crate.cinemaCtx) {
        crate.cinemaT = (crate.cinemaT || 0) + dt;
        drawMiniCinema(crate.cinemaCtx, crate.cinemaT);
        if (crate.cinemaMat && crate.cinemaMat.map) crate.cinemaMat.map.needsUpdate = true;
      }
      // whack-a-mole spawn cycle (only the game crate)
      if (crate.gameTargets && crate.gameTargets.length) {
        crate.gameSpawnTimer = (crate.gameSpawnTimer || 0) - dt;
        if (crate.gameSpawnTimer <= 0) {
          // hide any current target
          if (crate.gameActiveTarget >= 0) {
            crate.gameTargets[crate.gameActiveTarget].visible = false;
          }
          // pick a new random target (not the same one twice in a row)
          let next;
          do { next = Math.floor(Math.random() * crate.gameTargets.length); }
          while (next === crate.gameActiveTarget && crate.gameTargets.length > 1);
          crate.gameActiveTarget = next;
          crate.gameTargets[next].visible = true;
          // zen mode: each target stays ~1.1s before swapping
          crate.gameSpawnTimer = 0.9 + Math.random() * 0.5;
        }
        // gently pulse the active target
        if (crate.gameActiveTarget >= 0) {
          const t = crate.gameTargets[crate.gameActiveTarget];
          const s = 1.0 + Math.sin(performance.now() * 0.008) * 0.08;
          t.scale.setScalar(s);
        }
      }

      // E / ESC handling.  Inside the tire-swing crate, E first toggles
      // mounting/dismounting the swing; only if Baymax is NOT near the
      // tire (and not already riding) does E exit the box view.  ESC
      // always exits regardless.
      const escPressed = !!keys['escape'];
      const ePressed   = !!keys['e'];
      if (ePressed || escPressed) {
        if (!projectsWorld.eHeld) {
          let consumed = false;
          if (ePressed && !escPressed && crate.tireMesh) {
            if (crate.ridingTire) {
              // dismount
              crate.ridingTire = false;
              crate.mini.position.x = crate.miniX;
              crate.mini.position.y = crate.miniBaseY;
              crate.mini.position.z = crate.data.s * 0.10;
              consumed = true;
            } else if (nearTire) {
              // mount
              crate.ridingTire = true;
              consumed = true;
            }
          }
          if (!consumed) {
            projectsWorld.boxActive = false;
            // restore the front face material
            if (crate.frontMat) crate.crateMesh.material[4] = crate.frontMat;
            crate.interior.visible = false;
            b.visible = true;                       // re-show outer Baymax
            projectsPromptEl.textContent = 'click e';
            // hide whack-a-mole score / clear active target
            if (crate.gameTargets) {
              for (const t of crate.gameTargets) t.visible = false;
            }
            // dismount tire on exit so a future visit starts on the floor
            crate.ridingTire = false;
            hideGameScoreUI();
            unstickProjectsBaymax(b);
            restoreParentFocus();
          }
        }
        projectsWorld.eHeld = true;
      } else {
        projectsWorld.eHeld = false;
      }
      return;
    }

    // --- COMPUTER VIEW STATE ---
    if (projectsWorld.computerActive) {
      const station = projectsWorld.computerStation;
      b.position.set(station.x, 0, station.z);
      b.rotation.set(0, Math.PI, 0);
      resetWalk(b);
      resetHead(b);
      const k = 1 - Math.pow(0.001, dt);
      projectsWorld.camPos.lerp(PROJ_COMP_CAM, k);
      projectsWorld.camLook.lerp(PROJ_COMP_LOOK, k);
      projectsWorld.camera.position.copy(projectsWorld.camPos);
      projectsWorld.camera.lookAt(projectsWorld.camLook);

      // Hide the painted laptop screen, show the CSS3D iframe on the screen
      if (projectsWorld.laptopScreenMesh) projectsWorld.laptopScreenMesh.visible = false;
      if (projectsWorld.laptopCssObj) projectsWorld.laptopCssObj.visible = true;
      if (projectsWorld.laptopIframe) projectsWorld.laptopIframe.style.pointerEvents = 'auto';
      if (laptopCloseBtn) laptopCloseBtn.style.display = 'block';
      if (laptopOpenSiteBtn) laptopOpenSiteBtn.style.display = 'block';

      projectsPromptEl.style.display = 'none';

      // press E or ESC to exit
      if (keys['e'] || keys['escape']) {
        if (!projectsWorld.eHeld) {
          projectsWorld.computerActive = false;
          unstickProjectsBaymax(b);
          restoreParentFocus();
        }
        projectsWorld.eHeld = true;
      } else {
        projectsWorld.eHeld = false;
      }
      return;
    } else {
      // SCREEN OFF: hide iframe, restore painted screen, hide close btn
      if (projectsWorld.laptopScreenMesh) projectsWorld.laptopScreenMesh.visible = true;
      if (projectsWorld.laptopCssObj) projectsWorld.laptopCssObj.visible = false;
      if (projectsWorld.laptopIframe) projectsWorld.laptopIframe.style.pointerEvents = 'none';
      if (laptopCloseBtn) laptopCloseBtn.style.display = 'none';
      if (laptopOpenSiteBtn) laptopOpenSiteBtn.style.display = 'none';
    }

    // smoothly return camera to the standard top-down view if it had moved
    {
      const k = 1 - Math.pow(0.001, dt);
      projectsWorld.camPos.lerp(PROJ_DEFAULT_CAM, k);
      projectsWorld.camLook.lerp(PROJ_DEFAULT_LOOK, k);
      projectsWorld.camera.position.copy(projectsWorld.camPos);
      projectsWorld.camera.lookAt(projectsWorld.camLook);
    }

    // --- entrance walk-in ---
    if (!projectsWorld.entered) {
      projectsWorld.entryT += dt;
      const dur = 1.6;
      const u = Math.min(1, projectsWorld.entryT / dur);
      b.position.x = THREE.MathUtils.lerp(12, 7, u);
      b.position.z = 0;
      b.rotation.y = -Math.PI / 2;
      projectsWorld.walkPhaseRef.value += dt * 14;
      b.position.y = Math.abs(Math.sin(projectsWorld.walkPhaseRef.value)) * 0.06;
      animateWalk(b, projectsWorld.walkPhaseRef.value, 1.0);
      if (u >= 1) { projectsWorld.entered = true; resetWalk(b); }
      projectsPromptEl.style.display = 'none';
      return;
    }

    // --- normal controls with collision ---
    const result = applyMovement(b, dt, keys, {
      speed: WALK_SPEED,
      walkPhaseRef: projectsWorld.walkPhaseRef,
      baseY: 0,
      validate: projectsValidate,
    });
    maybeFootstep(result === 'walking', dt);
    if (result === 'walking') maybeStartHintFade();

    // Return to cobble: triggered by walking off the right edge OR by
    // pressing ESC while in the world (mirrors the beach's ESC exit).
    const wantsExitByEdge = b.position.x >= PROJECTS_BOUNDS.maxX - 0.05;
    const wantsExitByEsc  = !!keys['escape'];
    if ((wantsExitByEdge || wantsExitByEsc) && !projectsWorld.returning) {
      projectsWorld.returning = true;
      keys['escape'] = false;
      cobblestone.exited    = false;
      cobblestone.landed    = true;
      cobblestone.landT     = COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE + 1.0;
      cobblestone.entering  = true;
      cobblestone.entryT    = 0;
      cobblestone.entryFrom = 'left';
      setStage('cobble');
      setTimeout(() => { projectsWorld.returning = false; }, 200);
      return;
    }

    // --- proximity to laptop OR a book → "click e" prompt ---
    let near = null;     // { type, dist, promptPos, book? }
    const lp = projectsWorld.laptopWorld;
    const dLap = Math.hypot(b.position.x - lp.x, b.position.z - lp.z);
    if (dLap < NEAR_LAPTOP) {
      near = {
        type: 'laptop',
        dist: dLap,
        promptPos: new THREE.Vector3(lp.x, lp.y + 0.55, lp.z),
      };
    }
    for (const book of projectsWorld.books) {
      const dB = Math.hypot(b.position.x - book.data.x, b.position.z - book.data.z);
      if (dB < 1.2 && (!near || dB < near.dist)) {
        near = {
          type: 'book',
          dist: dB,
          promptPos: new THREE.Vector3(book.data.x, 1.0, book.data.z),
          book,
        };
      }
    }
    if (projectsWorld.crates) {
      for (const crate of projectsWorld.crates) {
        const dC = Math.hypot(b.position.x - crate.data.x, b.position.z - crate.data.z);
        // Proximity threshold scales with the crate's size so the larger
        // crates (s=1.0) get a generous detection radius and aren't shadowed
        // by a smaller crate sitting between them and Baymax.
        const threshold = 1.0 + crate.data.s * 0.9;     // s=1.0 → 1.90,  s=0.7 → 1.63
        // Score is dC minus the crate size — bigger crates lose more weight
        // so when Baymax stands between two crates the larger one wins.
        const score = dC - crate.data.s;
        const nearScore = near && near.type === 'box'
          ? near.dist - near.crate.data.s
          : (near ? near.dist : Infinity);
        if (dC < threshold && score < nearScore) {
          near = {
            type: 'box',
            dist: dC,
            promptPos: new THREE.Vector3(crate.data.x, crate.data.s + 0.25, crate.data.z),
            crate,
          };
        }
      }
    }

    if (near) {
      projectsPromptEl.textContent = 'click e';
      const ndc = near.promptPos.clone().project(projectsWorld.camera);
      projectsPromptEl.style.left = `${(ndc.x * 0.5 + 0.5) * window.innerWidth}px`;
      projectsPromptEl.style.top  = `${(-ndc.y * 0.5 + 0.5) * window.innerHeight}px`;
      projectsPromptEl.style.display = 'block';

      if (keys['e']) {
        if (!projectsWorld.eHeld) {
          if (near.type === 'laptop') {
            projectsWorld.computerActive = true;
            // Don't auto-open paattikiiltoon.fi — the srcdoc shell already
            // navigates to it on click, so the user can decide whether to
            // visit the real site.
          } else if (near.type === 'box') {
            // open this crate's interior
            projectsWorld.boxActive = true;
            projectsWorld.activeCrate = near.crate;
            // hide the +Z (front) face so the camera can see inside
            if (near.crate.frontMatHidden) {
              near.crate.crateMesh.material[4] = near.crate.frontMatHidden;
            }
            near.crate.interior.visible = true;
            // reset mini baymax to a starting position
            near.crate.miniX = 0;
            near.crate.miniWalkPhase = 0;
            near.crate.miniFacing = 1;
            // whack-a-mole: reset score and show overlay
            if (near.crate.gameTargets && near.crate.gameTargets.length) {
              near.crate.gameScore = 0;
              near.crate.gameSpawnTimer = 0.4;
              near.crate.gameActiveTarget = -1;
              for (const t of near.crate.gameTargets) t.visible = false;
              updateGameScoreUI(0);
            } else {
              hideGameScoreUI();
            }
          } else {
            // open this book
            projectsWorld.bookActive = true;
            projectsWorld.activeBook = near.book;
            projectsWorld.bookPage = 0;
            projectsWorld.bookFlipCooldown = 0;
            projectsWorld.flipState = null;
            if (projectsWorld.flipPivot) {
              projectsWorld.flipPivot.visible = false;
              projectsWorld.flipPivot.rotation.z = 0;
            }
            if (near.book.meshes) for (const m of near.book.meshes) m.visible = false;
            projectsWorld.openBook.position.set(
              near.book.data.x,
              (near.book.data.y ?? 1.05),
              near.book.data.z
            );
            projectsWorld.openBook.visible = true;
            updateBookPages();
          }
        }
        projectsWorld.eHeld = true;
      } else {
        projectsWorld.eHeld = false;
      }
    } else {
      projectsPromptEl.style.display = 'none';
      projectsWorld.eHeld = !!keys['e'];
    }
  }

  // Project a world (x, z) onto the cobble camera and decide whether the
  // resulting screen position is on-screen, inside an exit zone, or blocked.
  // The four edge gaps are sized "a bit wider than the word contact" (~220 px).
  // The top-right corner is the cave portal: it's bounded by the bottom of the
  // "relax" word (top edge) and the left edge of the "art" word (right edge).
  const _projTmp = new THREE.Vector3();
  function getCornerNDCBounds() {
    const W = window.innerWidth, H = window.innerHeight;
    const relaxEl = document.querySelector('.word.top');
    const artEl   = document.querySelector('.word.right');
    let minVX = 0.55, minVY = 0.80;        // fallbacks
    if (relaxEl && artEl) {
      const r = relaxEl.getBoundingClientRect();
      const a = artEl.getBoundingClientRect();
      if (a.width > 0) minVX = (a.left   / W) * 2 - 1;
      if (r.height > 0) minVY = 1 - (r.bottom / H) * 2;
    }
    return { minVX, minVY };
  }
  function checkCobbleExit(x, z) {
    _projTmp.set(x, 0, z).project(cobblestone.camera);
    const vx = _projTmp.x, vy = _projTmp.y;

    if (vx >= -1 && vx <= 1 && vy >= -1 && vy <= 1) {
      // also allowed if currently inside the on-screen corner rectangle so
      // movement remains smooth as Baymax approaches the portal
      const c = getCornerNDCBounds();
      if (vx > c.minVX && vy > c.minVY) return { allowed: true, exit: 'corner' };
      return { allowed: true };
    }

    const W = window.innerWidth, H = window.innerHeight;
    const gapPx = 220;                                 // a bit wider than "contact"
    const ndcGapW = (gapPx / W) * 2;
    const ndcGapH = (gapPx / H) * 2;

    // top-right CAVE portal — only the rectangle bounded by relax-bottom + art-left
    const c = getCornerNDCBounds();
    if (vx > c.minVX && vy > c.minVY) return { allowed: true, exit: 'corner' };

    // top edge — "relax"
    if (vy > 1 && Math.abs(vx) < ndcGapW / 2) return { allowed: true, exit: 'relax' };
    // bottom edge — "contact"
    if (vy < -1 && Math.abs(vx) < ndcGapW / 2) return { allowed: true, exit: 'contact' };
    // left edge — "projects"
    if (vx < -1 && Math.abs(vy) < ndcGapH / 2) return { allowed: true, exit: 'projects' };
    // right edge — "art"
    if (vx > 1 && Math.abs(vy) < ndcGapH / 2) return { allowed: true, exit: 'art' };

    return { allowed: false };
  }

  // ---- cave update ----
  // Earthy hidden world reached from the top-right corner of cobble.  Walk-in
  // from the upper-left corner of the play area; walk back through the same
  // corner to return to cobble.
  const CAVE_BOUNDS = { minX: -10, maxX: 10, minZ: -10, maxZ: 10 };
  function caveValidate(x, z) {
    if (x < CAVE_BOUNDS.minX || x > CAVE_BOUNDS.maxX) return false;
    if (z < CAVE_BOUNDS.minZ || z > CAVE_BOUNDS.maxZ) return false;
    return true;
  }
  function updateCave(dt) {
    const b = cave.baymax;
    // gently bob the mushroom caps
    if (cave.mushrooms) {
      for (const m of cave.mushrooms) {
        m.phase += dt * 1.6;
        m.grp.position.y = m.baseY + Math.sin(m.phase) * 0.025;
      }
    }
    // pulse the crystal cluster light
    if (cave.crystalGroup) {
      cave.crystalGroup.rotation.y += dt * 0.18;
    }

    // entrance walk-in: lerp from spawn to (-6, 0, 4)
    if (!cave.entered) {
      cave.entryT += dt;
      const dur = 1.6;
      const u = Math.min(1, cave.entryT / dur);
      b.position.x = THREE.MathUtils.lerp(-9, -6, u);
      b.position.z = THREE.MathUtils.lerp(6,  4, u);
      b.rotation.y = Math.PI / 4;
      cave.walkPhaseRef.value += dt * 14;
      b.position.y = Math.abs(Math.sin(cave.walkPhaseRef.value)) * 0.06;
      animateWalk(b, cave.walkPhaseRef.value, 1.0);
      if (u >= 1) { cave.entered = true; resetWalk(b); }
      return;
    }

    // free movement inside cave bounds
    const result = applyMovement(b, dt, keys, {
      speed: WALK_SPEED,
      walkPhaseRef: cave.walkPhaseRef,
      baseY: 0,
      validate: caveValidate,
    });
    maybeFootstep(result === 'walking', dt);
    if (result === 'walking') maybeStartHintFade();

    // The only way out is to walk up to the exit sign in the top-right.  All
    // other edges are blocked by caveValidate (CAVE_BOUNDS), so the sign is
    // the sole exit.
    const sign = cave.exitSignPos;
    const distToSign = Math.hypot(b.position.x - sign.x, b.position.z - sign.z);
    if (distToSign < 1.2 && !cave.returning) {
      cave.returning = true;
      cobblestone.exited = false;
      cobblestone.landed = true;
      cobblestone.landT  = COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE + 1.0;
      cobblestone.entering = true;
      cobblestone.entryT = 0;
      cobblestone.entryFrom = 'corner';
      setStage('cobble');
      setTimeout(() => { cave.returning = false; }, 200);
    }
  }

  // ---- beach update ----
  // Phases: enter (walk to chair) → sit → reach (cocktail flies up to hand) →
  //         drink (raise to mouth) → look (head turns toward the waves) → idle.
  function updateBeach(dt) {
    const b = beach.baymax;
    const c = beach.cocktail;
    beach.phaseT += dt;
    beach.water.mat.uniforms.uTime.value += dt;

    // ESC exits the beach (mirrors clicking the "back..." overlay).
    if (beach.satMarked && keys['escape']) {
      exitBeachToCobble();
      keys['escape'] = false;
      return;
    }

    // drift the thin distant clouds slowly across the sky
    if (beach.clouds && beach.clouds.userData.clouds) {
      for (const cloud of beach.clouds.userData.clouds) {
        cloud.position.x += dt * cloud.userData.driftSpeed;
        if (cloud.position.x > 30) cloud.position.x = -30;
      }
    }

    const seat = beach.seatWorld;
    const limbsB = b.userData.limbs;

    // After he sits, the cocktail is "held" — its world position tracks the
    // grabbing arm.  Helper: get a hand world position from the active arm.
    const getHandWorld = (armName, extraLocal) => {
      b.updateMatrixWorld();
      const arm = limbsB && limbsB[armName];
      if (!arm) return new THREE.Vector3();
      const w = new THREE.Vector3();
      arm.getWorldPosition(w);
      if (extraLocal) {
        const off = extraLocal.clone()
          .applyEuler(new THREE.Euler(b.rotation.x, b.rotation.y, b.rotation.z));
        w.add(off);
      }
      return w;
    };

    if (beach.phase === 'enter') {
      const dur = 3.4;
      const u = Math.min(1, beach.phaseT / dur);
      // Quadratic Bezier — curves around the canopy front-right post and
      // approaches the chair from straight in front, never crossing the
      // chair / table footprint.
      const p0 = new THREE.Vector3(5.0,  0,  4.0);     // start (front-right of scene)
      const p1 = new THREE.Vector3(3.5,  0, -2.5);     // waypoint outside the canopy
      const p2 = new THREE.Vector3(seat.x, 0, seat.z - 1.0);   // in front of chair
      const oneMinus = 1 - u;
      const pos = new THREE.Vector3()
        .copy(p0).multiplyScalar(oneMinus * oneMinus)
        .addScaledVector(p1, 2 * oneMinus * u)
        .addScaledVector(p2, u * u);
      b.position.set(pos.x, 0, pos.z);

      // Tangent of the curve gives the heading at this t
      const tangent = new THREE.Vector3()
        .copy(p1).sub(p0).multiplyScalar(2 * oneMinus)
        .addScaledVector(p2.clone().sub(p1), 2 * u);
      b.rotation.y = Math.atan2(tangent.x, tangent.z);

      beach.walkPhaseRef.value += dt * 14;
      b.position.y = Math.abs(Math.sin(beach.walkPhaseRef.value)) * 0.06;
      animateWalk(b, beach.walkPhaseRef.value, 1.0);
      if (u >= 1) {
        beach.phase = 'sit';
        beach.phaseT = 0;
        resetWalk(b);
        beach.sitInitialYaw = b.rotation.y;
        beach.satMarked = true;
        beach.satTime = stageT;
      }
    } else if (beach.phase === 'sit') {
      // 1.5 s sit:  turn around (0–0.55) then lower into the seat (0.45–1.0)
      const dur = 1.5;
      const u = Math.min(1, beach.phaseT / dur);
      // rotation finishes earlier than the position settle
      const rotU = THREE.MathUtils.clamp(u / 0.55, 0, 1);
      const rotE = rotU * rotU * (3 - 2 * rotU);
      let diff = Math.PI - beach.sitInitialYaw;
      while (diff >  Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      b.rotation.y = beach.sitInitialYaw + diff * rotE;

      // position lerp starts at 0.35 — he steps back and lowers into the chair
      const posU = THREE.MathUtils.clamp((u - 0.35) / 0.65, 0, 1);
      const posE = posU * posU * (3 - 2 * posU);
      // realistic sit Y: body resting on the seat surface (≈ seat.y - 0.10)
      const standPos = new THREE.Vector3(seat.x,        0,             seat.z - 1.0);
      const sitPos   = new THREE.Vector3(seat.x,        seat.y - 0.10, seat.z);
      b.position.lerpVectors(standPos, sitPos, posE);

      // small forward lean as he settles
      b.rotation.x = 0.10 * Math.sin(u * Math.PI);

      // micro settle wobble at the end
      if (u > 0.85) {
        const k = (u - 0.85) / 0.15;
        b.position.y += Math.sin(k * Math.PI * 2) * 0.015 * (1 - k);
      }

      if (u >= 1) {
        beach.phase = 'reach';
        beach.phaseT = 0;
        b.rotation.x = 0;
      }
    } else if (beach.phase === 'reach') {
      // The arm closer to the table (his anatomical LEFT after the 180° sit)
      // reaches out, then the cocktail comes to meet his hand.  Once the arm
      // touches the cocktail the cocktail tracks the arm's world position.
      const dur = 1.4;
      const u = Math.min(1, beach.phaseT / dur);
      const eased = u * u * (3 - 2 * u);

      // arm extends first (faster: 0–0.6) so it reaches toward the table
      const armU = THREE.MathUtils.clamp(u / 0.6, 0, 1);
      const armE = armU * armU * (3 - 2 * armU);
      if (limbsB) {
        // animate the LEFT arm — that's the one on the world +X side after
        // the sit rotation, i.e. the side the table is on
        limbsB.leftArm.position.set(
          limbsB.bases.leftArm.x  - 0.16 * armE,
          limbsB.bases.leftArm.y  + 0.06 * armE,
          limbsB.bases.leftArm.z  + 0.18 * armE
        );
        limbsB.leftArm.rotation.z = THREE.MathUtils.lerp(0.25, 1.30, armE);
      }

      // cocktail starts moving slightly later (0.30 → 1.0) and ends in the hand
      const cocktailU = THREE.MathUtils.clamp((u - 0.30) / 0.70, 0, 1);
      const cocktailE = cocktailU * cocktailU * (3 - 2 * cocktailU);
      const handWorld = getHandWorld('leftArm', new THREE.Vector3(0, -0.10, 0));
      c.position.lerpVectors(beach.cocktailStart, handWorld, cocktailE);

      if (u >= 1) { beach.phase = 'drink'; beach.phaseT = 0; }
    } else if (beach.phase === 'drink') {
      // arm lifts the cocktail toward the mouth; cocktail follows the arm
      const dur = 1.2;
      const u = Math.min(1, beach.phaseT / dur);
      const eased = u * u * (3 - 2 * u);
      if (limbsB) {
        limbsB.leftArm.position.set(
          limbsB.bases.leftArm.x  - 0.16 - 0.04 * eased,
          limbsB.bases.leftArm.y  + 0.06 + 0.22 * eased,
          limbsB.bases.leftArm.z  + 0.18 + 0.08 * eased
        );
        limbsB.leftArm.rotation.z = THREE.MathUtils.lerp(1.30, 1.85, eased);
      }
      // cocktail tracks the hand
      const handWorld = getHandWorld('leftArm', new THREE.Vector3(0, -0.10, 0));
      c.position.copy(handWorld);
      c.rotation.z = -0.45 * eased;
      if (b.userData.head) b.userData.head.rotation.x = -0.22 * eased;
      if (u >= 1) { beach.phase = 'look'; beach.phaseT = 0; }
    } else if (beach.phase === 'look') {
      const dur = 3.0;
      const u = Math.min(1, beach.phaseT / dur);
      const headY = Math.sin(u * Math.PI * 2) * 0.45;
      const headX = THREE.MathUtils.lerp(-0.22, -0.05, u);
      if (b.userData.head) b.userData.head.rotation.set(headX, headY, 0);
      // cocktail still in his hand, hand still raised near mouth
      const handWorld = getHandWorld('leftArm', new THREE.Vector3(0, -0.10, 0));
      c.position.copy(handWorld);
      c.rotation.z = -0.45;
      if (u >= 1) { beach.phase = 'idle'; beach.phaseT = 0; }
    } else if (beach.phase === 'sip') {
      // Periodic sip: arm + cocktail are already raised near the mouth, so
      // we just tilt the head back briefly and bring it forward again.
      const dur = 1.1;
      const u = Math.min(1, beach.phaseT / dur);
      const tri = u < 0.5 ? u * 2 : (1 - u) * 2;        // triangle 0→1→0
      const eased = tri * tri * (3 - 2 * tri);
      if (b.userData.head) b.userData.head.rotation.x = -0.05 - 0.30 * eased;
      const handWorld = getHandWorld('leftArm', new THREE.Vector3(0, -0.10, 0));
      c.position.copy(handWorld);
      c.rotation.z = -0.45;
      if (u >= 1) { beach.phase = 'idle'; beach.phaseT = 0; }
    } else {
      // idle — gentle breathing wobble; cocktail still in his hand.  Every
      // 8 seconds Baymax takes another sip.
      const t = beach.phaseT;
      if (b.userData.head) b.userData.head.rotation.set(-0.05, Math.sin(t * 0.6) * 0.18, 0);
      const handWorld = getHandWorld('leftArm', new THREE.Vector3(0, -0.10, 0));
      handWorld.y += Math.sin(t * 1.2) * 0.012;
      c.position.copy(handWorld);
      c.rotation.z = -0.45;
      if (beach.phaseT >= 8.0) { beach.phase = 'sip'; beach.phaseT = 0; }
    }

    // ---- "back..." HTML overlay — per-letter fade-in, then dot-cycle ----
    if (beach.satMarked) {
      const elapsed = stageT - beach.satTime;
      if (elapsed > 2.0) {
        if (beachBackEl.style.display !== 'block') beachBackEl.style.display = 'block';
        const fadeT = elapsed - 2.0;
        const LETTER_OFFSET = 0.25;
        const LETTER_FADE   = 0.7;
        const N = beachBackSpans.length;       // 4 letters + 3 dots
        const NLETTERS = 4;
        const ALL_FADE_DUR = LETTER_OFFSET * (N - 1) + LETTER_FADE;

        if (fadeT < ALL_FADE_DUR) {
          // initial per-letter fade-in
          for (let i = 0; i < N; i++) {
            const start = i * LETTER_OFFSET;
            const u = THREE.MathUtils.clamp((fadeT - start) / LETTER_FADE, 0, 1);
            const e = u * u * (3 - 2 * u);
            if (Math.abs(beach.backOpacities[i] - e) > 0.005) {
              beach.backOpacities[i] = e;
              beachBackSpans[i].style.opacity = e.toFixed(3);
            }
          }
        } else {
          // After the initial fade-in: the word "back" also pulses in/out
          // (never fully invisible) on the same cycle as the dots.  The dots
          // refade-in 1/2/3 during the cycle's first half, then everything
          // (word + dots) fades down together during the second half.
          const pt = fadeT - ALL_FADE_DUR;
          const PHASE = 0.55;                  // per-dot fade-in slot
          const FADE_IN  = PHASE * 3;          // 3 dots staggered
          const FADE_OUT = FADE_IN;            // matched fade-out length
          const CYCLE    = FADE_IN + FADE_OUT;
          const localT = pt % CYCLE;

          // Word opacity: pulses between WORD_MIN and 1.0, synced to the cycle.
          // The bright peak coincides with all three dots being visible.
          const WORD_MIN = 0.35;
          let wordOp;
          if (localT < FADE_IN) {
            const u = localT / FADE_IN;
            wordOp = WORD_MIN + (1 - WORD_MIN) * (u * u * (3 - 2 * u));
          } else {
            const u = (localT - FADE_IN) / FADE_OUT;
            const e = u * u * (3 - 2 * u);
            wordOp = WORD_MIN + (1 - WORD_MIN) * (1 - e);
          }
          for (let i = 0; i < NLETTERS; i++) {
            if (Math.abs(beach.backOpacities[i] - wordOp) > 0.005) {
              beach.backOpacities[i] = wordOp;
              beachBackSpans[i].style.opacity = wordOp.toFixed(3);
            }
          }

          // Dots: 1 → 2 → 3 fade in during the first half, then all three fade
          // out together during the second half.
          for (let d = 0; d < 3; d++) {
            const idx = NLETTERS + d;
            let op;
            if (localT < FADE_IN) {
              const start = d * PHASE;
              const u = THREE.MathUtils.clamp((localT - start) / PHASE, 0, 1);
              op = u * u * (3 - 2 * u);
            } else {
              const u = 1 - (localT - FADE_IN) / FADE_OUT;
              op = Math.max(0, u);
            }
            if (Math.abs(beach.backOpacities[idx] - op) > 0.005) {
              beach.backOpacities[idx] = op;
              beachBackSpans[idx].style.opacity = op.toFixed(3);
            }
          }
        }
      }
    }
  }

  const clock = new THREE.Clock();
  // While the intro paper-ball animation is running we keep rendering the
  // white world but freeze the regular Baymax-walks-toward-hole flow.  This
  // is on by default so Baymax doesn't start walking during the video, and
  // it gets released by initIntroSequence once the ball lands in the hole.
  let paperBallActive = true;
  let paperBallMesh = null;
  // Public api the intro sequence uses to inject + remove the paper ball
  // mesh and to control the pause flag.
  window._introPaperApi = {
    scene: white.scene,
    camera: white.camera,
    addMesh: (m) => { paperBallMesh = m; white.scene.add(m); paperBallActive = true; },
    removeMesh: () => {
      if (paperBallMesh) {
        white.scene.remove(paperBallMesh);
        // dispose to release GPU resources
        if (paperBallMesh.geometry) paperBallMesh.geometry.dispose();
        if (paperBallMesh.material) {
          if (paperBallMesh.material.map) paperBallMesh.material.map.dispose();
          paperBallMesh.material.dispose();
        }
        paperBallMesh = null;
      }
    },
    release: () => { paperBallActive = false; stageT = 0; },
    HOLE_RADIUS,
  };

  function loop() {
    const dt = Math.min(clock.getDelta(), 0.05);
    const t  = clock.getElapsedTime();
    if (!paperBallActive) stageT += dt;

    if (stage === 'intro') {
      if (!paperBallActive) updateIntro(dt, t);
      renderer.render(white.scene, white.camera);
    } else if (stage === 'fall') {
      updateFall(dt);
      renderer.render(white.scene, white.camera);
    } else if (stage === 'psych') {
      updatePsych(dt);
      renderer.render(psych.scene, psych.camera);
    } else if (stage === 'cobble') {
      updateCobble(dt);
      renderer.render(cobblestone.scene, cobblestone.camera);
    } else if (stage === 'beach') {
      updateBeach(dt);
      renderer.render(beach.scene, beach.camera);
    } else if (stage === 'linkedin') {
      updateLinkedIn(dt);
      renderer.render(linkedin.scene, linkedin.camera);
    } else if (stage === 'art') {
      updateArt(dt);
      renderer.render(artWorld.scene, artWorld.camera);
    } else if (stage === 'projects') {
      updateProjects(dt);
      renderer.render(projectsWorld.scene, projectsWorld.camera);
      cssRenderer.render(projectsWorld.scene, projectsWorld.camera);
    } else if (stage === 'cave') {
      updateCave(dt);
      renderer.render(cave.scene, cave.camera);
    }
    requestAnimationFrame(loop);
  }
  loop();

  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    cssRenderer.setSize(w, h);
    [white.camera, psych.camera, cobblestone.camera, beach.camera, linkedin.camera,
     artWorld.camera, projectsWorld.camera, cave.camera].forEach(c => {
      if (c.isPerspectiveCamera) {
        c.aspect = w / h;
        c.updateProjectionMatrix();
      }
    });
    psych.bgMat.uniforms.uAspect.value = w / h;
  });
}
</script>
</body>
