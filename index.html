function buildLinkedInLogoCanvas() {
  // Faithful "LinkedIn in" mark (Wikimedia Commons reference), B&W.
  //   * Black rounded square tile (~18 % corner radius)
  //   * White lowercase "in" with:
  //       - i: square dot + thick vertical stem
  //       - n: two stems joined by a semi-circular arch (annulus half)
  //   * Letter strokes have slightly rounded ends to match the brand
  const SIZE = 1024;
  const c = document.createElement('canvas');
  c.width = SIZE; c.height = SIZE;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, SIZE, SIZE);

  function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y,         x + w, y + r,         r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h,     x + w - r, y + h,     r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x,     y + h,     x,         y + h - r, r);
    ctx.lineTo(x,     y + r);
    ctx.arcTo(x,     y,         x + r,     y,         r);
    ctx.closePath();
  }

  // 1) Black tile with the brand's ~18 % corner radius
  const cornerR = SIZE * 0.180;
  ctx.fillStyle = '#000000';
  roundedRect(0, 0, SIZE, SIZE, cornerR);
  ctx.fill();

  // 2) White "in".  These ratios come from measuring the canonical mark:
  //    - stroke width ≈ 14% of tile
  //    - dot sits ≈ 22% from top, sized = stroke
  //    - stems run from 41% to 79% of tile height
  //    - "i" centre at 30%, "n" left edge at 48% (so the two letters share
  //      the visual center of the square)
  ctx.fillStyle = '#ffffff';

  const stroke      = SIZE * 0.140;
  const stemTop     = SIZE * 0.410;
  const baseY       = SIZE * 0.790;
  const stemH       = baseY - stemTop;
  const strokeR     = SIZE * 0.012;     // tiny rounding on stroke ends

  // ---- "i" ----
  const iX = SIZE * 0.305;
  // dot — perfect square (with a hair of rounding) sized = stroke width
  const dotSize = stroke;
  const dotY    = SIZE * 0.225;
  ctx.beginPath();
  roundedRect(iX - dotSize / 2, dotY, dotSize, dotSize, strokeR);
  ctx.fill();
  // stem
  ctx.beginPath();
  roundedRect(iX - stroke / 2, stemTop, stroke, stemH, strokeR);
  ctx.fill();

  // ---- "n" ----
  const nLeft   = SIZE * 0.482;
  const nWidth  = SIZE * 0.328;
  const humpR_O = nWidth / 2;            // outer hump radius
  const humpR_I = humpR_O - stroke;      // inner hump radius
  const humpCx  = nLeft + humpR_O;
  const humpCy  = stemTop;               // bottom of hump aligns with stem tops

  // left stem
  ctx.beginPath();
  roundedRect(nLeft, stemTop, stroke, stemH, strokeR);
  ctx.fill();
  // right stem
  ctx.beginPath();
  roundedRect(nLeft + nWidth - stroke, stemTop, stroke, stemH, strokeR);
  ctx.fill();
  // arched hump (annulus half over the top of the two stems)
  ctx.beginPath();
  ctx.arc(humpCx, humpCy, humpR_O, 0,        Math.PI, true);
  ctx.lineTo(humpCx - humpR_I, humpCy);
  ctx.arc(humpCx, humpCy, humpR_I, Math.PI,  2 * Math.PI, false);
  ctx.closePath();
  ctx.fill();

  return c;
}

function buildLinkedInScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  scene.add(new THREE.AmbientLight(0xffffff, 0.85));
  const fill = new THREE.DirectionalLight(0xffffff, 0.6);
  fill.position.set(5, 12, 4);
  scene.add(fill);

  // white floor so the black "in" tile reads as a logo on a page
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // logo — smaller than before (4.0 → 2.6 m, ~ 2× baymax height)
  const LOGO_SIZE = 2.6;
  const logoTex = new THREE.CanvasTexture(buildLinkedInLogoCanvas());
  logoTex.colorSpace = THREE.SRGBColorSpace;
  logoTex.anisotropy = 8;
  logoTex.minFilter = THREE.LinearMipmapLinearFilter;
  logoTex.magFilter = THREE.LinearFilter;

  const logo = new THREE.Mesh(
    new THREE.PlaneGeometry(LOGO_SIZE, LOGO_SIZE),
    new THREE.MeshBasicMaterial({ map: logoTex, transparent: true })
  );
  logo.rotation.x = -Math.PI / 2;
  logo.position.set(0, 0.012, 0);
  scene.add(logo);

  // progress ring — sized to hug the (smaller) logo
  const RING_R_INNER = LOGO_SIZE / 2 + 0.28;
  const RING_R_OUTER = RING_R_INNER + 0.10;
  const ringGeom = new THREE.RingGeometry(RING_R_INNER, RING_R_OUTER, 128);
  const ringMat = new THREE.ShaderMaterial({
    uniforms: { uProgress: { value: 0 } },
    vertexShader: `
      varying vec3 vLocalPos;
      void main() {
        vLocalPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uProgress;
      varying vec3 vLocalPos;
      void main() {
        // ring geometry sits in XY plane locally; mesh is rotated -PI/2 around X
        // so local +Y maps to world -Z (top of screen) — perfect for "12 o'clock".
        float angle = atan(vLocalPos.y, vLocalPos.x);
        // clockwise from 12 o'clock
        float clockA = mod(1.5707963 - angle, 6.2831853);
        if (clockA > uProgress * 6.2831853) discard;
        // black ring so it reads on the white floor
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
      }
    `,
    side: THREE.DoubleSide,
    transparent: true,
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(0, 0.02, 0);
  scene.add(ring);

  // baymax — enters from the TOP of the screen, then user takes over
  const baymax = buildBaymax();
  baymax.scale.setScalar(BAYMAX_SCALE);
  baymax.position.set(0, 0, -10);   // off-screen above the top edge
  scene.add(baymax);

  // Camera straight overhead so the LinkedIn tile reads as a perfectly flat
  // square (no perspective tilt).  Slight Z offset (0.0001) keeps the up axis
  // well-defined for the lookAt.
  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 17, 0.0001);
  camera.up.set(0, 0, -1);          // world -Z is "up" on screen (north)
  camera.lookAt(0, 0, 0);

  return {
    scene, camera, baymax, logo, ring, ringMat,
    logoSize: LOGO_SIZE,
    progress: 0,
    walkPhaseRef: { value: 0 },
  };
}

function buildExitSign(arrowDir = 'left') {
  // Tall light-grey metal sign on two legs.  The panel stands upright (with a
  // slight tilt back so it's readable from the top-down camera) and is rotated
  // at the group level so the "exit" face points at Baymax's approach side.
  const g = new THREE.Group();
  const metalMat = new THREE.MeshStandardMaterial({
    color: 0xb6bac0, roughness: 0.4, metalness: 0.85,
  });
  const darkMetalMat = new THREE.MeshStandardMaterial({
    color: 0x6a6e74, roughness: 0.45, metalness: 0.8,
  });

  // Legs that raise the panel a bit above Baymax's head level
  const LEG_HEIGHT = 1.4;
  for (const x of [-0.45, 0.45]) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.028, 0.028, LEG_HEIGHT, 12),
      darkMetalMat
    );
    leg.position.set(x, LEG_HEIGHT / 2, 0);
    leg.castShadow = true;
    g.add(leg);
    const foot = new THREE.Mesh(
      new THREE.CylinderGeometry(0.07, 0.085, 0.028, 14),
      darkMetalMat
    );
    foot.position.set(x, 0.014, 0);
    g.add(foot);
  }
  // crossbar between the legs near the top
  const crossbar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 0.95, 12),
    darkMetalMat
  );
  crossbar.rotation.z = Math.PI / 2;
  crossbar.position.set(0, LEG_HEIGHT - 0.10, 0);
  g.add(crossbar);

  // Sign canvas — larger so the "exit" text renders crisp
  const W = 512, H = 256;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#c8cdd2';                 // light grey
  ctx.fillRect(0, 0, W, H);
  // soft border
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 9;
  ctx.strokeRect(5, 5, W - 10, H - 10);
  // brushed-metal streaks
  for (let i = 0; i < 110; i++) {
    ctx.strokeStyle = `rgba(255,255,255,${0.04 + Math.random() * 0.05})`;
    ctx.lineWidth = 0.6;
    const y = Math.random() * H;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y + (Math.random() - 0.5) * 4);
    ctx.stroke();
  }
  // "exit" in red
  ctx.fillStyle = '#cc1f1f';
  ctx.font = 'bold 130px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('exit', W / 2, H / 2 + 8);
  // red arrow
  ctx.fillStyle = '#cc1f1f';
  ctx.beginPath();
  if (arrowDir === 'left') {
    ctx.moveTo(56, H / 2);
    ctx.lineTo(116, H / 2 - 30);
    ctx.lineTo(116, H / 2 - 9);
    ctx.lineTo(156, H / 2 - 9);
    ctx.lineTo(156, H / 2 + 9);
    ctx.lineTo(116, H / 2 + 9);
    ctx.lineTo(116, H / 2 + 30);
  } else {
    ctx.moveTo(W - 56, H / 2);
    ctx.lineTo(W - 116, H / 2 - 30);
    ctx.lineTo(W - 116, H / 2 - 9);
    ctx.lineTo(W - 156, H / 2 - 9);
    ctx.lineTo(W - 156, H / 2 + 9);
    ctx.lineTo(W - 116, H / 2 + 9);
    ctx.lineTo(W - 116, H / 2 + 30);
  }
  ctx.closePath();
  ctx.fill();

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  const faceMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.55, metalness: 0.4 });
  // BoxGeometry material order: +X, -X, +Y, -Y, +Z, -Z
  // text on +Z; we orient the whole group below so the face is visible from
  // the top-down camera (which sits high above and slightly +Z of origin)
  const panelMats = [metalMat, metalMat, metalMat, metalMat, faceMat, metalMat];
  const panel = new THREE.Mesh(new THREE.BoxGeometry(1.50, 0.78, 0.06), panelMats);
  panel.position.set(0, LEG_HEIGHT + 0.30, 0);   // perched on top of the legs
  // Only a light backward tilt — keeps the sign reading as VERTICAL while
  // angling the face just enough that the top-down camera can still read it.
  panel.rotation.x = -0.30;
  panel.castShadow = true;
  panel.receiveShadow = true;
  g.add(panel);

  return g;
}

function buildArtScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xeee5d3);    // warm gallery off-white

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 0.95);
  sun.position.set(5, 12, 4);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);

  // light wood floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 30),
    new THREE.MeshStandardMaterial({ color: 0xc9b58a, roughness: 0.85 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // a row of "paintings" along the back wall — colourful canvases in dark frames
  const palette = [
    0xd05a3b, 0x4a89c2, 0x6cae6c, 0xc94a72, 0xefb74a, 0x7e5fb3, 0x4a5cb8,
  ];
  for (let i = 0; i < 7; i++) {
    const w = 1.4 + Math.random() * 0.7;
    const h = 1.0 + Math.random() * 0.6;
    const x = -10 + i * 3.0;
    const baseY = 1.4 + (i % 2 === 0 ? 0.10 : 0);

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(w + 0.18, h + 0.18, 0.10),
      new THREE.MeshStandardMaterial({ color: 0x2a1a0e, roughness: 0.7 })
    );
    frame.position.set(x, baseY, -6.5);
    frame.castShadow = true;
    scene.add(frame);

    const canvas = new THREE.Mesh(
      new THREE.PlaneGeometry(w, h),
      new THREE.MeshStandardMaterial({ color: palette[i], roughness: 0.85 })
    );
    canvas.position.set(x, baseY, -6.43);
    scene.add(canvas);
  }

  // a low pedestal with a small abstract sculpture
  const pedestal = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.9, 0.9),
    new THREE.MeshStandardMaterial({ color: 0xddd2bd, roughness: 0.9 })
  );
  pedestal.position.set(2.5, 0.45, -2);
  pedestal.castShadow = true;
  pedestal.receiveShadow = true;
  scene.add(pedestal);
  const sculpture = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.42, 0),
    new THREE.MeshStandardMaterial({ color: 0xb58a52, metalness: 0.4, roughness: 0.5 })
  );
  sculpture.position.set(2.5, 1.20, -2);
  sculpture.castShadow = true;
  scene.add(sculpture);

  // a small easel on the other side
  const easelMat = new THREE.MeshStandardMaterial({ color: 0x6b3e1d, roughness: 0.85 });
  const legL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.6, 0.06), easelMat);
  legL.position.set(-3.0, 0.8, -2);
  legL.rotation.z =  0.10;
  scene.add(legL);
  const legR = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.6, 0.06), easelMat);
  legR.position.set(-2.6, 0.8, -2);
  legR.rotation.z = -0.10;
  scene.add(legR);
  const cross = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.06, 0.06), easelMat);
  cross.position.set(-2.8, 0.55, -2);
  scene.add(cross);
  const tinyCanvas = new THREE.Mesh(
    new THREE.PlaneGeometry(0.55, 0.7),
    new THREE.MeshStandardMaterial({ color: 0xeae0c8 })
  );
  tinyCanvas.position.set(-2.8, 1.15, -1.95);
  tinyCanvas.rotation.x = -0.05;
  scene.add(tinyCanvas);

  // baymax — enters from the LEFT (he came through cobble's right edge)
  const baymax = buildBaymax();
  baymax.scale.setScalar(BAYMAX_SCALE);
  baymax.position.set(-12, 0, 0);
  baymax.rotation.y = Math.PI / 2;     // facing +X (walking right into the scene)
  scene.add(baymax);

  // exit sign — points back to the LEFT (where the entry/exit edge is)
  const exitSign = buildExitSign('left');
  exitSign.position.set(-8.0, 0, -2.0);     // shifted north
  scene.add(exitSign);

  // SAME top-down camera as cobble
  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0.6, 16, 3.5);
  camera.lookAt(0, 0, 0);

  return {
    scene, camera, baymax,
    walkPhaseRef: { value: 0 },
    entered: false,
    entryT: 0,
    returning: false,
  };
}

// ==========================================================================
// Scene 9 — CAVE (entered through the top-right corner of the cobble world)
// Earthy underground cavern with glowing mushrooms and crystal pools.
// ==========================================================================

function buildCaveScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x140d08);
  scene.fog = new THREE.FogExp2(0x140d08, 0.025);

  // ambient + warm torch-coloured fill
  scene.add(new THREE.AmbientLight(0x6a4a2a, 0.55));
  const torch = new THREE.PointLight(0xffb46a, 4.0, 14, 1.5);
  torch.position.set(0, 3.5, 0);
  scene.add(torch);
  // second cool point light to give the crystals a glow
  const crystalLight = new THREE.PointLight(0x88c0ff, 2.0, 10, 1.5);
  crystalLight.position.set(5.5, 1.2, -4);
  scene.add(crystalLight);

  // -- earthy ground (procedural canvas texture) --
  const W = 1024, H = 1024;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  // base brown
  const grad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, W * 0.7);
  grad.addColorStop(0, '#553420');
  grad.addColorStop(0.6, '#3b2414');
  grad.addColorStop(1, '#1d1108');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // pebble speckle
  for (let i = 0; i < 9000; i++) {
    const v = 50 + Math.floor(Math.random() * 60);
    ctx.fillStyle = `rgba(${v + 20},${v},${Math.max(0, v - 30)},${0.35 + Math.random()*0.4})`;
    ctx.fillRect(Math.random() * W, Math.random() * H, 1 + Math.random() * 2.4, 1 + Math.random() * 2.4);
  }
  // darker patches
  for (let i = 0; i < 50; i++) {
    const cx = Math.random() * W, cy = Math.random() * H;
    const r = 30 + Math.random() * 90;
    const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g2.addColorStop(0, 'rgba(20,12,4,0.55)');
    g2.addColorStop(1, 'rgba(20,12,4,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  const groundTex = new THREE.CanvasTexture(c);
  groundTex.colorSpace = THREE.SRGBColorSpace;
  groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
  groundTex.repeat.set(3, 3);
  groundTex.anisotropy = 8;

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // -- cave walls: a ring of irregular rock columns surrounding the play area --
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x4a2e1a, roughness: 0.95, flatShading: true });
  const ringRadius = 12;
  const wallSegments = 28;
  for (let i = 0; i < wallSegments; i++) {
    const a = (i / wallSegments) * Math.PI * 2;
    const jitter = 0.6 + Math.random() * 1.0;
    const r = ringRadius + (Math.random() - 0.5) * 1.6;
    const x = Math.cos(a) * r;
    const z = Math.sin(a) * r;
    const h = 3.5 + Math.random() * 3.5;
    const w = 1.5 + Math.random() * 1.6;
    const d = 1.5 + Math.random() * 1.6;
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(jitter * 1.4, 0),
      rockMat
    );
    rock.scale.set(w * 0.6, h * 0.6, d * 0.6);
    rock.position.set(x, h / 2 - 0.4, z);
    rock.rotation.set(Math.random() * 0.6, Math.random() * Math.PI * 2, Math.random() * 0.6);
    rock.castShadow = true;
    rock.receiveShadow = true;
    scene.add(rock);
  }

  // -- stalagmites (ground spikes) scattered around --
  const stalagMat = new THREE.MeshStandardMaterial({ color: 0x5a3a22, roughness: 0.9 });
  for (let i = 0; i < 9; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 4 + Math.random() * 5;
    const h = 0.6 + Math.random() * 1.4;
    const sp = new THREE.Mesh(
      new THREE.ConeGeometry(0.35 + Math.random() * 0.3, h, 8),
      stalagMat
    );
    sp.position.set(Math.cos(a) * r, h / 2, Math.sin(a) * r);
    sp.rotation.y = Math.random() * Math.PI;
    sp.castShadow = true;
    sp.receiveShadow = true;
    scene.add(sp);
  }

  // -- stalactites (hanging from ceiling) --
  const ceilingY = 6.0;
  for (let i = 0; i < 7; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 3 + Math.random() * 6;
    const h = 0.7 + Math.random() * 1.6;
    const st = new THREE.Mesh(
      new THREE.ConeGeometry(0.30 + Math.random() * 0.25, h, 8),
      stalagMat
    );
    st.position.set(Math.cos(a) * r, ceilingY - h / 2, Math.sin(a) * r);
    st.rotation.x = Math.PI;       // tip down
    st.rotation.y = Math.random() * Math.PI;
    scene.add(st);
  }

  // -- dim ceiling vault: a giant inverted bowl --
  const vault = new THREE.Mesh(
    new THREE.SphereGeometry(14, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color: 0x2a1a0c, side: THREE.BackSide, roughness: 1.0 })
  );
  vault.position.y = -2;
  scene.add(vault);

  // -- glowing mushrooms (the "earthy" magic) --
  const mushrooms = [];
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 2 + Math.random() * 7;
    const grp = new THREE.Group();
    grp.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
    const stalk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.05, 0.32, 8),
      new THREE.MeshStandardMaterial({ color: 0xe8d8b8, roughness: 0.8 })
    );
    stalk.position.y = 0.16;
    grp.add(stalk);
    const capColor = Math.random() < 0.5 ? 0x66ffaa : 0xffbb55;
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.10, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
      new THREE.MeshStandardMaterial({
        color: capColor, emissive: capColor, emissiveIntensity: 0.9, roughness: 0.6,
      })
    );
    cap.position.y = 0.32;
    cap.rotation.x = 0;
    grp.add(cap);
    scene.add(grp);
    mushrooms.push({ grp, baseY: 0, phase: Math.random() * Math.PI * 2 });
  }

  // -- crystal cluster pool --
  const crystalGroup = new THREE.Group();
  crystalGroup.position.set(5.5, 0, -4);
  for (let i = 0; i < 6; i++) {
    const c = new THREE.Mesh(
      new THREE.ConeGeometry(0.12 + Math.random() * 0.08, 0.7 + Math.random() * 0.6, 6),
      new THREE.MeshStandardMaterial({
        color: 0x6aa6ff, emissive: 0x3a78cc, emissiveIntensity: 0.6,
        roughness: 0.25, metalness: 0.1, transparent: true, opacity: 0.85,
      })
    );
    const ax = (Math.random() - 0.5) * 0.6;
    const az = (Math.random() - 0.5) * 0.6;
    c.position.set(ax, c.geometry.parameters.height / 2, az);
    c.rotation.set((Math.random() - 0.5) * 0.4, Math.random() * Math.PI, (Math.random() - 0.5) * 0.4);
    crystalGroup.add(c);
  }
  scene.add(crystalGroup);

  // -- exit sign — sits on the left side of the cave (the only way out,
  // back to the cobble world).  Same mesh used by the art / projects
  // worlds so it reads as part of the same series.  Positioned just inside
  // the rock-column ring so it's clearly visible and reachable.  Rotated
  // 180° from its earlier facing so it now turns TOWARD the viewer.
  const exitSign = buildExitSign('left');
  exitSign.position.set(-7.2, 0, 3.0);
  // Two ×180° turns: the first was added previously, this one cancels +π
  // back to the original yaw so the face turns toward the viewer.
  exitSign.rotation.y = (3 * Math.PI) / 4 + Math.PI + Math.PI;
  scene.add(exitSign);

  // Warm yellow spotlight just above the sign, throwing a small pool of
  // light onto the panel — reads like a lantern.
  const signLight = new THREE.PointLight(0xffd28a, 3.5, 4.5, 1.8);
  signLight.position.set(-7.2, 3.4, 3.0);
  scene.add(signLight);
  // Tiny bulb mesh so the source of the glow is visible
  const signBulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 10),
    new THREE.MeshBasicMaterial({ color: 0xffe2a8 })
  );
  signBulb.position.copy(signLight.position);
  scene.add(signBulb);

  // -- baymax --
  const baymax = buildBaymax();
  baymax.scale.setScalar(BAYMAX_SCALE);
  baymax.position.set(-9, 0, 6);
  baymax.rotation.y = Math.PI / 4;       // facing into the cave
  scene.add(baymax);

  // -- top-down style camera consistent with the other portal worlds --
  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0.6, 16, 3.5);
  camera.lookAt(0, 0, 0);

  return {
    scene, camera, baymax,
    walkPhaseRef: { value: 0 },
    entered: false,
    entryT: 0,
    returning: false,
    mushrooms,
    crystalGroup,
    torchLight: torch,
    exitSignPos: new THREE.Vector3(-7.2, 0, 3.0),
  };
}

// ==========================================================================
// Scene 8 — PROJECTS (entered through the "projects" exit, left edge of cobble)
// ==========================================================================

function buildProjectsScene() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x222a36);

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const sun = new THREE.DirectionalLight(0xffe9c8, 0.85);
  sun.position.set(-4, 12, 4);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);

  // concrete floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 30),
    new THREE.MeshStandardMaterial({ color: 0x3a3f48, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // workbenches and tools, scattered around
  const woodMat   = new THREE.MeshStandardMaterial({ color: 0x6b4a2b, roughness: 0.85 });
  const metalMat  = new THREE.MeshStandardMaterial({ color: 0x8a8e95, roughness: 0.45, metalness: 0.6 });
  const screenMat = new THREE.MeshStandardMaterial({ color: 0x223344, emissive: 0x4a8bbd, emissiveIntensity: 0.5 });

  // long workbench
  const bench = new THREE.Mesh(new THREE.BoxGeometry(5.0, 0.10, 1.4), woodMat);
  bench.position.set(0, 0.85, -3.5);
  bench.castShadow = true;
  bench.receiveShadow = true;
  scene.add(bench);
  for (const x of [-2.3, 2.3]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.85, 1.3), woodMat);
    leg.position.set(x, 0.425, -3.5);
    leg.castShadow = true;
    scene.add(leg);
  }

  // ---- realistic-ish laptop on the bench ----
  const LAPTOP = { x: -1.2, y: 0.90, z: -3.4 };
  const aluMat = new THREE.MeshStandardMaterial({ color: 0x8a8e95, roughness: 0.45, metalness: 0.7 });
  const aluDarkMat = new THREE.MeshStandardMaterial({ color: 0x484c54, roughness: 0.55, metalness: 0.6 });

  // base (slightly thicker, with rounded look via stacked plates)
  const lapBase = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.04, 0.72), aluMat);
  lapBase.position.set(LAPTOP.x, LAPTOP.y + 0.02, LAPTOP.z);
  lapBase.castShadow = true;
  lapBase.receiveShadow = true;
  scene.add(lapBase);

  // keyboard well (recessed dark panel)
  const kbCanvas = document.createElement('canvas');
  kbCanvas.width = 384; kbCanvas.height = 256;
  const kctx = kbCanvas.getContext('2d');
  kctx.fillStyle = '#15171c';
  kctx.fillRect(0, 0, 384, 256);
  // keys grid
  const cols = 14, rows = 5;
  const kw = (384 - 12) / cols, kh = (256 - 80) / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const kx = 6 + c * kw, ky = 8 + r * kh;
      kctx.fillStyle = '#2c3038';
      kctx.fillRect(kx + 2, ky + 2, kw - 4, kh - 4);
      kctx.fillStyle = '#3a3f49';
      kctx.fillRect(kx + 3, ky + 3, kw - 6, kh - 6);
      kctx.fillStyle = 'rgba(255,255,255,0.05)';
      kctx.fillRect(kx + 4, ky + 4, kw - 8, 2);
    }
  }
  // trackpad
  kctx.fillStyle = '#1d2026';
  kctx.fillRect(96, 174, 192, 72);
  kctx.strokeStyle = '#33363c';
  kctx.lineWidth = 1;
  kctx.strokeRect(96, 174, 192, 72);
  const kbTex = new THREE.CanvasTexture(kbCanvas);
  kbTex.colorSpace = THREE.SRGBColorSpace;
  const kbMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.96, 0.64),
    new THREE.MeshStandardMaterial({ map: kbTex, roughness: 0.7 })
  );
  kbMesh.rotation.x = -Math.PI / 2;
  kbMesh.position.set(LAPTOP.x, LAPTOP.y + 0.041, LAPTOP.z);
  scene.add(kbMesh);

  // hinge
  const hinge = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.018, 1.0, 12),
    aluDarkMat
  );
  hinge.rotation.z = Math.PI / 2;
  hinge.position.set(LAPTOP.x, LAPTOP.y + 0.06, LAPTOP.z - 0.34);
  scene.add(hinge);

  // screen lid (bezel)
  const lidTilt = -0.22;
  const bezel = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.66, 0.04), aluDarkMat);
  bezel.position.set(LAPTOP.x, LAPTOP.y + 0.40, LAPTOP.z - 0.36);
  bezel.rotation.x = lidTilt;
  bezel.castShadow = true;
  scene.add(bezel);

  // inset display content with a small fake code editor
  const sCanvas = document.createElement('canvas');
  sCanvas.width = 640; sCanvas.height = 400;
  const sctx = sCanvas.getContext('2d');
  sctx.fillStyle = '#0a1220';
  sctx.fillRect(0, 0, 640, 400);
  // top chrome bar
  sctx.fillStyle = '#16223a';
  sctx.fillRect(0, 0, 640, 28);
  // window dots
  const dots = [['#ff5e57', 14], ['#febc2e', 30], ['#28c941', 46]];
  for (const [col, x] of dots) { sctx.fillStyle = col; sctx.beginPath(); sctx.arc(x, 14, 6, 0, Math.PI * 2); sctx.fill(); }
  // tab text
  sctx.fillStyle = '#cad4e0';
  sctx.font = 'bold 13px monospace';
  sctx.fillText('scene.js', 80, 18);
  // line numbers + code
  sctx.font = '14px monospace';
  let yy = 56;
  const code = [
    ['#5b6678', '01'], ['#9c8ec7', 'function'], ['#cad4e0', ' createScene() {'],
    ['#5b6678', '02'], ['#cad4e0', '  '], ['#9c8ec7', 'const'], ['#cad4e0', ' scene = '], ['#d99c5e', 'new'], ['#cad4e0', ' THREE.Scene();'],
    ['#5b6678', '03'], ['#cad4e0', '  scene.background = '], ['#d99c5e', 'new'], ['#cad4e0', ' THREE.Color(0x000);'],
    ['#5b6678', '04'], ['#a2cd8a', '  // setup lighting'],
    ['#5b6678', '05'], ['#cad4e0', '  scene.add('], ['#d99c5e', 'new'], ['#cad4e0', ' THREE.AmbientLight());'],
    ['#5b6678', '06'], ['#9c8ec7', '  return'], ['#cad4e0', ' scene;'],
    ['#5b6678', '07'], ['#cad4e0', '}'],
    ['#5b6678', '08'], ['#cad4e0', ''],
    ['#5b6678', '09'], ['#7ba9d9', 'createScene'], ['#cad4e0', '();'],
  ];
  let lineX = 12;
  let curLine = -1;
  for (let i = 0; i < code.length; i += 2) {
    if (code[i][1].length === 2 && /^\d+$/.test(code[i][1])) {
      curLine++;
      if (curLine > 0) yy += 22;
      lineX = 12;
      sctx.fillStyle = code[i][0];
      sctx.fillText(code[i][1], lineX, yy);
      lineX = 48;
      continue;
    }
    sctx.fillStyle = code[i][0];
    sctx.fillText(code[i][1], lineX, yy);
    lineX += sctx.measureText(code[i][1]).width;
  }
  // blinking caret (static here)
  sctx.fillStyle = '#cad4e0';
  sctx.fillRect(12 + sctx.measureText('  return scene;').width + 36, yy - 78, 8, 16);

  const screenTex = new THREE.CanvasTexture(sCanvas);
  screenTex.colorSpace = THREE.SRGBColorSpace;
  const screenMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.97, 0.59),
    new THREE.MeshBasicMaterial({ map: screenTex })
  );
  screenMesh.position.set(LAPTOP.x, LAPTOP.y + 0.40, LAPTOP.z - 0.34);
  screenMesh.rotation.x = lidTilt;
  scene.add(screenMesh);

  // (the old gray-blue stack of 3 books is replaced by an interactable
  // pair of books built later in this scene)

  // a few crates scattered around the floor — each is interactable: press E
  // nearby to "peep inside" and view a small Baymax in a swinging-tire scene.
  const crateBodyMat = new THREE.MeshStandardMaterial({ color: 0x5e3f23, roughness: 0.85 });
  const crateInsideWallMat = new THREE.MeshStandardMaterial({ color: 0x4a2f1b, roughness: 0.95, side: THREE.DoubleSide });
  const crateInsideFloorMat = new THREE.MeshStandardMaterial({ color: 0x6b4a2b, roughness: 0.9 });
  const crateInsideSideMat = new THREE.MeshStandardMaterial({ color: 0x3f2613, roughness: 0.95, side: THREE.DoubleSide });
  const crateData = [
    { x: -4.5, z: 1.5, s: 1.0 },
    { x: -3.8, z: 0.3, s: 0.7 },
    { x:  4.2, z: 1.5, s: 1.0 },
    { x:  4.6, z: 0.4, s: 0.8 },
  ];
  const crates = [];
  // helper: build the small back-wall poster (varies per crate)
  function makeCratePoster(label, subtitle) {
    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 128;
    const c = cv.getContext('2d');
    c.fillStyle = '#f3e4c0'; c.fillRect(0, 0, 128, 128);
    c.fillStyle = '#cc1f1f';
    c.font = 'bold 56px serif';
    c.textAlign = 'center';
    c.fillText(label, 64, 70);
    c.fillStyle = '#222';
    c.font = '12px sans-serif';
    c.fillText(subtitle, 64, 100);
    const tx = new THREE.CanvasTexture(cv);
    tx.colorSpace = THREE.SRGBColorSpace;
    return new THREE.MeshStandardMaterial({ map: tx, roughness: 0.85 });
  }

  for (let idx = 0; idx < crateData.length; idx++) {
    const d = crateData[idx];
    // each crate has its own front-face material so we can hide just that
    // face on the active crate without affecting the others
    const frontMat = new THREE.MeshStandardMaterial({ color: 0x5e3f23, roughness: 0.85 });
    const frontMatHidden = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });
    // material order: +X, -X, +Y, -Y, +Z(front), -Z
    const mats = [crateBodyMat, crateBodyMat, crateBodyMat, crateBodyMat, frontMat, crateBodyMat];
    const cr = new THREE.Mesh(new THREE.BoxGeometry(d.s, d.s, d.s), mats);
    cr.position.set(d.x, d.s / 2, d.z);
    cr.castShadow = true;
    cr.receiveShadow = true;
    scene.add(cr);

    // interior content — hidden until the player peeks inside
    const interior = new THREE.Group();
    interior.position.copy(cr.position);
    interior.visible = false;

    // shared structure: walls + floor + ceiling
    const isGarden = (idx === 1);
    const floorMat = isGarden
      ? new THREE.MeshStandardMaterial({ color: 0x4a7a3a, roughness: 0.95 })
      : crateInsideFloorMat;
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(d.s * 0.98, d.s * 0.98), crateInsideWallMat);
    backWall.position.z = -d.s / 2 + 0.006;
    interior.add(backWall);
    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(d.s * 0.98, d.s * 0.98), crateInsideSideMat);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.x = -d.s / 2 + 0.006;
    interior.add(leftWall);
    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(d.s * 0.98, d.s * 0.98), crateInsideSideMat);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.x = d.s / 2 - 0.006;
    interior.add(rightWall);
    const innerFloor = new THREE.Mesh(new THREE.PlaneGeometry(d.s * 0.98, d.s * 0.98), floorMat);
    innerFloor.rotation.x = -Math.PI / 2;
    innerFloor.position.y = -d.s / 2 + 0.006;
    interior.add(innerFloor);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(d.s * 0.98, d.s * 0.98), crateInsideWallMat);
    ceil.rotation.x = Math.PI / 2;
    ceil.position.y = d.s / 2 - 0.006;
    interior.add(ceil);

    // Per-crate poster — number + theme
    const posterLabels = [
      ['1', 'tire swing'],
      ['2', 'tiny garden'],
      ['3', 'mini cinema'],
      ['4', 'tap to score'],
    ];
    const [pLabel, pSubtitle] = posterLabels[idx] || ['?', 'peep inside'];
    const poster = new THREE.Mesh(
      new THREE.PlaneGeometry(d.s * 0.36, d.s * 0.36),
      makeCratePoster(pLabel, pSubtitle)
    );
    poster.position.set(-d.s * 0.26, d.s * 0.10, -d.s / 2 + 0.011);
    interior.add(poster);

    // mini Baymax on the floor (all crates)
    const mini = buildBaymax();
    mini.scale.setScalar(d.s * 0.18);
    const miniBaseY = -d.s / 2 + 0.008;
    mini.position.set(0, miniBaseY, d.s * 0.10);
    mini.rotation.y = Math.PI / 2;
    interior.add(mini);

    // ---- per-crate scene content ----
    let tirePivot = null;
    let cinemaMat = null;
    let cinemaCanvas = null;
    let cinemaCtx = null;
    let tireMesh = null;
    const gameTargets = [];

    if (idx === 0) {
      // 1. Tire swing
      tirePivot = new THREE.Group();
      tirePivot.position.set(d.s * 0.22, d.s / 2 - 0.012, -d.s * 0.05);
      const rope = new THREE.Mesh(
        new THREE.CylinderGeometry(0.006, 0.006, d.s * 0.40, 6),
        new THREE.MeshStandardMaterial({ color: 0xa0805a, roughness: 0.9 })
      );
      rope.position.y = -d.s * 0.20;
      tirePivot.add(rope);
      tireMesh = new THREE.Mesh(
        new THREE.TorusGeometry(d.s * 0.10, d.s * 0.028, 10, 18),
        new THREE.MeshStandardMaterial({ color: 0x0e0e0e, roughness: 0.95 })
      );
      tireMesh.position.y = -d.s * 0.40 + d.s * 0.05;
      tireMesh.rotation.x = Math.PI / 2;
      tirePivot.add(tireMesh);
      interior.add(tirePivot);
    } else if (idx === 1) {
      // 2. Tiny garden — flower + bench + grass tufts
      const flowerStem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.006, 0.006, d.s * 0.18, 6),
        new THREE.MeshStandardMaterial({ color: 0x3a6f2c })
      );
      flowerStem.position.set(d.s * 0.22, miniBaseY + d.s * 0.09, -d.s * 0.06);
      interior.add(flowerStem);
      const petalMat = new THREE.MeshStandardMaterial({ color: 0xf2a8c4, roughness: 0.7 });
      for (let k = 0; k < 6; k++) {
        const petal = new THREE.Mesh(
          new THREE.SphereGeometry(d.s * 0.022, 10, 8),
          petalMat
        );
        const a = (k / 6) * Math.PI * 2;
        petal.position.set(
          d.s * 0.22 + Math.cos(a) * d.s * 0.030,
          miniBaseY + d.s * 0.180,
          -d.s * 0.06 + Math.sin(a) * d.s * 0.030
        );
        interior.add(petal);
      }
      const flowerCore = new THREE.Mesh(
        new THREE.SphereGeometry(d.s * 0.018, 10, 8),
        new THREE.MeshStandardMaterial({ color: 0xefd75a, roughness: 0.6 })
      );
      flowerCore.position.set(d.s * 0.22, miniBaseY + d.s * 0.180, -d.s * 0.06);
      interior.add(flowerCore);
      // little wooden bench
      const benchMat = new THREE.MeshStandardMaterial({ color: 0x7a5230, roughness: 0.85 });
      const benchSeat = new THREE.Mesh(new THREE.BoxGeometry(d.s * 0.30, d.s * 0.018, d.s * 0.08), benchMat);
      benchSeat.position.set(-d.s * 0.18, miniBaseY + d.s * 0.07, -d.s * 0.18);
      interior.add(benchSeat);
      for (const lx of [-d.s * 0.12, d.s * 0.12]) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(d.s * 0.012, d.s * 0.07, d.s * 0.06), benchMat);
        leg.position.set(-d.s * 0.18 + lx, miniBaseY + d.s * 0.035, -d.s * 0.18);
        interior.add(leg);
      }
      // grass tufts (small green spikes)
      const grassMat = new THREE.MeshStandardMaterial({ color: 0x55883e, roughness: 0.95 });
      for (let k = 0; k < 8; k++) {
        const tuft = new THREE.Mesh(
          new THREE.ConeGeometry(d.s * 0.008, d.s * 0.035, 4),
          grassMat
        );
        tuft.position.set(
          (Math.random() - 0.5) * d.s * 0.7,
          miniBaseY + d.s * 0.017,
          (Math.random() - 0.4) * d.s * 0.6
        );
        interior.add(tuft);
      }
    } else if (idx === 2) {
      // 3. Mini cinema — narrow VERTICAL window mounted on the RIGHT side
      // of the back wall so it doesn't overlap the "3 / mini cinema" poster.
      cinemaCanvas = document.createElement('canvas');
      cinemaCanvas.width = 144; cinemaCanvas.height = 256;     // vertical aspect
      cinemaCtx = cinemaCanvas.getContext('2d');
      const cinemaTex = new THREE.CanvasTexture(cinemaCanvas);
      cinemaTex.colorSpace = THREE.SRGBColorSpace;
      cinemaMat = new THREE.MeshBasicMaterial({ map: cinemaTex });
      const cinemaScreen = new THREE.Mesh(
        new THREE.PlaneGeometry(d.s * 0.26, d.s * 0.55),
        cinemaMat
      );
      cinemaScreen.position.set(d.s * 0.24, d.s * 0.18, -d.s / 2 + 0.011);
      interior.add(cinemaScreen);
      // simple frame around the screen
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1208, roughness: 0.9 });
      const frame = new THREE.Mesh(
        new THREE.PlaneGeometry(d.s * 0.32, d.s * 0.61),
        frameMat
      );
      frame.position.set(d.s * 0.24, d.s * 0.18, -d.s / 2 + 0.010);
      interior.add(frame);
      // tiny seats in front of the screen
      const seatMat = new THREE.MeshStandardMaterial({ color: 0x4a1e1e, roughness: 0.85 });
      for (let k = 0; k < 3; k++) {
        const seat = new THREE.Mesh(
          new THREE.BoxGeometry(d.s * 0.07, d.s * 0.07, d.s * 0.06),
          seatMat
        );
        seat.position.set(-d.s * 0.10 + k * d.s * 0.10, miniBaseY + d.s * 0.035, -d.s * 0.10);
        interior.add(seat);
      }
    } else if (idx === 3) {
      // 4. Whack-a-mole — six small targets arranged on the back wall.  In zen
      // mode they spawn one at a time at a random position; click to score.
      const targetMat = new THREE.MeshStandardMaterial({
        color: 0xffd24a, emissive: 0xff7a18, emissiveIntensity: 0.7, roughness: 0.5,
      });
      const cols = 3, rows = 2;
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const t = new THREE.Mesh(
            new THREE.SphereGeometry(d.s * 0.07, 18, 14),
            targetMat.clone()
          );
          t.position.set(
            -d.s * 0.30 + col * d.s * 0.30,
             d.s * 0.20 - row * d.s * 0.22,
            -d.s / 2 + 0.045
          );
          t.visible = false;
          t.userData.crateIdx = idx;
          t.userData.isTarget = true;
          interior.add(t);
          gameTargets.push(t);
        }
      }
    }

    scene.add(interior);

    crates.push({
      data: { x: d.x, z: d.z, s: d.s, y: d.s / 2 },
      crateMesh: cr,
      frontMat,
      frontMatHidden,
      interior,
      mini,
      tirePivot,
      tireMesh,
      cinemaCanvas,
      cinemaCtx,
      cinemaMat,
      gameTargets,
      gameScore: 0,
      gameSpawnTimer: 0,
      gameActiveTarget: -1,
      miniBaseY,
      miniX: 0,
      miniWalkPhase: 0,
      miniFacing: 1,
      tireT: 0,
      cinemaT: 0,
      ridingTire: false,
      idx,
    });
  }

  // ---- A pair of books on the bench (replaces the old gray-blue stack) ----
  // The top book is yaw-rotated so the stack reads as "casually placed."
  // The pair is one interactable: pressing E reads them as a single book.
  const books = [];
  const benchBookData = {
    x: 1.5, z: -3.45, h: 0.18,            // h = stacked height (used for openBook offset)
    y: 1.05,                              // bench-top Y where the open book sits
    pages: [
      { l: 'art diary',
        r: 'sketches, outfits,\narchitectures,\nand things\nthat keep me\nlooking.\n\n→  turn the page' },
      { l: '— degas',
        r: '"art is not what\nyou see, but what\nyou make others\nsee."' },
      { l: '— j. berger',
        r: '"seeing comes\nbefore words.\nthe child looks\nand recognises\nbefore it can\nspeak."' },
      { l: '— f. franck',
        r: '"drawing is the\ndiscipline by which\ni constantly\nrediscover\nthe world."' },
      { l: '— l. da vinci',
        r: '"the painter has\nthe universe in\nhis mind and hands."' },
      { l: '— r. m. rilke',
        r: '"if you trust in\nnature, in what is\nsimple in nature,\nin the small things\nthat hardly anyone\nsees, everything will\nbecome easier."' },
      { l: '...',
        r: 'more soon.' },
    ],
  };
  function buildBenchBook(w, h, d, cover, title) {
    const coverMat = new THREE.MeshStandardMaterial({ color: cover, roughness: 0.7 });
    const pageEdgeMat = new THREE.MeshStandardMaterial({ color: 0xede2c8, roughness: 0.9 });
    // cover canvas on the top face
    const W = 256, H = 192;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = `#${cover.toString(16).padStart(6, '0')}`;
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(212, 175, 55, 0.85)';
    ctx.lineWidth = 4;
    ctx.strokeRect(10, 10, W - 20, H - 20);
    ctx.fillStyle = '#e0c870';
    ctx.font = 'bold 22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(title, W / 2, H / 2);
    const tex = new THREE.CanvasTexture(cv);
    tex.colorSpace = THREE.SRGBColorSpace;
    const coverFace = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.7 });
    const mats = [pageEdgeMat, coverMat, coverFace, coverMat, pageEdgeMat, pageEdgeMat];
    return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mats);
  }
  // bottom book
  const benchBookBottom = buildBenchBook(0.55, 0.09, 0.40, 0x6b3a2c, 'Notes');
  benchBookBottom.position.set(benchBookData.x, 0.94, benchBookData.z);
  benchBookBottom.castShadow = true;
  benchBookBottom.receiveShadow = true;
  scene.add(benchBookBottom);
  // top book — yaw-rotated, slightly smaller
  const benchBookTop = buildBenchBook(0.50, 0.08, 0.36, 0x2f4d6e, 'Sketches');
  benchBookTop.position.set(benchBookData.x + 0.02, 0.94 + 0.09, benchBookData.z - 0.02);
  benchBookTop.rotation.y = THREE.MathUtils.degToRad(22);
  benchBookTop.castShadow = true;
  benchBookTop.receiveShadow = true;
  scene.add(benchBookTop);
  // proxy meshes the open-book interaction will hide / reshow
  books.push({
    data: benchBookData,
    meshes: [benchBookBottom, benchBookTop],
  });

  // Open-book mesh: two flat page planes meeting at a spine.  Hidden by
  // default, repositioned and shown when the player opens a specific book.
  const openBook = new THREE.Group();
  const pageW = 0.62, pageH = 0.86;
  const leftCanvas = document.createElement('canvas');
  leftCanvas.width = 384; leftCanvas.height = 512;
  const rightCanvas = document.createElement('canvas');
  rightCanvas.width = 384; rightCanvas.height = 512;
  const leftTex  = new THREE.CanvasTexture(leftCanvas);
  const rightTex = new THREE.CanvasTexture(rightCanvas);
  leftTex.colorSpace  = THREE.SRGBColorSpace;
  rightTex.colorSpace = THREE.SRGBColorSpace;
  const leftMat  = new THREE.MeshStandardMaterial({ map: leftTex,  roughness: 0.85, side: THREE.DoubleSide });
  const rightMat = new THREE.MeshStandardMaterial({ map: rightTex, roughness: 0.85, side: THREE.DoubleSide });
  const leftPage  = new THREE.Mesh(new THREE.PlaneGeometry(pageW, pageH), leftMat);
  const rightPage = new THREE.Mesh(new THREE.PlaneGeometry(pageW, pageH), rightMat);
  leftPage.rotation.x  = -Math.PI / 2;
  rightPage.rotation.x = -Math.PI / 2;
  leftPage.position.set(-pageW / 2, 0.001, 0);
  rightPage.position.set( pageW / 2, 0.001, 0);
  openBook.add(leftPage);
  openBook.add(rightPage);
  // simple "spine" between
  const spine = new THREE.Mesh(
    new THREE.BoxGeometry(0.02, 0.005, pageH),
    new THREE.MeshStandardMaterial({ color: 0x6a5536, roughness: 0.7 })
  );
  spine.position.set(0, 0.004, 0);
  openBook.add(spine);
  // ---- Page-flip rig ----
  // flipPivot sits on the spine.  The flipMesh inside it has its geometry
  // pre-translated so the page's LEFT edge is at the pivot's origin — this
  // means rotating the pivot around its Z axis swings the page around the
  // spine like a real book page.  Used both for forward (right→left) and
  // backward (left→right) flips; we just preset the pivot's rotation to π
  // at the start of a backward flip so it begins on the left.
  const flipCanvas = document.createElement('canvas');
  flipCanvas.width = 384; flipCanvas.height = 512;
  const flipTex = new THREE.CanvasTexture(flipCanvas);
  flipTex.colorSpace = THREE.SRGBColorSpace;
  const flipMat = new THREE.MeshStandardMaterial({
    map: flipTex, roughness: 0.85, side: THREE.DoubleSide,
  });
  const flipGeom = new THREE.PlaneGeometry(pageW, pageH);
  flipGeom.translate(pageW / 2, 0, 0);          // shift so left edge at x=0
  const flipMesh = new THREE.Mesh(flipGeom, flipMat);
  flipMesh.rotation.x = -Math.PI / 2;
  const flipPivot = new THREE.Group();
  flipPivot.position.set(0, 0.005, 0);
  flipPivot.add(flipMesh);
  flipPivot.visible = false;
  openBook.add(flipPivot);
  // Compatibility: keep the old `flipPage` reference pointed at the pivot
  // so the open-/close-book reset code that toggles it still works.
  const flipPage = flipPivot;
  openBook.visible = false;
  scene.add(openBook);

  // exit sign — points back to the RIGHT (the entry/exit edge for projects)
  const exitSign = buildExitSign('right');
  exitSign.position.set(8.0, 0, -2.0);      // shifted north
  scene.add(exitSign);

  // a clip-on warm desk lamp at the right end of the bench
  const lampPole = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.55, 12), metalMat);
  lampPole.position.set(2.3, 1.18, -3.5);
  scene.add(lampPole);
  const lampHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.18, 16, 1, true),
    new THREE.MeshStandardMaterial({ color: 0x222229, side: THREE.DoubleSide })
  );
  lampHead.position.set(2.3, 1.50, -3.5);
  scene.add(lampHead);
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 10),
    new THREE.MeshBasicMaterial({ color: 0xffe6a8 })
  );
  bulb.position.set(2.3, 1.42, -3.5);
  scene.add(bulb);
  const lampLight = new THREE.PointLight(0xffd07c, 6, 6, 1.5);
  lampLight.position.set(2.3, 1.42, -3.5);
  scene.add(lampLight);

  // baymax — enters from the RIGHT (he came through cobble's left edge)
  const baymax = buildBaymax();
  baymax.scale.setScalar(BAYMAX_SCALE);
  baymax.position.set(12, 0, 0);
  baymax.rotation.y = -Math.PI / 2;    // facing -X (walking left into the scene)
  scene.add(baymax);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0.6, 16, 3.5);
  camera.lookAt(0, 0, 0);

  return {
    scene, camera, baymax,
    walkPhaseRef: { value: 0 },
    entered: false,
    entryT: 0,
    returning: false,
    laptopWorld: new THREE.Vector3(LAPTOP.x, LAPTOP.y + 0.40, LAPTOP.z - 0.34),
    computerStation: new THREE.Vector3(LAPTOP.x, 0, LAPTOP.z + 0.95),
    camLook: new THREE.Vector3(0, 0, 0),
    // laptop screen position + tilt — used by the website iframe
    laptopScreenPos: new THREE.Vector3(LAPTOP.x, LAPTOP.y + 0.40, LAPTOP.z - 0.34),
    laptopScreenTilt: lidTilt,
    laptopScreenMesh: screenMesh,
    laptopBezelMesh: bezel,
    // books + open-book mesh (interactable like the laptop)
    books,
    openBook,
    leftPage,
    rightPage,
    flipPage,
    flipPivot,
    flipMesh,
    flipCanvas,
    flipTex,
    leftCanvas,
    rightCanvas,
    leftTex,
    rightTex,
    flipMat,
    pageW,
    pageH,
    // crates with peep-inside interaction
    crates,
  };
}

// ==========================================================================
// main
// ==========================================================================

function start() {
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0';
  renderer.domElement.style.left = '0';
  renderer.domElement.style.zIndex = '1';
  document.body.appendChild(renderer.domElement);

  // CSS3DRenderer overlay — used to embed an iframe (a real, scrollable
  // webpage) on the laptop's screen mesh in the projects world.
  const cssRenderer = new CSS3DRenderer();
  cssRenderer.setSize(window.innerWidth, window.innerHeight);
  cssRenderer.domElement.style.position = 'absolute';
  cssRenderer.domElement.style.top = '0';
  cssRenderer.domElement.style.left = '0';
  cssRenderer.domElement.style.zIndex = '2';
  cssRenderer.domElement.style.pointerEvents = 'none';   // pass through unless the iframe explicitly opts in
  document.body.appendChild(cssRenderer.domElement);

  const white       = buildWhiteWorld();
  const psych       = buildPsychScene();
  const cobblestone = buildCobblestoneWorld();
  const beach       = buildBeachScene();
  const linkedin    = buildLinkedInScene();
  const artWorld    = buildArtScene();
  const projectsWorld = buildProjectsScene();
  const cave        = buildCaveScene();

  // ---- Laptop iframe (CSS3D) ----
  // We wrap paattikiiltoon.fi in a same-origin srcdoc page.  The wrapper has
  //   * an inner iframe (cross-origin) set to a tall fixed height with
  //     pointer-events:none and scrolling="no" — it renders the page as a
  //     static surface that the OUTER (same-origin) document then scrolls,
  //   * a body click handler that opens paattikiiltoon.fi in a new tab.
  // Because the outer wrapper is same-origin, both the touchpad and the
  // parent's arrow-key handler can scroll its document reliably.
  const PAATTIKIILTOON_URL = 'https://www.paattikiiltoon.fi/';
  const laptopWrapperHTML = `<!doctype html>
<html><head><meta charset="utf-8"><style>
html, body { margin:0; padding:0; background:#fff; cursor:pointer; }
html { scroll-behavior: smooth; }
.frame { display:block; width:100%; height:3200px; border:0; pointer-events:none; }
.banner {
  position: fixed; bottom: 10px; right: 10px;
  background: rgba(20,20,20,0.78); color: #fff;
  font: 12px/1.2 -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 6px 10px; border-radius: 999px;
  pointer-events: none;
}
</style></head><body>
<iframe class="frame" src="${PAATTIKIILTOON_URL}" scrolling="no" referrerpolicy="no-referrer"></iframe>
<div class="banner">click to open ↗</div>
<script>
  document.addEventListener('click', function(){
    window.open('${PAATTIKIILTOON_URL}', '_blank', 'noopener');
  });
<\/script>
</body></html>`;

  const laptopIframe = document.createElement('iframe');
  laptopIframe.srcdoc = laptopWrapperHTML;
  laptopIframe.style.width = '1024px';
  laptopIframe.style.height = '640px';
  laptopIframe.style.border = '0';
  laptopIframe.style.background = '#fff';
  laptopIframe.style.pointerEvents = 'none';
  laptopIframe.setAttribute('tabindex', '0');
  laptopIframe.setAttribute('scrolling', 'yes');
  // dimensions match the on-laptop screen plane (0.97 × 0.59 m)
  const laptopCssObj = new CSS3DObject(laptopIframe);
  const sx = 0.97 / 1024;
  const sy = 0.59 / 640;
  laptopCssObj.scale.set(sx, sy, sx);
  laptopCssObj.position.copy(projectsWorld.laptopScreenPos);
  laptopCssObj.position.z += 0.005;
  laptopCssObj.rotation.x = projectsWorld.laptopScreenTilt;
  laptopCssObj.visible = false;
  projectsWorld.scene.add(laptopCssObj);
  projectsWorld.laptopIframe = laptopIframe;
  projectsWorld.laptopCssObj = laptopCssObj;

  // Forward E/ESC keypresses from inside the iframe (same-origin srcdoc) to
  // the exit action, since the parent window won't see them when the iframe
  // has keyboard focus.
  function exitComputerFromIframe() {
    if (projectsWorld.computerActive) {
      projectsWorld.computerActive = false;
      try { unstickProjectsBaymax(projectsWorld.baymax); } catch (_) {}
      restoreParentFocus();
    }
  }
  // Same-origin srcdoc would let us listen for keys inside the iframe; for
  // cross-origin (paattikiiltoon.fi) this is silently blocked.  Either way,
  // bouncing focus back to the parent on mouseleave restores E/ESC.
  laptopIframe.addEventListener('load', () => {
    try {
      const innerWin = laptopIframe.contentWindow;
      if (innerWin && innerWin.addEventListener) {
        innerWin.addEventListener('keydown', e => {
          const k = (e.key || '').toLowerCase();
          if (k === 'e' || k === 'escape') {
            e.preventDefault();
            exitComputerFromIframe();
          }
        });
      }
    } catch (e) { /* cross-origin — fall back to mouseleave-based focus return */ }
  });
  laptopIframe.addEventListener('mouseleave', () => {
    if (projectsWorld.computerActive) {
      try { laptopIframe.blur(); } catch (_) {}
      try { focusSink?.focus({ preventScroll: true }); } catch (_) {}
    }
  });
  projectsWorld.exitComputerFromIframe = exitComputerFromIframe;

  // close button for exiting computer view (also exits via E)
  const laptopCloseBtn = document.getElementById('laptop-close');
  laptopCloseBtn.addEventListener('click', () => {
    if (projectsWorld.computerActive) {
      projectsWorld.computerActive = false;
      try { unstickProjectsBaymax(projectsWorld.baymax); } catch (_) {}
      restoreParentFocus();
    }
  });

  // "click to open" pill — visible only while in the computer view, styled
  // to match the intro tap-to-begin button.  Click → open paattikiiltoon.fi
  // in a new tab.
  const laptopOpenSiteBtn = document.getElementById('laptop-open-site');
  if (laptopOpenSiteBtn) {
    laptopOpenSiteBtn.addEventListener('click', () => {
      try { window.open('https://www.paattikiiltoon.fi/', '_blank', 'noopener'); } catch (_) {}
    });
  }

  // Global sound on/off toggle (top-right pill).  Persists in localStorage.
  const soundToggleBtn = document.getElementById('sound-toggle');
  function refreshSoundBtn() {
    if (!soundToggleBtn) return;
    if (_soundOn) {
      soundToggleBtn.classList.remove('muted');
      soundToggleBtn.title = 'sound on (click to mute)';
    } else {
      soundToggleBtn.classList.add('muted');
      soundToggleBtn.title = 'sound off (click to unmute)';
    }
  }
  refreshSoundBtn();
  // Apply the persisted "muted" state to the intro video too.
  setSoundOn(_soundOn);
  if (soundToggleBtn) {
    soundToggleBtn.addEventListener('click', () => {
      setSoundOn(!_soundOn);
      refreshSoundBtn();
    });
  }

  // stages: 'intro' (controllable), 'fall' (cinematic, in white world),
  //         'psych' (trip), 'cobble' (controllable), 'beach' (cinematic)
  let stage = 'intro';
  let stageT = 0;

  const keys = Object.create(null);

  // A dedicated hidden text input we focus on view exits.  Focusing this
  // guarantees the iframe (if any) loses keyboard focus, so subsequent
  // keydown events bubble to the window listener and Baymax can move again.
  const focusSink = document.getElementById('focus-sink');
  function restoreParentFocus() {
    try {
      const ifr = projectsWorld && projectsWorld.laptopIframe;
      if (ifr) {
        try { ifr.contentDocument?.activeElement?.blur?.(); } catch (_) {}
        try { ifr.blur(); } catch (_) {}
      }
    } catch (_) {}
    try { focusSink?.focus({ preventScroll: true }); } catch (_) {}
    // suppress only the exit-trigger keys so we don't re-enter on the same
    // held-E auto-repeat; WASD/arrows stay untouched
    keys['e'] = false;
    keys['escape'] = false;
  }

  // After exiting a view (computer / book / box) we may have parked Baymax
  // INSIDE one of the obstacle rectangles (e.g. workbench, or a bigger
  // crate's hitbox while he was peeking into the smaller one in front of
  // it).  If so the collision validator refuses every move.  Push him out
  // along the nearest obstacle edge — and repeat a few times in case
  // pushing out of one obstacle drops him into a neighbour.
  function unstickProjectsBaymax(b) {
    if (b.position.y !== 0) b.position.y = 0;
    const MARGIN = 0.18;
    if (typeof PROJECTS_OBSTACLES === 'undefined') return;
    for (let attempt = 0; attempt < 6; attempt++) {
      let bumped = false;
      for (const o of PROJECTS_OBSTACLES) {
        const x = b.position.x, z = b.position.z;
        if (x > o.minX && x < o.maxX && z > o.minZ && z < o.maxZ) {
          const dN = z - o.minZ;       // distance to north edge
          const dS = o.maxZ - z;       // distance to south edge
          const dW = x - o.minX;       // distance to west edge
          const dE = o.maxX - x;       // distance to east edge
          const m = Math.min(dN, dS, dW, dE);
          if      (m === dN) b.position.z = o.minZ - MARGIN;
          else if (m === dS) b.position.z = o.maxZ + MARGIN;
          else if (m === dW) b.position.x = o.minX - MARGIN;
          else               b.position.x = o.maxX + MARGIN;
          bumped = true;
        }
      }
      if (!bumped) break;
    }
    // Stay inside the scene bounds (defined alongside PROJECTS_OBSTACLES).
    if (typeof PROJECTS_BOUNDS !== 'undefined') {
      b.position.x = Math.max(PROJECTS_BOUNDS.minX + 0.1, Math.min(PROJECTS_BOUNDS.maxX - 0.1, b.position.x));
      b.position.z = Math.max(PROJECTS_BOUNDS.minZ + 0.1, Math.min(PROJECTS_BOUNDS.maxZ - 0.1, b.position.z));
    }
  }

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    // While the computer view is open, arrows scroll the embedded webpage.
    // We always preventDefault on those keys so they don't also scroll the body.
    const inComputerView = !!(projectsWorld && projectsWorld.computerActive);
    if (inComputerView && ['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) {
      e.preventDefault();
      try {
        const win = projectsWorld.laptopIframe?.contentWindow;
        if (win) {
          const step = (k === ' ') ? 400 : 80;
          let dx = 0, dy = 0;
          if (k === 'arrowup')    dy = -step;
          if (k === 'arrowdown' || k === ' ') dy =  step;
          if (k === 'arrowleft')  dx = -step;
          if (k === 'arrowright') dx =  step;
          win.scrollBy({ left: dx, top: dy, behavior: 'auto' });
        }
      } catch (err) { /* cross-origin — fall back to native focus-based scroll */ }
    } else if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) {
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  // Any click outside the laptop iframe puts focus back on the hidden sink
  // so the window keydown listener keeps receiving WASD/arrow key events.
  // Also: while inside crate 4 (whack-a-mole), raycast clicks against the
  // game targets and score on hits.
  const _gameRaycaster = new THREE.Raycaster();
  const _gameNDC = new THREE.Vector2();
  window.addEventListener('click', (e) => {
    const lf = projectsWorld && projectsWorld.laptopIframe;
    if (lf && (e.target === lf || lf.contains?.(e.target))) return;
    try { focusSink?.focus({ preventScroll: true }); } catch (_) {}

    // whack-a-mole hit detection
    if (projectsWorld && projectsWorld.boxActive) {
      const crate = projectsWorld.activeCrate;
      if (crate && crate.gameTargets && crate.gameTargets.length) {
        _gameNDC.x = (e.clientX / window.innerWidth)  * 2 - 1;
        _gameNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
        _gameRaycaster.setFromCamera(_gameNDC, projectsWorld.camera);
        const visible = crate.gameTargets.filter(t => t.visible);
        const hits = _gameRaycaster.intersectObjects(visible, false);
        if (hits.length > 0) {
          crate.gameScore = (crate.gameScore || 0) + 1;
          // hide hit target immediately and queue a fast respawn
          hits[0].object.visible = false;
          crate.gameActiveTarget = -1;
          crate.gameSpawnTimer = 0.15;
          // tiny pop animation: scale-up flash via direct manipulation
          updateGameScoreUI(crate.gameScore);
        }
      }
    }
  });
  // make sure we start with the keyboard pointed at the body, not at any
  // element a browser auto-focused
  try { focusSink?.focus({ preventScroll: true }); } catch (_) {}

  // ---- Whack-a-mole score overlay ----
  const gameScoreEl = document.createElement('div');
  gameScoreEl.id = 'game-score';
  gameScoreEl.style.cssText = `
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 23;
    color: #f3e6c8;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 32px;
    letter-spacing: 0.06em;
    text-shadow: 0 0 12px rgba(0,0,0,0.65);
    display: none;
    user-select: none;
    pointer-events: none;
  `;
  document.body.appendChild(gameScoreEl);
  function updateGameScoreUI(score) {
    gameScoreEl.textContent = `score · ${score}`;
    gameScoreEl.style.display = 'block';
  }
  function hideGameScoreUI() { gameScoreEl.style.display = 'none'; }

  // ---- Mini-cinema canvas drawer (called every frame while inside crate 3) ----
  function drawMiniCinema(ctx, t) {
    const W = ctx.canvas.width, H = ctx.canvas.height;
    // soft sky-to-dusk gradient that drifts over time
    const dusk = 0.5 + 0.5 * Math.sin(t * 0.4);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, `rgb(${30 + 80 * dusk}, ${30 + 60 * dusk}, ${80 + 70 * dusk})`);
    grad.addColorStop(1, `rgb(${20 + 60 * (1-dusk)}, ${15 + 30 * (1-dusk)}, ${40 + 30 * (1-dusk)})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // distant rolling hills
    ctx.fillStyle = 'rgba(20, 30, 40, 0.9)';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.7);
    for (let x = 0; x <= W; x += 8) {
      const y = H * 0.7 + Math.sin(x * 0.04 + t * 0.6) * 6 + Math.sin(x * 0.013 + t * 0.2) * 12;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fill();
    // moon / sun bobbing
    const cx = W * (0.5 + 0.3 * Math.sin(t * 0.25));
    const cy = H * (0.35 + 0.08 * Math.cos(t * 0.25));
    ctx.fillStyle = 'rgba(245, 230, 180, 0.95)';
    ctx.beginPath();
    ctx.arc(cx, cy, 14, 0, Math.PI * 2);
    ctx.fill();
    // a few twinkling stars
    for (let i = 0; i < 18; i++) {
      const sx = (i * 73 + Math.floor(t * 5)) % W;
      const sy = (i * 41) % (H * 0.55);
      const a = 0.3 + 0.7 * Math.abs(Math.sin(t * 2 + i));
      ctx.fillStyle = `rgba(255, 250, 230, ${a})`;
      ctx.fillRect(sx, sy, 1.2, 1.2);
    }
  }

  // "back..." overlay — DOM element + spans for per-letter fade
  const beachBackEl    = document.getElementById('beach-back');
  const beachBackSpans = Array.from(beachBackEl.querySelectorAll('span'));
  function resetBeachBack() {
    beachBackEl.style.display = 'none';
    for (const s of beachBackSpans) s.style.opacity = '0';
  }
  function exitBeachToCobble() {
    // reset beach state so a future visit replays the sequence
    beach.phase = 'enter';
    beach.phaseT = 0;
    beach.satMarked = false;
    beach.satTime = -1;
    beach.backOpacities.fill(0);
    resetBeachBack();
    beach.baymax.position.set(4.0, 0, 3.5);
    beach.baymax.rotation.set(0, -Math.PI * 0.7, 0);
    resetWalk(beach.baymax);
    resetHead(beach.baymax);
    beach.cocktail.position.copy(beach.cocktailStart);
    beach.cocktail.rotation.set(0, 0, 0);

    // re-enter cobble from the TOP of the screen (mirrors the relax exit)
    cobblestone.entering   = true;
    cobblestone.entryT     = 0;
    cobblestone.entryFrom  = 'top';
    cobblestone.exited     = false;
    cobblestone.landed     = true;
    cobblestone.landT      = COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE + 1.0;
    setStage('cobble');
  }
  beachBackEl.addEventListener('click', () => {
    if (stage !== 'beach' || !beach.satMarked) return;
    if (!beach.backOpacities.some(o => o > 0.25)) return;
    exitBeachToCobble();
  });

  // Skip-to-cobble button shown only during the psych (underwater) stage.
  // One click → jump straight to the controllable cobble world, bypassing
  // the fall-over → lie → rise cinematic.
  const psychSkipEl = document.getElementById('psych-skip');
  if (psychSkipEl) {
    psychSkipEl.addEventListener('click', () => {
      if (stage !== 'psych') return;
      // Place Baymax cleanly standing at the centre of the cobble world.
      const cb = cobblestone.baymax;
      cb.rotation.set(0, 0, 0);
      cb.position.set(0, 0, 0);
      cb.scale.setScalar(BAYMAX_SCALE);
      resetWalk(cb);
      resetHead(cb);
      // Mark the landing cinematic as fully complete + show the nav words.
      cobblestone.landed     = true;
      cobblestone.landT      = COBBLE_FALL_OVER + COBBLE_LIE + COBBLE_RISE + 1.2;
      cobblestone.entering   = false;
      cobblestone.entryT     = 0;
      cobblestone.exited     = false;
      cobblestone.wordsShown = true;
      const w = document.getElementById('words');
      if (w) {
        w.classList.remove('instant-off');
        w.classList.add('visible');
      }
      setStage('cobble');
    });
  }

  const vignette = document.getElementById('vignette');
  const hint     = document.getElementById('hint');
  const flash    = document.getElementById('flash');
  const fade     = document.getElementById('fade');

  function flashCut() {
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 110);
  }

  // hint visibility: shown until the user moves baymax for the first time,
  // then it slowly fades out over 2 s and stays gone.
  let hasMoved = false;
  function maybeStartHintFade() {
    if (hasMoved) return;
    hasMoved = true;
    hint.style.transition = 'opacity 2s ease-out';
    hint.style.opacity = '0';
  }

  function setStage(name) {
    if (stage === name) return;
    stage = name;
    stageT = 0;
    // hide the hint snappily during the cinematic / portal stages.  Don't bring it back.
    if (name === 'fall' || name === 'psych' || name === 'beach' ||
        name === 'linkedin' || name === 'art' || name === 'projects' ||
        name === 'cave') {
      hint.style.transition = 'opacity 0.3s';
      hint.style.opacity = '0';
    }

    // Hide the beach "back..." overlay whenever we leave the beach
    if (name !== 'beach' && typeof resetBeachBack === 'function') resetBeachBack();
    // Hide the projects "click e" prompt whenever we leave the projects world
    if (name !== 'projects') {
      const pp = document.getElementById('projects-prompt');
      if (pp) pp.style.display = 'none';
      // also hide the laptop iframe + close button if we leave mid-use
      if (projectsWorld.laptopCssObj) projectsWorld.laptopCssObj.visible = false;
      if (projectsWorld.laptopIframe) projectsWorld.laptopIframe.style.pointerEvents = 'none';
      if (projectsWorld.laptopScreenMesh) projectsWorld.laptopScreenMesh.visible = true;
      const cb = document.getElementById('laptop-close');
      if (cb) cb.style.display = 'none';
      const losb = document.getElementById('laptop-open-site');
      if (losb) losb.style.display = 'none';
      projectsWorld.computerActive = false;
      projectsWorld.bookActive = false;
      projectsWorld.boxActive = false;
      // also restore any open crate
      if (projectsWorld.crates) {
        for (const crate of projectsWorld.crates) {
          if (crate.frontMat) crate.crateMesh.material[4] = crate.frontMat;
          crate.interior.visible = false;
          if (crate.gameTargets) for (const t of crate.gameTargets) t.visible = false;
        }
      }
      // ensure outer Baymax is visible again (he gets hidden during box view)
      if (projectsWorld.baymax) projectsWorld.baymax.visible = true;
      hideGameScoreUI();
    }

    // Nav-word visibility: only cobble (after wordsShown) shows them.
    // Every other stage instant-hides them.
    {
      const w = document.getElementById('words');
      if (w) {
        if (name === 'cobble' && cobblestone.wordsShown) {
          w.classList.remove('instant-off');
          w.classList.add('visible');
        } else {
          w.classList.add('instant-off');
          w.classList.remove('visible');
        }
      }
    }

    if (name === 'psych') {
      fade.style.opacity = '0';
      flashCut();
    } else if (name === 'cobble') {
      vignette.style.opacity = '0';
      fade.style.opacity = '0';
      flashCut();
    } else if (name === 'beach' || name === 'linkedin' ||
               name === 'art'   || name === 'projects' ||
               name === 'cave') {
      vignette.style.opacity = '0';
      fade.style.opacity = '0';
      flashCut();
    }

    // Show / hide the psych "skip →" pill based on the current stage.
    const psychSkipEl = document.getElementById('psych-skip');
    if (psychSkipEl) psychSkipEl.style.display = (name === 'psych') ? 'block' : 'none';
  }

  // ---- vignette (intro) ----
  // Starts further from the hole (12 m) and ramps to a much more intense
  // near-black field that swallows most of the screen the closer he gets.
  const VIGNETTE_FAR = 12.0;
  function setVignette(p) {
    vignette.style.opacity = p.toFixed(3);
    // Inner transparent area shrinks aggressively
    const innerStop = (70 - p * 68).toFixed(1);   // 70% -> 2%
    const midStop   = (92 - p * 16).toFixed(1);   // 92% -> 76%
    // gray drops to pure black on a non-linear curve
    const grayLevel = Math.max(0, Math.round(155 * Math.pow(1 - p, 0.55)));
    const c = `${grayLevel},${grayLevel},${grayLevel}`;
    vignette.style.background =
      `radial-gradient(ellipse at center,` +
      ` rgba(${c},0) ${innerStop}%,` +
      ` rgba(${c},${(0.55 + p * 0.45).toFixed(2)}) ${midStop}%,` +
      ` rgba(${c},1) 100%)`;
  }

  const HOLE_BUFFER = 0.05;
  const CRAWL_DURATION = 2.4;

  // ---- white world: intro update ----
  function updateIntro(dt, t) {
    if (white.crawlT < 1) {
      white.crawlT = Math.min(1, white.crawlT + dt / CRAWL_DURATION);
      const eased = 1 - Math.pow(1 - white.crawlT, 3);
      white.baymax.position.y = THREE.MathUtils.lerp(white.spawn.y, 0, eased);
      white.baymax.rotation.z = Math.sin(t * 6) * 0.05 * (1 - eased);
      white.emergePatch.material.opacity = 0.4 * (1 - eased);
    } else {
      white.emergePatch.material.opacity = 0;
    }

    if (white.crawlT >= 1 && !white.touchedHole) {
      const result = applyMovement(white.baymax, dt, keys, {
        speed: WALK_SPEED,
        walkPhaseRef: white.walkPhaseRef,
        baseY: 0,
        hole: { radius: HOLE_RADIUS, buffer: HOLE_BUFFER, fall: true },
      });
      maybeFootstep(result === 'walking', dt);
      if (result === 'walking') maybeStartHintFade();
      if (result === 'fell') {
        white.touchedHole = true;
        // remember WHERE on the rim he tipped in from, and which way he
        // was facing — the fall animation slides him from there into the
        // centre of the hole, so the direction matches his approach.
        white.fallApproach = {
          x:   white.baymax.position.x,
          z:   white.baymax.position.z,
          yaw: white.baymax.rotation.y,
        };
        setTimeout(() => setStage('fall'), 110);
      }
    }

    const dC = Math.hypot(white.baymax.position.x, white.baymax.position.z);
    const distFromRim = Math.max(0, dC - HOLE_RADIUS);
    const proximity = THREE.MathUtils.clamp(1 - distFromRim / VIGNETTE_FAR, 0, 1);
    // softer early on but accelerates hard the closer he gets to the rim
    setVignette(Math.pow(proximity, 1.5));
  }

  // ---- white world: fall update (slow-mo, 2.0 s total) ----
  // Baymax falls down through the hole.  The camera follows his head so it
  // stays visible throughout the descent.
  const FALL_DUR  = 2.0;
  const FALL_DIST = ORIG_CAM_DIST * 0.5;   // ~7 m, zoomed in
  const FALL_BAYMAX_SCALE = BAYMAX_SCALE * 1.0;   // smaller so the head clears the rim
  function updateFall(dt) {
    const t  = Math.min(1, stageT / FALL_DUR);
    const rt = stageT;

    const approach = white.fallApproach || { x: 0, z: 0, yaw: 0 };

    // Slide horizontally from his approach point at the rim to the centre of
    // the hole over the first ~0.5 s, while Y descends throughout.  Combined
    // with the forward tip, this reads as "from the side he came, into the hole."
    const SLIDE_DUR = 0.55;
    const slideU = Math.min(1, rt / SLIDE_DUR);
    const slideE = slideU * slideU * (3 - 2 * slideU);
    const px = THREE.MathUtils.lerp(approach.x, 0, slideE);
    const pz = THREE.MathUtils.lerp(approach.z, 0, slideE);

    const fY = -2.4 * rt * rt;
    white.baymax.position.set(px, fY, pz);

    // tip forward only to ~60° so the head doesn't fold all the way under
    const TIP_DUR = 0.7;
    const TIP_MAX = Math.PI / 3;
    const tipU = Math.min(1, rt / TIP_DUR);
    const tipE = tipU * tipU * (3 - 2 * tipU);
    const tipAngle = tipE * TIP_MAX;
    white.baymax.rotation.set(tipAngle, approach.yaw, 0);
    white.baymax.scale.setScalar(FALL_BAYMAX_SCALE);

    // gentle limb/leg dangle — no hand-look, just a little life so he isn't a statue
    const limbs = white.baymax.userData.limbs;
    const head  = white.baymax.userData.head;
    if (limbs) {
      const wob = Math.sin(rt * 2.4);
      limbs.leftArm.position.set(
        limbs.bases.leftArm.x,
        limbs.bases.leftArm.y + 0.02 * wob,
        limbs.bases.leftArm.z
      );
      limbs.rightArm.position.set(
        limbs.bases.rightArm.x,
        limbs.bases.rightArm.y - 0.02 * wob,
        limbs.bases.rightArm.z
      );
      limbs.leftArm.rotation.z  =  0.25;
      limbs.rightArm.rotation.z = -0.25;
      limbs.leftLeg.position.set(
        limbs.bases.leftLeg.x,
        limbs.bases.leftLeg.y + 0.015 * Math.sin(rt * 3.0),
        limbs.bases.leftLeg.z
      );
      limbs.rightLeg.position.set(
        limbs.bases.rightLeg.x,
        limbs.bases.rightLeg.y - 0.015 * Math.sin(rt * 3.0),
        limbs.bases.rightLeg.z
      );
    }
    if (head) head.rotation.set(0, 0, 0);

    // ---- camera ----
    // The camera follows Baymax's head so it stays in view all the way down.
    // head local position when upright is (0, 0.92, 0); the X-axis tip rotates
    // that to (0, 0.92·cosθ, 0.92·sinθ), then the yaw rotates around Y.
    const headLocalY = 0.92 * Math.cos(tipAngle) * FALL_BAYMAX_SCALE;
    const headLocalZ = 0.92 * Math.sin(tipAngle) * FALL_BAYMAX_SCALE;
    const cYaw = Math.cos(approach.yaw), sYaw = Math.sin(approach.yaw);
    const headWorld = new THREE.Vector3(
      px + headLocalZ * sYaw,
      fY + headLocalY,
      pz + headLocalZ * cYaw
    );

    // Camera angle ramps from a side view to mostly overhead so it peers
    // deeper into the shaft as Baymax descends.
    const A0 = THREE.MathUtils.degToRad(30);
    const A1 = THREE.MathUtils.degToRad(82);

    let camPos;
    if (t < 0.40) {
      const cy = FALL_DIST * Math.sin(A0);
      const cz = FALL_DIST * Math.cos(A0);
      camPos = new THREE.Vector3(0, cy, cz);
    } else if (t < 0.82) {
      const u = (t - 0.40) / 0.42;
      const eased = u * u * (3 - 2 * u);
      const angle = THREE.MathUtils.lerp(A0, A1, eased);
      const dist  = THREE.MathUtils.lerp(FALL_DIST, 4.5, eased);
      camPos = new THREE.Vector3(
        0,
        Math.max(0.4, dist * Math.sin(angle)),
        Math.max(0.001, dist * Math.cos(angle))
      );
    } else {
      // plunge straight into the hole, fade to black
      const u = (t - 0.82) / 0.18;
      const camY = THREE.MathUtils.lerp(4.5, -3.5, u * u);
      camPos = new THREE.Vector3(0.001, camY, 0.001);
    }

    white.camera.position.copy(camPos);
    // always look at the head (in the plunge phase the camera dives past him)
    if (t < 0.82) {
      white.camera.lookAt(headWorld);
    } else {
      white.camera.lookAt(0, -9, 0);
    }

    // black overlay fade — starts a touch later, finishes at t = 1
    if (t > 0.7) {
      const fadeP = Math.min(1, (t - 0.7) / 0.3);
      fade.style.opacity = String(fadeP);
    }

    if (stageT >= FALL_DUR) setStage('psych');
  }

  // ---- psych update (underwater, 5 s total) ----
  // Phases:
  //   0.0 – 0.8 : sinks from the surface to the middle
  //   0.8 – 2.0 : breast-stroke #1 (slow)
  //   2.0 – 3.2 : breast-stroke #2 (slow)
  //   3.2 – 3.6 : drifts upward, peaks
  //   3.6 – 4.2 : loses consciousness — limbs slacken, head lolls
  //   4.2 – 5.0 : sinks back down
  const PSYCH_DUR = 5.0;
  const STROKE_DUR = 1.2;          // slower strokes
  function updatePsych(dt) {
    psych.bgMat.uniforms.uTime.value += dt;
    const t = stageT;

    const b = psych.baymax;
    const limbs = b.userData.limbs;
    const head  = b.userData.head;
    const smooth = u => u * u * (3 - 2 * u);

    // tiny arm offsets so the arms stay visually attached to the body
    const setArms = (sweepX, backZ, downY = 0) => {
      if (!limbs) return;
      limbs.leftArm.position.set(
        limbs.bases.leftArm.x  - sweepX,
        limbs.bases.leftArm.y  + downY,
        limbs.bases.leftArm.z  + backZ
      );
      limbs.rightArm.position.set(
        limbs.bases.rightArm.x + sweepX,
        limbs.bases.rightArm.y + downY,
        limbs.bases.rightArm.z + backZ
      );
    };

    // Breast-stroke cycle in [0, 1].  Sweep is small (arms stay attached);
    // the visible motion is mostly from arm rotation.z.
    const stroke = u => {
      if (u < 0.5) {
        const k = u / 0.5;
        return {
          sweep: 0.09 * Math.sin(k * Math.PI),
          back: -0.07 * k,
          rotZ: 0.7 * Math.sin(k * Math.PI),
        };
      } else {
        const k = (u - 0.5) / 0.5;
        return {
          sweep: 0.09 * Math.sin((1 - k) * Math.PI),
          back: -0.07 * (1 - k) + 0.05 * k,
          rotZ: 0.7 * Math.sin((1 - k) * Math.PI),
        };
      }
    };

    let by;
    let armSweep = 0, armBack = 0, armDown = 0, armRotBonus = 0;
    let bodyTilt = 0;
    let headX = 0, headY = 0, headZ = 0;

    if (t < 0.8) {
      const u = t / 0.8;
      by = THREE.MathUtils.lerp(2.4, 0.0, u);
      bodyTilt = 0.10 * u;
      armDown = 0.04 * u;
    } else if (t < 0.8 + STROKE_DUR) {
      const u = (t - 0.8) / STROKE_DUR;
      const s = stroke(u);
      armSweep = s.sweep;
      armBack  = s.back;
      armRotBonus = s.rotZ;
      const lift = Math.sin(u * Math.PI) * 0.55;
      by = 0.0 + lift + u * 0.45;
      bodyTilt = -0.16 * Math.sin(u * Math.PI);
    } else if (t < 0.8 + 2 * STROKE_DUR) {
      const u = (t - 0.8 - STROKE_DUR) / STROKE_DUR;
      const s = stroke(u);
      armSweep = s.sweep;
      armBack  = s.back;
      armRotBonus = s.rotZ;
      const lift = Math.sin(u * Math.PI) * 0.55;
      by = 0.45 + lift + u * 0.45;
      bodyTilt = -0.16 * Math.sin(u * Math.PI);
    } else if (t < 0.8 + 2 * STROKE_DUR + 0.4) {
      const u = (t - 0.8 - 2 * STROKE_DUR) / 0.4;
      const eased = 1 - Math.pow(1 - u, 2);
      by = 0.9 + eased * 0.35;
    } else if (t < 0.8 + 2 * STROKE_DUR + 0.4 + 0.6) {
      const u = (t - 0.8 - 2 * STROKE_DUR - 0.4) / 0.6;
      const eased = smooth(u);
      by = 1.25 - eased * 0.55;
      armDown = 0.16 * eased;
      armRotBonus = -0.35 * eased;
      bodyTilt = 0.18 * eased;
      headX = -0.28 * eased;
      headZ =  0.22 * eased;
    } else {
      const u = (t - 0.8 - 2 * STROKE_DUR - 0.4 - 0.6) / 0.8;
      const fall = u * u;
      by = 0.7 - fall * 3.4;
      armDown = 0.16;
      armRotBonus = -0.35;
      bodyTilt = 0.18 + 0.05 * u;
      headX = -0.28;
      headZ =  0.22;
    }

    setArms(armSweep, armBack, armDown);
    if (limbs) {
      limbs.leftArm.rotation.z  =  0.25 + armRotBonus;
